function suggestHabitEmoji(title) {
  if (!title) return ['✨'];
  const lower = title.toLowerCase();
  for (const m of EMOJI_SUGGEST_MAP) {
    if (m.kw.some(k => lower.includes(k))) return m.emoji;
  }
  return ['✨', '🌱', '◯'];
}

// Parse "Five prayers" / "5 prayers" / "Three workouts" → returns count or 1
function parseHabitCount(title) {
  if (!title) return 1;
  const wordToNum = { one:1, two:2, three:3, four:4, five:5, six:6, seven:7, eight:8, nine:9, ten:10 };
  const lower = title.toLowerCase().trim();
  // "5 X" or "5x X"
  const numMatch = lower.match(/^(\d+)x?\s/);
  if (numMatch) return Math.min(20, parseInt(numMatch[1], 10));
  // "five X" / "three X"
  const wordMatch = lower.match(/^(one|two|three|four|five|six|seven|eight|nine|ten)\s/);
  if (wordMatch) return wordToNum[wordMatch[1]];
  return 1;
}

// Active habits = not retired
function activeHabits() {
  return (state.habits || []).filter(h => !h.retired_at);
}

// Active habits that should appear today (respects cadence)
function activeHabitsToday() {
  const td = todayISO();
  const dow = new Date(td + 'T12:00:00').getDay();  // 0=Sun, 1=Mon, ..., 6=Sat
  return activeHabits().filter(h => {
    if (h.cadence === 'weekly') {
      // Show every day until completed for the week; once logged this week, stop showing
      return !isHabitCompleteThisWeek(h);
    }
    if (h.cadence === 'weekdays') {
      return dow >= 1 && dow <= 5;
    }
    return true;  // daily
  });
}

function todaysCountForHabit(habit) {
  const td = todayISO();
  return (state.habitLogs || []).filter(l => l.habit_id === habit.id && l.date_iso === td).reduce((sum, l) => sum + (l.count || 1), 0);
}

function isHabitCompleteToday(habit) {
  const need = habit.count_per_day || 1;
  return todaysCountForHabit(habit) >= need;
}

function isHabitCompleteThisWeek(habit) {
  // Sunday-start week
  const now = new Date(todayISO() + 'T12:00:00');
  const dow = now.getDay();
  const sunday = new Date(now);
  sunday.setDate(now.getDate() - dow);
  const weekStart = sunday.toISOString().slice(0, 10);
  return (state.habitLogs || []).some(l => l.habit_id === habit.id && l.date_iso >= weekStart);
}

// Log a single tap for a habit (increments count)
function logHabitTap(habitId) {
  const h = (state.habits || []).find(x => x.id === habitId);
  if (!h || h.retired_at) return;
  const td = todayISO();
  state.habitLogs = state.habitLogs || [];
  // For binary habits (count_per_day === 1), check if already logged today
  if ((h.count_per_day || 1) === 1) {
    if ((state.habitLogs || []).some(l => l.habit_id === habitId && l.date_iso === td)) {
      // Already done — undo it
      state.habitLogs = state.habitLogs.filter(l => !(l.habit_id === habitId && l.date_iso === td));
    } else {
      state.habitLogs.push({ id: uid(), habit_id: habitId, date_iso: td, ts: new Date().toISOString(), count: 1 });
    }
  } else {
    // Count-based: increment up to count_per_day, then back to 0 if tapped past
    const current = todaysCountForHabit(h);
    if (current >= (h.count_per_day || 1)) {
      // Already at max — clear today's logs
      state.habitLogs = state.habitLogs.filter(l => !(l.habit_id === habitId && l.date_iso === td));
    } else {
      state.habitLogs.push({ id: uid(), habit_id: habitId, date_iso: td, ts: new Date().toISOString(), count: 1 });
    }
  }
  saveState();
  renderHabitsTodaySheet();
  // Also re-render the Today screen so the Habits ring updates
  if ((state.nav && state.nav.active) === 'today') render();
}

// Silent observation: triggers when active habit has been missed for 3+ consecutive days
// (today + yesterday + day-before-yesterday all missed, AND habit existed during that window)
function silentMissedObservation() {
  const habits = activeHabits();
  if (!habits.length) return '';
  const td = todayISO();
  const dayN = (n) => {
    const d = new Date(td + 'T12:00:00');
    d.setDate(d.getDate() - n);
    return d.toISOString().slice(0, 10);
  };

  for (const h of habits) {
    if (h.cadence === 'weekly') continue;  // weekly habits don't trigger 3-day silence
    // Skip if habit was created less than 3 days ago — not enough history to "miss"
    const createdMs = new Date(h.created_at).getTime();
    const threeDaysAgoMs = Date.now() - 3 * 86400000;
    if (createdMs > threeDaysAgoMs) continue;

    const logs = (state.habitLogs || []).filter(l => l.habit_id === h.id);
    // Last 3 days (today, yesterday, day before yesterday) all missed?
    const lastThree = [dayN(0), dayN(1), dayN(2)];
    const allMissed = lastThree.every(iso => !logs.some(l => l.date_iso === iso));
    if (!allMissed) continue;

    // Count consecutive miss days (cap at 14)
    let dayCount = 3;
    for (let i = 3; i < 14; i++) {
      const iso = dayN(i);
      if (logs.some(l => l.date_iso === iso)) break;
      dayCount++;
    }
    return `${h.title} has gone quiet — ${dayCount} days now. ${h.note ? `"${h.note}"` : 'Worth a return today.'}`;
  }
  return '';
}

let habitDraft = null;

function openHabitCreateSheet(editingId) {
  const editing = editingId ? (state.habits || []).find(h => h.id === editingId) : null;
  habitDraft = editing
    ? { id: editing.id, title: editing.title, emoji: editing.emoji, note: editing.note || '', cadence: editing.cadence || 'daily', count_per_day: editing.count_per_day || 1, isEditing: true }
    : { title: '', emoji: '', note: '', cadence: 'daily', count_per_day: 1, isEditing: false };
  renderHabitCreateSheet();
}

function renderHabitCreateSheet() {
  const d = habitDraft;
  if (!d) return;

  const suggestions = suggestHabitEmoji(d.title);
  const detectedCount = parseHabitCount(d.title);
  const showCountHint = detectedCount > 1;
  const titleValid = d.title && d.title.trim().length > 0;

  openOverlay(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
      <button onclick="cancelHabitCreate()" style="background:none;border:none;color:var(--accent-bright);font-family:inherit;font-size:13px;cursor:pointer;padding:0;">‹ Back</button>
      ${d.isEditing ? `<button onclick="confirmDeleteHabit('${d.id}')" style="background:none;border:none;color:var(--ink-faint);font-family:inherit;font-size:11px;cursor:pointer;padding:0;letter-spacing:0.04em;">Retire</button>` : ''}

    <div style="font-size:9.5px;letter-spacing:0.16em;color:var(--ink-muted);font-weight:500;margin-bottom:10px;">${d.isEditing ? 'EDIT PRACTICE' : 'A NEW PRACTICE'}</div>
    <div style="font-family:'Fraunces',serif;font-size:24px;color:var(--ink);font-weight:400;letter-spacing:-0.02em;line-height:1.1;margin-bottom:8px;">Name what you want to embody.</div>

    <div style="height:0.5px;background:var(--line);margin:18px 0;"></div>

    <div style="font-size:9.5px;letter-spacing:0.16em;color:var(--ink-muted);font-weight:500;margin-bottom:10px;">TITLE</div>
    <div style="position:relative;margin-bottom:${showCountHint ? '12' : '20'}px;">
      <input type="text" id="habit-title-input" value="${escapeHtml(d.title)}" placeholder="e.g. Five prayers, Read 20 minutes, Sleep before 11"
        oninput="onHabitTitleInput(this.value)"
        style="width:100%;padding:12px 50px 12px 14px;background:var(--surface-2);border:0.5px solid var(--line);border-radius:10px;font-family:'Fraunces',serif;font-size:15px;color:var(--ink);box-sizing:border-box;">
      <div style="position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:22px;line-height:1;">${d.emoji || (suggestions[0] || '')}</div>

      <div style="font-family:'Fraunces',serif;font-style:italic;font-size:11.5px;color:var(--ink-muted);margin:-12px 4px 16px;line-height:1.4;">
        also: ${suggestions.slice(1).map((e, i) => `<button onclick="setHabitEmoji('${e}')" style="background:none;border:none;font-size:18px;cursor:pointer;margin-right:6px;padding:0;line-height:1;vertical-align:middle;">${e}</button>`).join('')}

    ${showCountHint ? `
      <div style="background:rgba(200,155,106,0.06);border:0.5px solid var(--brass-dim);border-radius:10px;padding:11px 14px;margin-bottom:20px;">

function onHabitTitleInput(val) {
  if (!habitDraft) return;
  const oldEmoji = habitDraft.emoji;
  const wasAuto = !oldEmoji || suggestHabitEmoji(habitDraft.title)[0] === oldEmoji;
  habitDraft.title = val;
  if (wasAuto) {
    habitDraft.emoji = suggestHabitEmoji(val)[0] || '';
  }
  habitDraft.count_per_day = parseHabitCount(val);
  // Re-render the sheet (but preserve focus)
  const focusedEl = document.activeElement;
  const focusedId = focusedEl?.id;
  const cursorPos = focusedEl?.selectionStart;
  renderHabitCreateSheet();
  if (focusedId) {
    setTimeout(() => {
      const el = document.getElementById(focusedId);
      if (el) {
        el.focus();
        if (typeof cursorPos === 'number' && el.setSelectionRange) {
          try { el.setSelectionRange(cursorPos, cursorPos); } catch (e) {}
        }
      }
    }, 0);
  }
}

function onHabitNoteInput(val) {
  if (!habitDraft) return;
  habitDraft.note = val;
  // No re-render needed for the note (no derived UI)
}

function setHabitEmoji(emoji) {
  if (!habitDraft) return;
  habitDraft.emoji = emoji;
  renderHabitCreateSheet();
}

function setHabitCadence(c) {
  if (!habitDraft) return;
  habitDraft.cadence = c;
  renderHabitCreateSheet();
}

function saveHabitDraft() {
  const d = habitDraft;
  if (!d) return;
  // Pull latest input values in case re-render hasn't synced
  const titleEl = document.getElementById('habit-title-input');
  const noteEl = document.getElementById('habit-note-input');
  if (titleEl) d.title = titleEl.value;
  if (noteEl) d.note = noteEl.value;
  d.title = (d.title || '').trim();
  d.note = (d.note || '').trim();
  if (!d.title) { toast('Name the practice'); return; }

  const emoji = d.emoji || suggestHabitEmoji(d.title)[0] || '✨';
  const count = parseHabitCount(d.title);

  state.habits = state.habits || [];
  if (d.isEditing) {
    const h = state.habits.find(x => x.id === d.id);
    if (h) {
      h.title = d.title;
      h.emoji = emoji;
      h.note = d.note;
      h.cadence = d.cadence;
      h.count_per_day = count;
    }
  } else {
    state.habits.push({
      id: uid(),
      title: d.title,
      emoji,
      note: d.note,
      cadence: d.cadence,
      count_per_day: count,
      created_at: new Date().toISOString(),
      retired_at: null,
    });
  }
  saveState();
  habitDraft = null;
  closeOverlay();
  // Return to Today's habit sheet so the new habit appears
  openHabitsTodaySheet();
  toast(d.isEditing ? 'Saved' : 'Practice begun');
}

function cancelHabitCreate() {
  habitDraft = null;
  // Return to whichever sheet was open before — assume Today's habit sheet
  openHabitsTodaySheet();
}

function confirmDeleteHabit(habitId) {
  const h = (state.habits || []).find(x => x.id === habitId);
  if (!h) return;
  if (!confirm(`Retire "${h.title}"? Its history is kept — you'll still see it in Life — but it won't appear in today's list.`)) return;
  h.retired_at = new Date().toISOString();
  saveState();
  habitDraft = null;
  closeOverlay();
  openHabitsTodaySheet();
  toast('Retired');
}

    setTimeout(() => { const el = document.getElementById('pulse-weight-input'); if (el) el.focus(); }, 80);
  } else if (d.kind === 'mood') {
    openOverlay(`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
        <button onclick="pulseCancelInline()" style="background:none;border:none;color:var(--accent-bright);font-family:inherit;font-size:13px;cursor:pointer;padding:0;">‹ Pulse</button>
      </div>
      <div style="font-size:9.5px;letter-spacing:0.16em;color:var(--ink-muted);font-weight:500;margin-bottom:8px;">FELT · TODAY</div>
      <div style="font-family:'Fraunces',serif;font-size:24px;color:var(--ink);font-weight:400;letter-spacing:-0.02em;line-height:1.1;margin-bottom:20px;">How does today feel?</div>
      <div style="display:flex;justify-content:space-between;gap:8px;">
        ${[1,2,3,4,5].map(s => `
          <button onclick="pulseSetMoodFromInline(${s})" style="flex:1;padding:18px 0;background:var(--surface-2);border:0.5px solid var(--line);border-radius:14px;color:var(--ink-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;">
            <div style="width:32px;height:32px;">${moodFaceSVG(s)}</div>

}

function pulseSaveSleep() {
  const v = parseFloat((document.getElementById('pulse-sleep-input') || {}).value);
  if (!v || isNaN(v)) { pulseCancelInline(); return; }
  const td = todayISO();
  state.sleep = state.sleep || [];
  const existing = state.sleep.find(s => s.date === td);
  if (existing) existing.duration_h = v;
  else state.sleep.push({ id: uid(), date: td, duration_h: v });
  saveState();
  pulseInlineDraft = null;
  renderPulseSheet();
  if ((state.nav && state.nav.active) === 'today') render();
  toast(`${v}h logged`);
}

function pulseSaveWeight() {
  const v = parseFloat((document.getElementById('pulse-weight-input') || {}).value);
  if (!v || isNaN(v)) { pulseCancelInline(); return; }
  state.weights = state.weights || [];
  state.weights.push({ id: uid(), ts: new Date().toISOString(), weight_kg: v });
  saveState();
  pulseInlineDraft = null;
  renderPulseSheet();
  if ((state.nav && state.nav.active) === 'today') render();
  toast(`${v} kg logged`);
}

function pulseSetMoodFromInline(score) {
  state.moods = state.moods || [];

  saveState();
  pulseInlineDraft = null;
  renderPulseSheet();
  if ((state.nav && state.nav.active) === 'today') render();
}

function pulseCancelInline() {
  pulseInlineDraft = null;
  renderPulseSheet();
}


function saveChapter(chapterId, isNew) {
  const title = (document.getElementById('chapter-title')?.value || '').trim();
  const start = (document.getElementById('chapter-start')?.value || '').trim();
  const end = (document.getElementById('chapter-end')?.value || '').trim();
  const note = (document.getElementById('chapter-note')?.value || '').trim();
  if (!title) { toast('Name the chapter'); return; }
  if (!start || !/^\d{4}-\d{2}-\d{2}$/.test(start)) { toast('Pick a start date'); return; }
  if (end && !/^\d{4}-\d{2}-\d{2}$/.test(end)) { toast('End date looks off'); return; }
  if (isNew || !chapterId) {
    state.chapters.push({
      id: uid(), title, start_date: start, end_date: end || null, note, color: null,
      pinned_examen_ids: [],
      pinned_capture_ids: [],
      pinned_touch_ids: [],
      reflection_text: '',
      reflection_completed_at: null,
    });
  } else {
    const c = state.chapters.find(x => x.id === chapterId);
    if (!c) return;
    c.title = title;
    c.start_date = start;
    c.end_date = end || null;
    c.note = note;
    // v2.10: ensure pinned arrays exist on legacy chapters
    if (!Array.isArray(c.pinned_examen_ids)) c.pinned_examen_ids = [];
    if (!Array.isArray(c.pinned_capture_ids)) c.pinned_capture_ids = [];
    if (!Array.isArray(c.pinned_touch_ids)) c.pinned_touch_ids = [];
    if (typeof c.reflection_text !== 'string') c.reflection_text = '';
    if (!c.reflection_completed_at) c.reflection_completed_at = null;
  }
  saveState();
  closeOverlay();
  render();
  toast(isNew ? 'Chapter opened' : 'Saved');
}

function deleteChapter(chapterId) {
  const c = state.chapters.find(x => x.id === chapterId);
  if (!c) return;
  if (!confirm(`Remove "${c.title}"? This doesn't delete any of your entries — just the chapter marker.`)) return;
  state.chapters = state.chapters.filter(x => x.id !== chapterId);
  saveState();
  closeOverlay();
  render();
  toast('Removed');
}

// v2.12.1 — WEEK / MONTH / YEAR DIFFERENTIATION POLISH
// Small generated-prose additions per segment to give each scale its own voice.
// ═══════════════════════════════════════════════════════════════════════

// "This week's noise" — a short rhythm observation for the Week segment
function weekNoiseHTML() {
  const now = Date.now();
  const sevenDaysAgo = now - 7 * 86400000;
  const inWindow = (ts) => {
    if (!ts) return false;
    const t = new Date(ts).getTime();
    return t >= sevenDaysAgo && t <= now;
  };
  const captureCount = (state.captures || []).filter(c => inWindow(c.ts)).length;
  const examenCount = (state.examens || []).filter(e => inWindow(e.completed_at)).length;
  const touchCount = (state.people || []).reduce((sum, p) => sum + ((p.touches || []).filter(t => inWindow(t.ts)).length), 0);
  const workoutCount = (state.workouts || []).filter(w => inWindow(w.ts)).length;

  const total = captureCount + examenCount + touchCount + workoutCount;
  if (total === 0) return '';

  let text;
  if (total <= 3) {
    text = `A still week. Only ${total === 1 ? 'a single mark' : `${total} marks`} on the page.`;
  } else if (total >= 20) {
    const parts = [];
    if (examenCount) parts.push(`${examenCount} ${examenCount === 1 ? 'examen' : 'examens'}`);
    if (captureCount) parts.push(`${captureCount} ${captureCount === 1 ? 'thought' : 'thoughts'}`);
    if (touchCount) parts.push(`${touchCount} ${touchCount === 1 ? 'touch' : 'touches'}`);
    if (workoutCount) parts.push(`${workoutCount} ${workoutCount === 1 ? 'lift' : 'lifts'}`);
    text = `A talkative week — ${parts.join(', ')}.`;
  } else {
    const parts = [];
    if (examenCount >= 5) parts.push('the examens held');
    if (captureCount >= 3) parts.push('thoughts kept landing');
    if (touchCount >= 3) parts.push('the people stayed close');
    if (workoutCount >= 3) parts.push('training carried');
    if (parts.length === 0) parts.push('a quiet rhythm');
    text = `A working week. ${parts.join(', ')}.`;
    text = text.charAt(0).toUpperCase() + text.slice(1);
    // Capitalize after period
    text = text.replace(/\. ([a-z])/, (m, l) => '. ' + l.toUpperCase());
  }

  return `
    <div style="margin:14px 0 8px;padding:14px 16px;background:var(--surface-2);border:0.5px solid var(--line);border-radius:12px;">
      <div style="font-size:9.5px;letter-spacing:0.16em;color:var(--ink-muted);font-weight:500;margin-bottom:6px;">THIS WEEK'S NOISE</div>
      <div style="font-family:'Fraunces',serif;font-style:italic;font-size:13.5px;color:var(--ink);line-height:1.55;">${escapeHtml(text)}</div>
    </div>
  `;
}

// "Themes that emerged" — a paragraph reading the dominant themes for Month
function monthThemesProseHTML() {
  // Count theme/tag frequency from examens in the last 30 days
  const now = Date.now();
  const cutoff = now - 30 * 86400000;
  const counts = {};
  for (const e of (state.examens || [])) {
    if (!e.completed_at) continue;
    const t = new Date(e.completed_at).getTime();
    if (t < cutoff) continue;
    const themes = e.themes || [];
    for (const th of themes) {
      const k = String(th).toLowerCase().trim();
      if (!k) continue;
      counts[k] = (counts[k] || 0) + 1;
    }
    // Also pull #tags from text
    const text = [(e.went_well || ''), (e.went_poorly || ''), (e.remains || '')].join(' ');
    const tagRe = /#(\w+)/g;
    let m;
    while ((m = tagRe.exec(text)) !== null) {
      const k = m[1].toLowerCase();
      counts[k] = (counts[k] || 0) + 1;
    }
  }
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  if (sorted.length === 0) return '';

  const top = sorted[0];
  let text;
  if (sorted.length === 1) {
    text = `One theme ran through this month: ${top[0]}.`;
  } else if (top[1] >= sorted[1][1] * 2) {
    // Top dominates
    text = `${top[0].charAt(0).toUpperCase() + top[0].slice(1)} ran through often this month — twice as much as anything else.`;
  } else if (sorted.length >= 3 && Math.abs(sorted[0][1] - sorted[2][1]) <= 1) {
    // Three roughly tied
    text = `Three themes wove through: ${sorted[0][0]}, ${sorted[1][0]}, ${sorted[2][0]}. None dominated.`;
  } else {
    text = `${top[0].charAt(0).toUpperCase() + top[0].slice(1)} led, with ${sorted[1][0]} close behind.`;
  }

  return `
    <div style="font-family:'Fraunces',serif;font-style:italic;font-size:13.5px;color:var(--ink-muted);line-height:1.55;margin:14px 0 4px;">${escapeHtml(text)}</div>
  `;
}

// ═══════════════════════════════════════════════════════════════════════
// v2.12.2 — MONTHLY RECAP LETTER
// A short generated paragraph at the end of Life→Month, written in your
// own voice. Templates only — no AI, no generation API.
// ═══════════════════════════════════════════════════════════════════════

// Get the date range for "this month" — calendar month containing today.
function thisMonthRange() {
  const now = new Date();
  const yr = now.getFullYear();
  const mo = now.getMonth();
  const start = new Date(yr, mo, 1);
  const end = new Date(yr, mo + 1, 0);  // last day of month
  const today = new Date();
  const isComplete = today.getDate() === end.getDate() && today.getMonth() === mo;
  return {
    startISO: start.toISOString().slice(0, 10),
    endISO: end.toISOString().slice(0, 10),
    monthName: start.toLocaleDateString('en', { month: 'long' }),
    year: yr,
    isComplete,
    dayOfMonth: today.getDate(),
    daysInMonth: end.getDate(),
  };
}

function monthlyRecapLetterHTML() {
  const range = thisMonthRange();
  const inMonth = (iso) => iso >= range.startISO && iso <= range.endISO;
  const inMonthTs = (ts) => {
    if (!ts) return false;
    const iso = new Date(ts).toISOString().slice(0, 10);
    return inMonth(iso);
  };

  // Gather counts
  const examens = (state.examens || []).filter(e => e.completed_at && inMonthTs(e.completed_at));
  const captures = (state.captures || []).filter(c => inMonthTs(c.ts));
  const workouts = (state.workouts || []).filter(w => inMonthTs(w.ts));
  const habits = (state.habits || []).filter(h => !h.retired_at);

  // Need at least *some* signal to write a letter
  const totalSignals = examens.length + captures.length + workouts.length;
  if (totalSignals < 3) return '';

  const isPast = !range.isComplete && range.dayOfMonth >= range.daysInMonth;
  const partial = !range.isComplete && range.dayOfMonth < range.daysInMonth;

  // ── Sentence 1: quantity
  const quantBits = [];
  if (examens.length) quantBits.push(`${examens.length} ${examens.length === 1 ? 'examen' : 'examens'}`);
  if (captures.length) quantBits.push(`${captures.length} ${captures.length === 1 ? 'thought' : 'thoughts'}`);
  if (workouts.length) quantBits.push(`${workouts.length} ${workouts.length === 1 ? 'lift' : 'lifts'}`);

  let openingLine;
  if (partial) {
    openingLine = `So far this ${range.monthName}, you've written ${quantBits.join(', ')}.`;
  } else {
    openingLine = `${range.monthName} closed. You wrote ${quantBits.join(', ')}.`;
  }

  // ── Sentence 2: themes
  let themesLine = '';
  const counts = {};
  for (const e of examens) {
    for (const th of (e.themes || [])) {
      const k = String(th).toLowerCase().trim();
      if (!k) continue;
      counts[k] = (counts[k] || 0) + 1;
    }
    const text = [(e.went_well || ''), (e.went_poorly || ''), (e.remains || '')].join(' ');
    const tagRe = /#(\w+)/g;
    let m;
    while ((m = tagRe.exec(text)) !== null) {
      const k = m[1].toLowerCase();
      counts[k] = (counts[k] || 0) + 1;
    }
  }
  const sortedThemes = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  if (sortedThemes.length >= 2) {
    const top = sortedThemes.slice(0, 3).map(([t]) => t);
    if (top.length === 3) {
      themesLine = `Three themes ran through: ${top[0]}, ${top[1]}, ${top[2]}.`;
    } else {
      themesLine = `The themes were ${top.join(' and ')}.`;
    }
  } else if (sortedThemes.length === 1) {
    themesLine = `One theme ran through: ${sortedThemes[0][0]}.`;
  }

  // ── Sentence 3: habits + chapters
  const closedChapters = (state.chapters || []).filter(c => c.end_date && inMonth(c.end_date));
  const openedChapters = (state.chapters || []).filter(c => c.start_date && inMonth(c.start_date));
  let chapterLine = '';
  if (closedChapters.length && openedChapters.length) {
    const closing = closedChapters[0];
    chapterLine = `You closed "${closing.title}"${openedChapters.length === 1 ? ` and opened "${openedChapters[0].title}".` : ' and opened a new one.'}`;
  } else if (closedChapters.length) {
    chapterLine = `You closed "${closedChapters[0].title}".`;
  } else if (openedChapters.length === 1) {
    chapterLine = `You opened the chapter "${openedChapters[0].title}".`;
  }

  // Habit observation — was at least one habit held with strength?
  let habitLine = '';
  if (habits.length) {
    // For each habit, count days held within the month
    const habitStrengths = habits.map(h => {
      const possibleDays = (() => {
        if (h.cadence === 'weekly') return Math.ceil((new Date(range.endISO).getDate()) / 7);
        if (h.cadence === 'weekdays') {
          let count = 0;
          for (let d = 1; d <= range.daysInMonth; d++) {
            const dt = new Date(range.year, new Date(range.startISO).getMonth(), d);
            const dow = dt.getDay();
            if (dow >= 1 && dow <= 5) count++;
          }
          return count;
        }
        return range.daysInMonth;
      })();
      const distinct = new Set(
        (state.habitLogs || [])
          .filter(l => l.habit_id === h.id && inMonth(l.date_iso))
          .map(l => l.date_iso)
      ).size;
      const ratio = distinct / Math.max(1, possibleDays);
      return { h, distinct, possibleDays, ratio };
    });
    const strongest = habitStrengths.filter(x => x.ratio >= 0.66).sort((a, b) => b.ratio - a.ratio)[0];
    const allHeld = habitStrengths.length > 0 && habitStrengths.every(x => x.ratio >= 0.66);
    if (allHeld && habitStrengths.length >= 3) {
      habitLine = `The practices held — every one of them.`;
    } else if (strongest) {
      habitLine = `${strongest.h.title} held the most steadily — ${strongest.distinct} of ${strongest.possibleDays} ${strongest.h.cadence === 'weekly' ? 'weeks' : 'days'}.`;
    } else if (habitStrengths.some(x => x.ratio < 0.3)) {
      const weak = habitStrengths.find(x => x.ratio < 0.3);
      habitLine = `${weak.h.title} thinned this month.`;
    }
  }

  // ── Sentence 4: tone (mood + sleep average)
  let toneLine = '';
  const moods = (state.moods || []).filter(m => inMonthTs(m.ts));
  const sleeps = (state.sleep || []).filter(s => inMonth(s.date));
  if (moods.length >= 5) {
    const avg = moods.reduce((s, m) => s + (m.score || 0), 0) / moods.length;
    if (avg >= 4) toneLine = `The month felt bright. Mood averaged ${avg.toFixed(1)} of 5.`;
    else if (avg >= 3.3) toneLine = `The month felt steady. Mood averaged ${avg.toFixed(1)} of 5.`;
    else if (avg >= 2.5) toneLine = `The month felt mixed. Mood averaged ${avg.toFixed(1)} of 5.`;
    else toneLine = `The month felt heavy. Mood averaged ${avg.toFixed(1)} of 5.`;
  } else if (sleeps.length >= 5) {
    const sleepAvg = sleeps.reduce((s, x) => s + (x.duration_h || 0), 0) / sleeps.length;
    if (sleepAvg < 6.5) toneLine = `Sleep ran short — averaging ${sleepAvg.toFixed(1)}h.`;
    else if (sleepAvg >= 7.5) toneLine = `Sleep held — averaging ${sleepAvg.toFixed(1)}h.`;
  }

  // ── Sentence 5: closing question
  let closingLine;
  if (partial) {
    const daysLeft = range.daysInMonth - range.dayOfMonth;
    closingLine = `${daysLeft} ${daysLeft === 1 ? 'day' : 'days'} left in ${range.monthName}. What does it want?`;
  } else if (openedChapters.length) {
    closingLine = `What does the new chapter want?`;
  } else if (closedChapters.length) {
    closingLine = `What carries forward?`;
  } else {
    closingLine = `What ends here? What carries forward?`;
  }

  // Assemble — only include lines that exist
  const lines = [openingLine, themesLine, chapterLine, habitLine, toneLine, closingLine].filter(Boolean);

  return `
    <div class="section-h" style="margin-top:32px;">${partial ? 'This month, so far' : `${range.monthName}, in a paragraph`}</div>
    <div style="position:relative;background:rgba(200,155,106,0.04);border:0.5px solid var(--brass-dim);border-radius:12px;padding:18px 18px 18px 22px;margin-top:6px;">
      <div style="position:absolute;top:0;bottom:0;left:0;width:3px;background:var(--brass);border-radius:1px;"></div>
      ${lines.map(l => `<div style="font-family:'Fraunces',serif;font-style:italic;font-size:13.5px;color:var(--ink);line-height:1.6;margin-bottom:6px;">${escapeHtml(l)}</div>`).join('')}
    </div>
  `;
}

// v2.12.2 — Returns info about the previous month if its recap is worth showing
// on Today as a banner. Shows in days 1-3 of the new month if previous had data.
function previousMonthRecapInfo() {
  const now = new Date();
  const dayOfMonth = now.getDate();
  if (dayOfMonth > 3) return null;  // only first 3 days of new month

  const prevMonth = new Date(now.getFullYear(), now.getMonth() - 1, 15);
  const prevYr = prevMonth.getFullYear();
  const prevMo = prevMonth.getMonth();
  const startISO = new Date(prevYr, prevMo, 1).toISOString().slice(0, 10);
  const endISO = new Date(prevYr, prevMo + 1, 0).toISOString().slice(0, 10);
  const inPrev = (iso) => iso >= startISO && iso <= endISO;
  const inPrevTs = (ts) => {
    if (!ts) return false;
    const iso = new Date(ts).toISOString().slice(0, 10);
    return inPrev(iso);
  };

  const examenCount = (state.examens || []).filter(e => e.completed_at && inPrevTs(e.completed_at)).length;
  const captureCount = (state.captures || []).filter(c => inPrevTs(c.ts)).length;
  const workoutCount = (state.workouts || []).filter(w => inPrevTs(w.ts)).length;
  const totalSignals = examenCount + captureCount + workoutCount;
  if (totalSignals < 5) return null;  // not enough to warrant a banner

  const monthName = prevMonth.toLocaleDateString('en', { month: 'long' });
  const key = `${prevYr}-${String(prevMo + 1).padStart(2, '0')}`;
  return { key, monthName, year: prevYr, monthIndex: prevMo };
}

// "What changed this year" — high-level deltas for the Year segment
function yearChangedHTML() {
  const now = Date.now();
  const yearAgo = now - 365 * 86400000;
  const inWindow = (ts) => {
    if (!ts) return false;
    const t = new Date(ts).getTime();
    return t >= yearAgo && t <= now;
  };

  const lines = [];

  // Body weight delta
  const weights = (state.weights || []).filter(w => w.ts).sort((a, b) => new Date(a.ts).getTime() - new Date(b.ts).getTime());
  if (weights.length >= 2) {
    const earliestInWindow = weights.find(w => inWindow(w.ts));
    const latest = weights[weights.length - 1];
    if (earliestInWindow && latest && earliestInWindow !== latest) {
      const delta = latest.weight_kg - earliestInWindow.weight_kg;
      const sign = delta > 0 ? '+' : '';
      const absDelta = Math.abs(delta).toFixed(1);
      if (absDelta > 0.5) {
        lines.push(`You weighed ${sign}${delta.toFixed(1)} kg compared to a year ago.`);
      } else {
        lines.push(`Your weight stayed roughly the same.`);
      }
    }
  }

  // People added in the year
  const peopleAdded = (state.people || []).filter(p => inWindow(p.created_at)).length;
  if (peopleAdded > 0) {
    lines.push(`You met ${peopleAdded} new ${peopleAdded === 1 ? 'person' : 'people'}.`);
  }

  // Chapters opened/closed this year
  const chaptersOpenedThisYear = (state.chapters || []).filter(c => {
    if (!c.start_date) return false;
    const t = new Date(c.start_date + 'T12:00:00').getTime();
    return t >= yearAgo && t <= now;
  }).length;
  const chaptersClosedThisYear = (state.chapters || []).filter(c => {
    if (!c.end_date) return false;
    const t = new Date(c.end_date + 'T12:00:00').getTime();
    return t >= yearAgo && t <= now;
  }).length;
  if (chaptersOpenedThisYear || chaptersClosedThisYear) {
    if (chaptersOpenedThisYear === chaptersClosedThisYear && chaptersClosedThisYear > 0) {
      lines.push(`You opened and closed ${chaptersClosedThisYear} ${chaptersClosedThisYear === 1 ? 'chapter' : 'chapters'}.`);
    } else if (chaptersClosedThisYear > 0 && chaptersOpenedThisYear > chaptersClosedThisYear) {
      lines.push(`You closed ${chaptersClosedThisYear} ${chaptersClosedThisYear === 1 ? 'chapter' : 'chapters'} and opened ${chaptersOpenedThisYear}.`);
    } else if (chaptersOpenedThisYear > 0) {
      lines.push(`You opened ${chaptersOpenedThisYear} ${chaptersOpenedThisYear === 1 ? 'chapter' : 'chapters'}.`);
    } else if (chaptersClosedThisYear > 0) {
      lines.push(`You closed ${chaptersClosedThisYear} ${chaptersClosedThisYear === 1 ? 'chapter' : 'chapters'}.`);
    }
  }

  if (lines.length === 0) return '';

  return `
    <div style="margin:18px 0 8px;padding:16px 18px;background:var(--surface-2);border:0.5px solid var(--line);border-radius:12px;">
      <div style="font-size:9.5px;letter-spacing:0.16em;color:var(--ink-muted);font-weight:500;margin-bottom:8px;">WHAT CHANGED THIS YEAR</div>
      ${lines.map(l => `<div style="font-family:'Fraunces',serif;font-style:italic;font-size:13.5px;color:var(--ink);line-height:1.55;margin-bottom:4px;">${escapeHtml(l)}</div>`).join('')}
    </div>
  `;
}

// v2.11.1 — LIFE → HABITS LONG VIEW

// Window for the habits view: 28 days (4 weeks) — same shape across all habits regardless of cadence.
const HABITS_VIEW_DAYS = 28;

// Build an array of N most-recent ISO dates, oldest-first.
function lastNDates(n) {
  const out = [];
  const today = new Date(todayISO() + 'T12:00:00');
  for (let i = n - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    out.push(d.toISOString().slice(0, 10));
  }
  return out;
}

// Cell density for a habit on a given date (0 = none, 1-4 levels of brass).
// For binary habits: 0 or 4. For count habits: scaled by completion ratio.
function habitCellDensity(habit, dateISO) {
  const logs = (state.habitLogs || []).filter(l => l.habit_id === habit.id && l.date_iso === dateISO);
  if (!logs.length) return 0;
  const count = logs.reduce((s, l) => s + (l.count || 1), 0);
  const need = habit.count_per_day || 1;
  if (need === 1) return count >= 1 ? 4 : 0;
  const ratio = count / need;
  if (ratio >= 1)    return 4;
  if (ratio >= 0.66) return 3;
  if (ratio >= 0.33) return 2;
  return 1;
}

// Color for a density level (0-4)
function densityColor(level) {
  if (level === 0) return 'var(--surface-2)';
  if (level === 1) return 'rgba(200,155,106,0.30)';
  if (level === 2) return 'rgba(200,155,106,0.55)';
  if (level === 3) return 'rgba(200,155,106,0.78)';
  return 'var(--brass)';  // level 4
}

// Render a daily-cadence grid: 4 rows of 7 cells each, oldest-first across rows.
function dailyHabitGridHTML(habit) {
  const dates = lastNDates(HABITS_VIEW_DAYS);
  const cellSize = 34;
  const gap = 4;
  let cells = '';
  // Display: 4 rows × 7 cols. Oldest week on top, current week on bottom (with "this week" label).
  for (let row = 0; row < 4; row++) {
    for (let col = 0; col < 7; col++) {
      const idx = row * 7 + col;
      const iso = dates[idx];
      if (!iso) continue;
      const isToday = iso === todayISO();
      const density = habitCellDensity(habit, iso);
      const fill = densityColor(density);
      const x = col * (cellSize + gap);
      const y = row * (cellSize / 2.4 + gap);
      cells += `<rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize / 2.4}" rx="3" fill="${fill}"${isToday ? ' stroke="var(--brass)" stroke-width="0.6"' : ''}/>`;
    }
  }
  const totalW = 7 * cellSize + 6 * gap;
  const totalH = 4 * (cellSize / 2.4 + gap);
  return `
    <div style="display:flex;align-items:center;gap:8px;font-size:8.5px;color:var(--ink-faint);letter-spacing:0.06em;margin-bottom:6px;font-family:'Inter',sans-serif;">
      <span>M</span><span style="margin-left:${cellSize - 5}px;">T</span><span style="margin-left:${cellSize - 5}px;">W</span><span style="margin-left:${cellSize - 5}px;">T</span><span style="margin-left:${cellSize - 5}px;">F</span><span style="margin-left:${cellSize - 5}px;">S</span><span style="margin-left:${cellSize - 5}px;">S</span>
    </div>
    <svg width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}" style="display:block;">${cells}</svg>
  `;
}

// Render a weekdays-cadence grid: 4 rows of 5 cells (Mon-Fri only).
function weekdaysHabitGridHTML(habit) {
  const dates = lastNDates(HABITS_VIEW_DAYS);
  // Filter to Mon-Fri only
  const weekdayDates = dates.filter(iso => {
    const dow = new Date(iso + 'T12:00:00').getDay();
    return dow >= 1 && dow <= 5;
  });
  const cellSize = 50;
  const gap = 5;
  let cells = '';
  for (let i = 0; i < weekdayDates.length; i++) {
    const iso = weekdayDates[i];
    const isToday = iso === todayISO();
    const density = habitCellDensity(habit, iso);
    const fill = densityColor(density);
    const row = Math.floor(i / 5);
    const col = i % 5;
    const x = col * (cellSize + gap);
    const y = row * (cellSize / 2.4 + gap);
    cells += `<rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize / 2.4}" rx="3" fill="${fill}"${isToday ? ' stroke="var(--brass)" stroke-width="0.6"' : ''}/>`;
  }
  const totalRows = Math.ceil(weekdayDates.length / 5);
  const totalW = 5 * cellSize + 4 * gap;
  const totalH = totalRows * (cellSize / 2.4 + gap);
  return `
    <div style="display:flex;align-items:center;gap:8px;font-size:8.5px;color:var(--ink-faint);letter-spacing:0.06em;margin-bottom:6px;font-family:'Inter',sans-serif;">
      <span>M</span><span style="margin-left:${cellSize - 5}px;">T</span><span style="margin-left:${cellSize - 5}px;">W</span><span style="margin-left:${cellSize - 5}px;">T</span><span style="margin-left:${cellSize - 5}px;">F</span>
    </div>
    <svg width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}" style="display:block;">${cells}</svg>
  `;
}

// Render a weekly-cadence grid: single horizontal track of 4 wider cells (4 weeks).
function weeklyHabitGridHTML(habit) {
  // Compute the last 4 weeks (Sunday-start). For each, check if any log exists in that week.
  const today = new Date(todayISO() + 'T12:00:00');
  const dow = today.getDay();
  const thisWeekStart = new Date(today);
  thisWeekStart.setDate(today.getDate() - dow);

  const weeks = [];
  for (let w = 3; w >= 0; w--) {
    const weekStart = new Date(thisWeekStart);
    weekStart.setDate(thisWeekStart.getDate() - w * 7);
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekStart.getDate() + 6);
    const startISO = weekStart.toISOString().slice(0, 10);
    const endISO = weekEnd.toISOString().slice(0, 10);
    const hasLog = (state.habitLogs || []).some(l => l.habit_id === habit.id && l.date_iso >= startISO && l.date_iso <= endISO);
    weeks.push({ startISO, endISO, hasLog, isCurrent: w === 0 });
  }

  const cellW = 78;
  const cellH = 26;
  const gap = 8;
  let cells = '';
  weeks.forEach((wk, i) => {
    const x = i * (cellW + gap);
    const fill = wk.hasLog ? 'var(--brass)' : 'var(--surface-2)';
    const stroke = wk.isCurrent && !wk.hasLog ? 'stroke="var(--brass-dim)" stroke-width="0.6" stroke-dasharray="3 2"' : '';
    cells += `<rect x="${x}" y="0" width="${cellW}" height="${cellH}" rx="6" fill="${fill}" ${stroke}/>`;
  });
  const totalW = 4 * cellW + 3 * gap;
  return `<svg width="${totalW}" height="${cellH}" viewBox="0 0 ${totalW} ${cellH}" style="display:block;">${cells}</svg>`;
}

// Generate observation prose for a habit based on its 28-day pattern.
function habitObservationProse(habit) {
  const dates = lastNDates(HABITS_VIEW_DAYS);
  const recentDates = dates.slice(-7);   // last 7 days
  const olderDates  = dates.slice(0, 7); // first 7 days of window (3 weeks ago)

  const recentDone = recentDates.filter(d => habitCellDensity(habit, d) > 0).length;
  const olderDone  = olderDates.filter(d => habitCellDensity(habit, d) > 0).length;
  const totalDone  = dates.filter(d => habitCellDensity(habit, d) > 0).length;
  const ratio      = totalDone / dates.length;

  // Weekly habits use a different prose
  if (habit.cadence === 'weekly') {
    const today = new Date(todayISO() + 'T12:00:00');
    const dow = today.getDay();
    const thisWeekStart = new Date(today);
    thisWeekStart.setDate(today.getDate() - dow);
    let weeksDone = 0;
    for (let w = 0; w < 4; w++) {
      const weekStart = new Date(thisWeekStart);
      weekStart.setDate(thisWeekStart.getDate() - w * 7);
      const weekEnd = new Date(weekStart);
      weekEnd.setDate(weekStart.getDate() + 6);
      const startISO = weekStart.toISOString().slice(0, 10);
      const endISO = weekEnd.toISOString().slice(0, 10);
      if ((state.habitLogs || []).some(l => l.habit_id === habit.id && l.date_iso >= startISO && l.date_iso <= endISO)) weeksDone++;
    }
    if (weeksDone === 4) return `Held all four weeks. The rhythm is steady.`;
    if (weeksDone === 3) return `Three of the last four weeks. Mostly held.`;
    if (weeksDone === 2) return `Two of the last four. The rhythm is uncertain.`;
    if (weeksDone === 1) return `Once in four weeks. Worth choosing it again.`;
    return `Quiet for a month. Worth a return.`;
  }

  // Daily / weekdays
  if (totalDone === 0) {
    return `Quiet across the four weeks. The image was named — when does it return?`;
  }
  if (ratio >= 0.85) {
    return `Held with strength — ${totalDone} of ${dates.length} days. The rhythm is yours.`;
  }
  if (ratio >= 0.6) {
    if (recentDone > olderDone) return `Thickening — ${totalDone} of ${dates.length} days, with the last week firmer than the first.`;
    if (recentDone < olderDone) return `Loosening lately — ${totalDone} of ${dates.length} overall, but the recent week thinner.`;
    return `Steady — ${totalDone} of ${dates.length} days. Held more than missed.`;
  }
  if (ratio >= 0.3) {
    if (recentDone > olderDone) return `Returning — ${totalDone} of ${dates.length} days, with the recent week stronger.`;
    return `Thin so far — ${totalDone} of ${dates.length} days. The image is waiting.`;
  }
  return `Mostly absent — only ${totalDone} of ${dates.length} days. ${habit.note ? `"${habit.note}" — worth a return.` : `Worth a return.`}`;
}

function lifeHabitsHTML() {

    return `
      <div style="padding:48px 16px;text-align:center;">

          No practices yet.<br>The shape begins when you name one.
        </div>
        <button class="btn-primary" onclick="openHabitCreateSheet()" style="width:auto;padding:10px 22px;">+ Name a practice</button>
      </div>
    `;
  }

  const habitCardHTML = (h) => {
    const grid =
      h.cadence === 'weekly'   ? weeklyHabitGridHTML(h) :
      h.cadence === 'weekdays' ? weekdaysHabitGridHTML(h) :
                                 dailyHabitGridHTML(h);
    const dates = lastNDates(HABITS_VIEW_DAYS);
    const totalDone = dates.filter(d => habitCellDensity(h, d) > 0).length;
    const need = h.count_per_day || 1;
    let countLabel;
    if (h.cadence === 'weekly') {
      countLabel = `${totalDone > 0 ? totalDone : 0} weeks`;
    } else if (need > 1) {
      const totalParts = (state.habitLogs || []).filter(l => l.habit_id === h.id && dates.includes(l.date_iso)).reduce((s, l) => s + (l.count || 1), 0);
      const possibleParts = h.cadence === 'weekdays' ? Math.round(dates.length * 5/7) * need : dates.length * need;
      countLabel = `${totalParts} OF ${possibleParts} PARTS`;
    } else {
      const possible = h.cadence === 'weekdays' ? Math.round(dates.length * 5/7) : dates.length;
      countLabel = `${totalDone} OF ${possible} DAYS`;
    }

    const isRetired = !!h.retired_at;
    const obsLine = !isRetired ? habitObservationProse(h) : `Retired ${(new Date(h.retired_at)).toISOString().slice(0,10)}. The practice ran for a season.`;

    return `
      <div style="padding:18px 0;${isRetired ? 'opacity:0.6;' : ''}">
        <button onclick="${isRetired ? '' : `openHabitCreateSheet('${h.id}')`}" style="display:flex;align-items:flex-start;width:100%;gap:12px;background:none;border:none;color:inherit;font-family:inherit;cursor:${isRetired ? 'default' : 'pointer'};text-align:left;padding:0 0 12px;">
          <div style="font-size:20px;line-height:1;flex-shrink:0;margin-top:2px;">${h.emoji || '✨'}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-family:'Fraunces',serif;font-size:16px;color:var(--ink);font-weight:400;line-height:1.2;">${escapeHtml(h.title)}</div>
            ${h.note ? `<div style="font-family:'Fraunces',serif;font-style:italic;font-size:11.5px;color:var(--ink-muted);margin-top:2px;line-height:1.35;">"${escapeHtml(h.note)}"</div>` : ''}
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-family:ui-monospace,monospace;font-size:14px;color:var(--ink);font-weight:400;line-height:1.1;">${countLabel.split(' ')[0]}</div>
            <div style="font-size:8.5px;color:var(--ink-faint);letter-spacing:0.08em;font-family:'Inter',sans-serif;font-weight:500;margin-top:2px;">${countLabel.split(' ').slice(1).join(' ')}</div>
          </div>
        </button>

        <div style="margin-top:8px;">${grid}</div>

        <div style="font-family:'Fraunces',serif;font-style:italic;font-size:12.5px;color:var(--ink-muted);line-height:1.55;margin-top:14px;">${escapeHtml(obsLine)}</div>
      </div>
    `;
  };

  const activeBlock = habits.map(habitCardHTML).join('<div style="height:0.5px;background:var(--line);margin:0;"></div>');
  const retiredBlock = retiredHabits.length ? `
    <div style="height:0.5px;background:var(--line);margin:24px 0;"></div>
    <div style="font-size:9.5px;letter-spacing:0.16em;color:var(--ink-faint);font-weight:500;margin-bottom:4px;font-family:'Inter',sans-serif;">RETIRED · ${retiredHabits.length}</div>
    ${retiredHabits.map(habitCardHTML).join('<div style="height:0.5px;background:var(--line);margin:0;"></div>')}
  ` : '';

  const createBtn = `
    <div style="margin-top:24px;">
      <button onclick="openHabitCreateSheet()" style="display:flex;align-items:center;justify-content:center;width:100%;padding:12px;background:transparent;border:0.5px dashed var(--brass-dim);border-radius:12px;color:var(--brass);font-family:inherit;font-size:12px;cursor:pointer;letter-spacing:0.02em;font-weight:500;">+ Name a practice</button>
    </div>
  `;

  return `
    <div style="padding:6px 0;">
      ${activeBlock}
      ${retiredBlock}
      ${createBtn}
    </div>
  `;
}

// Habits section for the WEEK segment.
// Each habit shows: emoji + title, small count, 7-cell horizontal strip.
// No prose at this scale — the strip says it.
function weekHabitsSectionHTML() {
  const habits = activeHabits();
  if (!habits.length) return '';

  // 7 dates: Mon-Sun of current week (or last 7 days). Use last-7 to align with Today.
  const dates = lastNDates(7);

  const rowHTML = (h) => {
    const need = h.count_per_day || 1;
    let countLabel;
    if (h.cadence === 'weekly') {
      const hasLog = (state.habitLogs || []).some(l => l.habit_id === h.id && dates.includes(l.date_iso));
      countLabel = hasLog ? 'this week' : '—';
    } else if (need > 1) {
      const totalParts = (state.habitLogs || []).filter(l => l.habit_id === h.id && dates.includes(l.date_iso)).reduce((s, l) => s + (l.count || 1), 0);
      const possible = h.cadence === 'weekdays' ? 5 * need : 7 * need;
      countLabel = `${totalParts}/${possible}`;
    } else {
      const totalDone = dates.filter(d => habitCellDensity(h, d) > 0).length;
      const possible = h.cadence === 'weekdays' ? 5 : 7;
      countLabel = `${totalDone}/${possible}`;
    }

    // 7-cell horizontal strip
    const cellW = 18;
    const cellH = 13;
    const gap = 3;
    let cells = '';
    for (let i = 0; i < 7; i++) {
      const iso = dates[i];
      const isToday = iso === todayISO();
      const dow = new Date(iso + 'T12:00:00').getDay();
      const isWeekendForWeekdays = h.cadence === 'weekdays' && (dow === 0 || dow === 6);
      const density = habitCellDensity(h, iso);
      const fill = isWeekendForWeekdays ? 'transparent' : densityColor(density);
      const stroke = isToday ? ' stroke="var(--brass)" stroke-width="0.6"' : (isWeekendForWeekdays ? ' stroke="var(--line)" stroke-width="0.4" stroke-dasharray="2 2"' : '');
      cells += `<rect x="${i * (cellW + gap)}" y="0" width="${cellW}" height="${cellH}" rx="3" fill="${fill}"${stroke}/>`;

        </div>
        <svg width="${totalW}" height="${cellH}" viewBox="0 0 ${totalW} ${cellH}" style="flex-shrink:0;">${cells}</svg>
        <div style="font-family:ui-monospace,monospace;font-size:11px;color:var(--ink-muted);min-width:36px;text-align:right;">${countLabel}</div>
      </button>
    `;
  };

  return `
    <div class="section-h" style="margin-top:24px;">What you embodied</div>
    <div style="padding:0 0 4px;">
      ${habits.map(rowHTML).join('')}
      <button onclick="openHabitCreateSheet()" style="display:flex;align-items:center;justify-content:center;width:100%;padding:11px;background:transparent;border:0.5px dashed var(--brass-dim);border-radius:10px;color:var(--brass);font-family:inherit;font-size:11.5px;cursor:pointer;margin-top:14px;letter-spacing:0.02em;font-weight:500;">+ Name a practice</button>
    </div>
  `;
}

function monthHabitsSectionHTML() {

  const retiredInWindow = (state.habits || []).filter(h => h.retired_at && (Date.now() - new Date(h.retired_at).getTime()) < HABITS_VIEW_DAYS * 86400000);
  if (!habits.length && !retiredInWindow.length) return '';

      h.cadence === 'weekly'   ? weeklyHabitGridHTML(h) :

                                 dailyHabitGridHTML(h);
    const dates = lastNDates(HABITS_VIEW_DAYS);
    const totalDone = dates.filter(d => habitCellDensity(h, d) > 0).length;
    const need = h.count_per_day || 1;
    let countLabel;
    if (h.cadence === 'weekly') {

    } else {
      const possible = h.cadence === 'weekdays' ? Math.round(dates.length * 5/7) : dates.length;

    const obsLine = !isRetired ? habitObservationProse(h) : `Retired ${(new Date(h.retired_at)).toISOString().slice(0,10)}. The practice ran for a season.`;

// Habits section for the YEAR segment.
// 12-month strip per habit, density-shaded by completion ratio of that month.
function yearHabitsSectionHTML() {
  const habits = activeHabits();
  const retired = (state.habits || []).filter(h => h.retired_at);
  if (!habits.length && !retired.length) return '';

  // Compute the last 12 months as anchor dates (start of each month).
  const today = new Date(todayISO() + 'T12:00:00');
  const months = [];
  for (let i = 11; i >= 0; i--) {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    months.push(d);
  }

  // For a habit, compute its monthly density (0-4 levels) for each of the 12 months.
  const monthDensity = (h, monthDate) => {
    const yr = monthDate.getFullYear();
    const mo = monthDate.getMonth();
    const lastDay = new Date(yr, mo + 1, 0).getDate();
    const startISO = new Date(yr, mo, 1).toISOString().slice(0, 10);
    const endISO = new Date(yr, mo, lastDay).toISOString().slice(0, 10);

    const hCreated = new Date(h.created_at);
    const monthEnd = new Date(yr, mo, lastDay);
    if (hCreated > monthEnd) return -1;  // habit didn't exist yet — return sentinel

    if (h.cadence === 'weekly') {
      // Weeks-in-month rough approximation: count distinct ISO weeks logged
      const logs = (state.habitLogs || []).filter(l => l.habit_id === h.id && l.date_iso >= startISO && l.date_iso <= endISO);
      const weeks = new Set();
      for (const l of logs) {
        const dt = new Date(l.date_iso + 'T12:00:00');
        const wk = Math.floor(dt.getDate() / 7);
        weeks.add(wk);
      }
      const possibleWeeks = 4;
      const ratio = weeks.size / possibleWeeks;
      if (ratio >= 1)    return 4;
      if (ratio >= 0.66) return 3;
      if (ratio >= 0.33) return 2;
      if (ratio > 0)     return 1;
      return 0;
    }

    const need = h.count_per_day || 1;
    const logs = (state.habitLogs || []).filter(l => l.habit_id === h.id && l.date_iso >= startISO && l.date_iso <= endISO);
    if (!logs.length) return 0;

    if (need === 1) {
      const distinctDays = new Set(logs.map(l => l.date_iso)).size;
      const possible = h.cadence === 'weekdays' ? Math.round(lastDay * 5/7) : lastDay;
      const ratio = distinctDays / possible;
      if (ratio >= 0.85) return 4;
      if (ratio >= 0.6)  return 3;
      if (ratio >= 0.3)  return 2;
      return 1;
    }
    // Count habit
    const totalParts = logs.reduce((s, l) => s + (l.count || 1), 0);
    const possibleParts = (h.cadence === 'weekdays' ? Math.round(lastDay * 5/7) : lastDay) * need;
    const ratio = totalParts / possibleParts;
    if (ratio >= 0.85) return 4;
    if (ratio >= 0.6)  return 3;
    if (ratio >= 0.3)  return 2;
    return 1;
  };

  const yearProse = (h) => {
    const monthsActive = months.filter(m => monthDensity(h, m) > 0).length;
    const totalMonths = months.filter(m => monthDensity(h, m) >= 0).length;
    if (totalMonths === 0) return `Recently begun.`;
    if (totalMonths <= 3) {
      // Still a young practice — different language scale
      if (monthsActive === totalMonths) return `Held every month since beginning.`;
      if (monthsActive > 0)              return `Held ${monthsActive} of ${totalMonths} months since beginning.`;
      return `Quiet so far.`;
    }
    if (monthsActive === totalMonths && totalMonths >= 6) return `Held across all ${totalMonths} months. The practice took root.`;
    if (monthsActive === totalMonths) return `Held every month — ${totalMonths} so far.`;
    if (monthsActive >= totalMonths * 0.66) return `Held in ${monthsActive} of ${totalMonths} months. A long thread.`;
    if (monthsActive >= totalMonths * 0.33) return `Held in ${monthsActive} of ${totalMonths} months. Came and went with the seasons.`;
    if (monthsActive > 0) return `${monthsActive} of ${totalMonths} months. The shape is sparse.`;
    return `Quiet across the year.`;
  };

  const habitRowHTML = (h, isRetired) => {
    const cellW = 22;
    const cellH = 16;
    const gap = 3;
    let cells = '';
    months.forEach((m, i) => {
      const density = monthDensity(h, m);
      const fill = density === -1 ? 'transparent' : (density === 0 ? 'var(--surface-2)' : densityColor(density));
      const stroke = density === -1 ? ' stroke="var(--line)" stroke-width="0.4" stroke-dasharray="2 2"' : '';
      cells += `<rect x="${i * (cellW + gap)}" y="0" width="${cellW}" height="${cellH}" rx="2" fill="${fill}"${stroke}/>`;
    });
    const totalW = 12 * cellW + 11 * gap;

    return `
      <div style="padding:14px 0;${isRetired ? 'opacity:0.55;' : ''}">
        <button onclick="${isRetired ? '' : `openHabitCreateSheet('${h.id}')`}" style="display:flex;align-items:flex-start;width:100%;gap:12px;background:none;border:none;color:inherit;font-family:inherit;cursor:${isRetired ? 'default' : 'pointer'};text-align:left;padding:0;">
          <div style="font-size:18px;line-height:1;flex-shrink:0;margin-top:1px;">${h.emoji || '✨'}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-family:'Fraunces',serif;font-size:14.5px;color:var(--ink);font-weight:400;line-height:1.2;">${escapeHtml(h.title)}</div>
            ${h.note ? `<div style="font-family:'Fraunces',serif;font-style:italic;font-size:10.5px;color:var(--ink-muted);margin-top:1px;line-height:1.35;">"${escapeHtml(h.note)}"</div>` : ''}
          </div>
        </button>
        <div style="margin-top:10px;">
          <svg width="${totalW}" height="${cellH}" viewBox="0 0 ${totalW} ${cellH}" style="display:block;">${cells}</svg>
        </div>
        <div style="font-family:'Fraunces',serif;font-style:italic;font-size:11.5px;color:var(--ink-muted);line-height:1.5;margin-top:8px;">${escapeHtml(yearProse(h))}</div>
      </div>
    `;
  };

  const activeBlock = habits.map(h => habitRowHTML(h, false)).join('<div style="height:0.5px;background:var(--line);margin:0;"></div>');
  const retiredBlock = retired.length ? `
    <div style="height:0.5px;background:var(--line);margin:14px 0;"></div>
    <div style="font-size:9.5px;letter-spacing:0.16em;color:var(--ink-faint);font-weight:500;margin-bottom:4px;font-family:'Inter',sans-serif;">RETIRED · ${retired.length}</div>
    ${retired.map(h => habitRowHTML(h, true)).join('<div style="height:0.5px;background:var(--line);margin:0;"></div>')}
  ` : '';

  return `
    <div class="section-h" style="margin-top:24px;">Practices through the year</div>
    ${activeBlock}
    ${retiredBlock}
  `;
}

// ME TAB
// ═══════════════════════════════════════════════════════════════════════
function renderMe() {
  const nm = (state.profile && state.profile.name) || 'there';

  // ── Portrait stats
  const startISO = state.startDate || todayISO();
  const startDate = new Date(startISO + 'T00:00:00');
  const daysKept = Math.max(1, Math.floor((Date.now() - startDate.getTime()) / 86400000) + 1);

  const examenCount = (state.examens || []).filter(e => e.completed_at).length;
  const captureCount = (state.captures || []).length;
  const chaptersAll = state.chapters || [];
  const closedChapters = chaptersAll.filter(c => c.end_date);
  const activeChapter = chaptersAll.find(c => !c.end_date);
  const closedCount = closedChapters.length;
  const activeHabitCount = (state.habits || []).filter(h => !h.retired_at).length;

  // Active chapter label + day count
  let activeLine = '';
  if (activeChapter) {
    const chStart = new Date((activeChapter.start_date || todayISO()) + 'T12:00:00');
    const chDays = Math.max(1, Math.floor((Date.now() - chStart.getTime()) / 86400000) + 1);
    activeLine = `In the chapter "${activeChapter.title}" — day ${chDays}.`;
  } else if (chaptersAll.length === 0) {
    activeLine = 'No chapter named yet.';
  } else {
    activeLine = 'Between chapters.';
  }

  // Compose the portrait paragraph
  const portraitBits = [];
  portraitBits.push(`You've kept Kuzuri for ${daysKept} ${daysKept === 1 ? 'day' : 'days'}.`);
  const inner = [];
  if (examenCount) inner.push(`written ${examenCount} ${examenCount === 1 ? 'examen' : 'examens'}`);
  if (captureCount) inner.push(`captured ${captureCount} ${captureCount === 1 ? 'thought' : 'thoughts'}`);
  if (closedCount) inner.push(`closed ${closedCount} ${closedCount === 1 ? 'chapter' : 'chapters'}`);
  if (activeHabitCount) inner.push(`embodying ${activeHabitCount} ${activeHabitCount === 1 ? 'practice' : 'practices'}`);
  if (inner.length) {
    // Capitalize first letter
    const innerStr = inner.join(', ');
    portraitBits.push(innerStr.charAt(0).toUpperCase() + innerStr.slice(1) + '.');
  }
  const portraitText = portraitBits.join(' ');

  // ── Quote card — pulled from captures or recent examen pinnings
  let quoteBlock = '';
  // Captures are stored oldest-first OR newest-first depending on push order — find by ts to be safe
  const allCaptures = [...(state.captures || [])]
    .filter(c => c.text && c.text.trim().length > 20 && c.text.trim().length < 200)
    .sort((a, b) => new Date(b.ts || b.created_at || 0).getTime() - new Date(a.ts || a.created_at || 0).getTime());
  const captureWithText = allCaptures[0];
  const recentExamenSnippet = (() => {
    const allExamens = [...(state.examens || [])]
      .filter(e => e.completed_at)
      .sort((a, b) => new Date(b.completed_at).getTime() - new Date(a.completed_at).getTime());
    const recent = allExamens[0];
    if (!recent) return null;
    const text = (recent.went_well || '').trim();
    if (text.length > 20 && text.length < 200) return text;
    return null;
  })();
  const quoteText = (captureWithText && captureWithText.text) || recentExamenSnippet;

        <div style="font-family:'Fraunces',serif;font-size:15px;color:var(--ink);font-weight:400;line-height:1.2;">Subscriptions</div>

  // ── Journey section — closed chapters as small cards
  let journeyBlock = '';
  if (closedChapters.length) {
    const cards = closedChapters.slice().reverse().map(ch => {
      const chStart = new Date(ch.start_date + 'T12:00:00');
      const chEnd = new Date((ch.end_date || todayISO()) + 'T12:00:00');
      const chDays = Math.max(1, Math.floor((chEnd.getTime() - chStart.getTime()) / 86400000) + 1);
      const reflectionSnip = (ch.reflection_text || '').trim().split(/[.!?]/)[0].slice(0, 90);
      return `
        <button onclick="openChapterDetail('${ch.id}')" style="display:block;width:100%;padding:14px 16px;background:var(--surface-2);border:0.5px solid var(--line);border-radius:12px;color:inherit;font-family:inherit;cursor:pointer;text-align:left;margin-bottom:10px;">
          <div style="font-size:9px;letter-spacing:0.14em;color:var(--ink-faint);font-weight:500;font-family:'Inter',sans-serif;text-transform:uppercase;margin-bottom:6px;">${escapeHtml(ch.title)} · ${chDays} ${chDays === 1 ? 'DAY' : 'DAYS'}</div>
          ${reflectionSnip ? `<div style="font-family:'Fraunces',serif;font-style:italic;font-size:12.5px;color:var(--ink-muted);line-height:1.45;">"${escapeHtml(reflectionSnip)}${(ch.reflection_text || '').trim().length > 90 ? '…' : ''}"</div>` : `<div style="font-family:'Fraunces',serif;font-style:italic;font-size:12px;color:var(--ink-faint);line-height:1.45;">No reflection written.</div>`}

    journeyBlock = `

      <div style="font-family:'Fraunces',serif;font-style:italic;font-size:11.5px;color:var(--ink-muted);margin:-6px 0 14px;">${closedChapters.length} closed ${closedChapters.length === 1 ? 'chapter' : 'chapters'}. Tap to read.</div>
      ${cards}
    `;
  }

  // ── Settings link
  const settingsBlock = `
    <div style="height:0.5px;background:var(--line);margin:28px 0 0;"></div>
    <button onclick="openSettingsOverlay()" style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:18px 0;background:none;border:none;color:inherit;font-family:inherit;cursor:pointer;text-align:left;">

    <div style="text-align:center;padding:8px 0 32px;">
      <div style="font-family:'Fraunces',serif;font-style:italic;font-size:13px;color:var(--ink-muted);">Kuzuri · v3.0.0</div>

  document.getElementById('screen-me').innerHTML = `
    <div class="today-header">

function whoopSettingsTileHTML() {

  const lastStr = last ? whoopRelTime(last) : null;

      <button class="setting-row" onclick="startWhoopOAuth()">

        <div class="value" style="color:var(--brass);">Connect</div>
      </button>
    `;
  }
  return `
    <button class="setting-row" onclick="syncWhoop()">
      <div class="label">Whoop ${profileName ? `<span style="color:var(--ink-faint);font-size:10px;font-style:italic;font-family:'Fraunces',serif;">· ${escapeHtml(profileName)}</span>` : ''}</div>
      <div class="value" style="color:var(--accent-bright);">${lastStr || 'Sync now'}</div>
    </button>
    <button class="setting-row" onclick="confirmDisconnectWhoop()">
      <div class="label" style="color:var(--ink-muted);">Disconnect Whoop</div>
      <div class="value">×</div>
    </button>
  `;
}

function whoopRelTime(iso) {
  try {
    const ms = Date.now() - new Date(iso).getTime();
    if (ms < 60_000) return 'just now';
    if (ms < 3600_000) return Math.round(ms / 60_000) + 'm ago';
    if (ms < 86400_000) return Math.round(ms / 3600_000) + 'h ago';
    const d = Math.round(ms / 86400_000);
    return d === 1 ? 'yesterday' : d + 'd ago';
  } catch (e) { return ''; }
}

function confirmDisconnectWhoop() {

// ═══════════════════════════════════════════════════════════════════════
// SUBSCRIPTIONS — Bobby-style list, Stoic treatment (annualized cost shown)
// ═══════════════════════════════════════════════════════════════════════
function subscriptionAnnualCost(sub) {
  const amt = parseFloat(sub.amount);
  if (!isFinite(amt)) return 0;
  return sub.period === 'yearly' ? amt : amt * 12;
}
function subscriptionsAnnualTotal() {
  return (state.subscriptions || []).reduce((sum, s) => sum + subscriptionAnnualCost(s), 0);
}
function subscriptionsAnnualLabel() {
  const n = subscriptionsAnnualTotal();
  return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
}

function openSubscriptions() {
  const subs = [...(state.subscriptions || [])].sort((a, b) => subscriptionAnnualCost(b) - subscriptionAnnualCost(a));
  const total = subscriptionsAnnualTotal();
  const monthly = total / 12;

  const list = subs.length ? subs.map(s => {
    const annual = subscriptionAnnualCost(s);
    const periodLabel = s.period === 'yearly' ? 'yr' : 'mo';
    const monthlyAmt = s.period === 'yearly' ? (annual / 12) : parseFloat(s.amount);
    return `
      <button class="detail-row" onclick="editSubscription('${s.id}')">
        <div style="flex:1;min-width:0;">
          <div class="lab">${escapeHtml(s.name)}</div>
          ${s.category ? `<div style="font-size:10.5px;color:var(--ink-faint);letter-spacing:0.02em;margin-top:2px;">${escapeHtml(s.category)}</div>` : ''}
        </div>
        <div style="text-align:right;">
          <div class="val brass" style="font-family:ui-monospace,monospace;font-size:12.5px;">$${annual.toLocaleString('en-US', { maximumFractionDigits: 0 })}/yr</div>
          <div style="font-size:10px;color:var(--ink-faint);font-family:ui-monospace,monospace;margin-top:2px;">$${s.amount}/${periodLabel}</div>
        </div>
      </button>
    `;
  }).join('') : `
    <div class="touch-empty" style="padding:36px 0;">No subscriptions tracked yet.</div>
  `;

  openOverlay(`
    <div class="today-header" style="margin-bottom:18px;">
      <div class="today-header-l">
        <div class="today-date">Money</div>
        <div class="today-title">What you pay for</div>
      </div>
    </div>
    <div style="font-family:'Fraunces',serif;font-style:italic;font-size:13.5px;color:var(--ink-muted);line-height:1.55;margin-bottom:18px;">
      Annual cost is the honest number. Monthly hides it.
    </div>

    ${subs.length ? `
      <div class="detail-stats" style="margin-bottom:16px;">
        <div class="close-stat">
          <div class="close-stat-n">${subs.length}</div>
          <div class="close-stat-l">Services</div>
        </div>
        <div class="close-stat">
          <div class="close-stat-n brass" style="color:var(--brass);">$${monthly.toFixed(0)}</div>
          <div class="close-stat-l">/month</div>
        </div>
        <div class="close-stat">
          <div class="close-stat-n brass" style="color:var(--brass);">$${total.toLocaleString('en-US', { maximumFractionDigits: 0 })}</div>
          <div class="close-stat-l">/year</div>
        </div>
      </div>
    ` : ''}

    ${list}

    <button class="btn-full" onclick="addSubscription()" style="margin-top:16px;">
      ${subs.length ? '+ Add another' : '+ Add a subscription'}
    </button>
  `);
}

      <input type="text" id="sub-category" class="modal-input" placeholder="Streaming, tools, storage..." value="${escapeHtml(existing && existing.category ? existing.category : '')}" style="margin-bottom:0;">

    <div style="display:flex;gap:8px;">

function setSubPeriod(p) {
  window.__subPeriod = p;
  const m = document.getElementById('sub-period-monthly');
  const y = document.getElementById('sub-period-yearly');
  if (m && y) {
    m.style.background = p === 'monthly' ? 'var(--surface)' : 'transparent';
    m.style.color = p === 'monthly' ? 'var(--ink)' : 'var(--ink-muted)';
    y.style.background = p === 'yearly' ? 'var(--surface)' : 'transparent';
    y.style.color = p === 'yearly' ? 'var(--ink)' : 'var(--ink-muted)';
  }
}
function saveSubscription(id, isNew) {
  const name = (document.getElementById('sub-name')?.value || '').trim();
  const amountRaw = (document.getElementById('sub-amount')?.value || '').trim();
  const category = (document.getElementById('sub-category')?.value || '').trim();
  const period = window.__subPeriod || 'monthly';
  const amount = parseFloat(amountRaw);
  if (!name) { toast('Name it'); return; }
  if (!isFinite(amount) || amount <= 0) { toast('Amount?'); return; }
  if (isNew || !id) {
    state.subscriptions = state.subscriptions || [];
    state.subscriptions.push({
      id: uid(), name, amount: amount.toFixed(2), period, category: category || null,
    });
  } else {
    const s = state.subscriptions.find(x => x.id === id);
    if (!s) return;
    s.name = name;
    s.amount = amount.toFixed(2);
    s.period = period;
    s.category = category || null;
  }
  saveState();
  openSubscriptions();
  toast(isNew ? 'Added' : 'Saved');
}
function deleteSubscription(id) {
  const s = (state.subscriptions || []).find(x => x.id === id);
  if (!s) return;
  if (!confirm(`Stop tracking ${s.name}? (This doesn't cancel the subscription itself.)`)) return;
  state.subscriptions = state.subscriptions.filter(x => x.id !== id);
  saveState();
  openSubscriptions();
  toast('Removed');
}

function saveNewExercise() {
  const sessionId = window.__newExSessionId;
  const sess = state.program.sessions[sessionId];
  if (!sess) { closeModal(); return; }
  const name = (document.getElementById('new-ex-name')?.value || '').trim();
  const setsN = parseInt(document.getElementById('new-ex-sets')?.value || '3', 10) || 3;
  const range = (document.getElementById('new-ex-range')?.value || '').trim() || '6-8';

  if (!name) { toast('Exercise name?'); return; }
  sess.exercises = sess.exercises || [];
  const code = String.fromCharCode(65 + sess.exercises.length);
  sess.exercises.push({
    code, name,
    sets: Array.from({ length: setsN }, () => ({ range, intensity })),
  });
  saveState();
  closeModal();
  editSession(sessionId);

function editSession(sessionId) {
  const sess = state.program.sessions[sessionId];
  if (!sess) return;

  const prepList = (sess.exercises || []).filter(e => e.prep);
  const workList = (sess.exercises || []).filter(e => !e.prep);

  const renderExRow = (ex) => {
    const firstRange = ex.sets && ex.sets[0] ? ex.sets[0].range : '—';
    const rangeStr = ex.sets.every(s => s.range === firstRange)
      ? firstRange
      : ex.sets.map(s => s.range).join(' · ');
    const firstInt = ex.sets && ex.sets[0] ? ex.sets[0].intensity : '';
    const intStr = ex.sets.every(s => s.intensity === firstInt)
      ? firstInt
      : ex.sets.map(s => s.intensity).join(' · ');
    const lastStr = ex.last ? (
      ex.last.filter(s => s).map(s => s.weight + (s.reps ? '×' + s.reps : '')).join(', ')
    ) : '';
    return `
      <div class="picker-card" style="margin-bottom:6px;cursor:default;padding:12px 14px;">
        <div style="display:flex;align-items:baseline;gap:6px;">
          <span style="font-family:ui-monospace,monospace;font-size:10px;color:var(--ink-muted);letter-spacing:0.04em;">${ex.code}</span>
          <div class="picker-card-title" style="font-size:14px;">${escapeHtml(ex.name)}</div>
        </div>
        <div class="picker-card-meta" style="margin-top:3px;">${(ex.sets || []).length} × ${escapeHtml(rangeStr)}${intStr ? ' · ' + escapeHtml(intStr) : ''}</div>
        ${ex.note ? `<div style="font-family:'Fraunces',serif;font-style:italic;font-size:11px;color:var(--brass);margin-top:6px;line-height:1.4;">${escapeHtml(ex.note)}</div>` : ''}
        ${lastStr ? `<div style="font-size:10.5px;color:var(--ink-faint);margin-top:4px;font-family:ui-monospace,monospace;letter-spacing:0.01em;">last: ${escapeHtml(lastStr)}</div>` : ''}
      </div>
    `;
  };

  const prepBlock = prepList.length ? `
    <div class="section-h" style="margin-top:8px;">Prep</div>
    ${prepList.map(renderExRow).join('')}
  ` : '';
  const workBlock = workList.length ? `
    <div class="section-h">Work</div>
    ${workList.map(renderExRow).join('')}
  ` : '';

  openOverlay(`
    <div class="today-header">
      <div class="today-header-l">
        <div class="today-date">Session</div>
        <div class="today-title">${escapeHtml(sess.name)}</div>
      </div>

      ${workList.length} exercises${prepList.length ? ` · ${prepList.length} prep` : ''} · tap &ldquo;Start&rdquo; on Train to begin.
    </div>
    ${prepBlock}
    ${workBlock}
    <button class="btn-full" onclick="addExerciseToSession('${sessionId}')" style="margin-top:16px;">+ Add exercise</button>
    <button class="btn-secondary" style="width:100%;margin-top:8px;" onclick="openProgramEditor()">Back</button>
  `);
}
function removeExerciseFromSession(sessionId, exIdx) {
  const sess = state.program.sessions[sessionId];
  if (!sess || !sess.exercises) return;
  sess.exercises.splice(exIdx, 1);
  // Re-letter
  sess.exercises.forEach((ex, i) => { ex.code = String.fromCharCode(65 + i); });
  saveState();
  editSession(sessionId);
}
function deleteSession(sessionId) {
  if (!confirm('Delete this session?')) return;
  delete state.program.sessions[sessionId];
  saveState();
  openProgramEditor();
}

function reloadDefaultProgram() {
  const hasCustom = state.program && state.program.sessions && Object.keys(state.program.sessions).length;
  const warn = hasCustom
    ? 'Replace your current program with the Upper/Lower split? Your logged workouts stay — only the program template resets.'
    : 'Load the default Upper/Lower program?';
  if (!confirm(warn)) return;
  state.program = seedDefaultProgram();
  saveState();
  render();
  toast('Program reloaded');
}

// Format minutes as "12 min" (under 60) or "1h 23m" (60+)
function formatDurationMin(min) {
  if (!isFinite(min) || min <= 0) return '—';
  if (min < 60) return `${min} min`;
  const h = Math.floor(min / 60);
  const m = min % 60;
  return m === 0 ? `${h}h` : `${h}h ${m}m`;
}
