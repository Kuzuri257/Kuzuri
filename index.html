// WHOOP INTEGRATION (v3.0)
// Backend: Cloudflare Worker at WORKER_BASE_URL
// Sync runs:
//   - On app load if URL has ?whoop=connected (just-finished OAuth)
//   - On app load if last sync >24h ago (background)
//   - Manually via Settings → Whoop tile → Sync now
// Whoop sleep auto-fills the Pulse ring; manual entries override.
// ═══════════════════════════════════════════════════════════════════════
function startWhoopOAuth() {
  // Send the user to the Worker's /auth/start, which redirects to Whoop login
  window.location.href = WORKER_BASE_URL + '/auth/start';
}

async function syncWhoop({ silent = false } = {}) {
  if (!silent) toast('Syncing Whoop…');
  try {
    const r = await fetch(WORKER_BASE_URL + '/api/whoop/sync', { method: 'GET' });
    if (r.status === 401) {
      // Token gone — mark disconnected
      state.whoop = state.whoop || {};
      state.whoop.connected = false;
      saveState();
      if (!silent) toast('Whoop session expired — reconnect in Settings');
      return { ok: false, reason: 'not_connected' };
    }
    if (!r.ok) {
      const err = await r.text();
      if (!silent) toast('Sync failed');
      console.error('whoop sync failed:', r.status, err);
      return { ok: false, reason: 'http_' + r.status };
    }
    const data = await r.json();
    state.whoop = state.whoop || {};
    state.whoop.connected = true;
    state.whoop.profile   = data.profile || state.whoop.profile;
    state.whoop.body      = data.body    || state.whoop.body;
    state.whoop.sleep     = Array.isArray(data.sleep)    ? data.sleep    : [];
    state.whoop.recovery  = Array.isArray(data.recovery) ? data.recovery : [];
    state.whoop.cycles    = Array.isArray(data.cycles)   ? data.cycles   : [];
    state.whoop.workouts  = Array.isArray(data.workouts) ? data.workouts : [];
    state.config.whoop_last_sync = data.synced_at || new Date().toISOString();
    saveState();
    if (!silent) {
      const n = state.whoop.sleep.length + state.whoop.recovery.length;
      toast(`Synced · ${n} records`);
    }
    render();
    return { ok: true, data };
  } catch (e) {
    console.error('whoop sync error:', e);
    if (!silent) toast('Sync failed · check connection');
    return { ok: false, reason: 'network' };
  }
}

async function disconnectWhoop() {
  try {
    await fetch(WORKER_BASE_URL + '/auth/disconnect', { method: 'POST' });
  } catch (e) { console.error('disconnect error:', e); }
  state.whoop = structuredClone(DEFAULT_STATE.whoop);
  state.config.whoop_last_sync = null;
  saveState();
  render();
  toast('Whoop disconnected');
}

// ─── Whoop helpers — read-shaped accessors used by Pulse + future surfaces ─

// Sleep duration for a given local-day ISO string (YYYY-MM-DD).
// Whoop sleep records have an "end" timestamp (UTC). We treat each record's
// end-date as the day the sleep "belongs to" (waking morning).
function whoopSleepHoursFor(dateISO) {
  const records = (state.whoop && state.whoop.sleep) || [];
  // Find the main-sleep record (not nap) whose end falls on dateISO
  for (const r of records) {
    if (r.nap) continue;
    if (!r.end) continue;
    const endLocal = new Date(r.end);
    const y = endLocal.getFullYear();
    const m = String(endLocal.getMonth() + 1).padStart(2, '0');
    const d = String(endLocal.getDate()).padStart(2, '0');
    if (`${y}-${m}-${d}` !== dateISO) continue;
    const stage = r.score && r.score.stage_summary;
    if (!stage) continue;
    // total in-bed minus awake = actual sleep
    const inBedMs = stage.total_in_bed_time_milli || 0;
    const awakeMs = stage.total_awake_time_milli || 0;
    const sleepMs = Math.max(0, inBedMs - awakeMs);
    return Math.round((sleepMs / 3600000) * 10) / 10;  // round to 1 decimal
  }
  return null;
}

// Latest recovery score (0–100) — best-effort, returns null if none today.
function whoopRecoveryFor(dateISO) {
  const records = (state.whoop && state.whoop.recovery) || [];
  for (const r of records) {
    const cycle = r.cycle_id;
    // recovery is keyed by cycle, so we infer date from created_at fallback
    const ref = r.created_at || (r.score && r.score.recovery_date);
    if (!ref) continue;
    const d = new Date(ref);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    if (`${y}-${m}-${dd}` !== dateISO) continue;
    if (r.score && typeof r.score.recovery_score === 'number') return r.score.recovery_score;
  }
  return null;
}

// True if this date has a Whoop sleep record we can show
function whoopHasSleepFor(dateISO) {
  return whoopSleepHoursFor(dateISO) != null;
}

function whoopShouldAutoSync() {
  if (!state.whoop || !state.whoop.connected) return false;
  const last = state.config.whoop_last_sync;
  if (!last) return true;
  const ageMs = Date.now() - new Date(last).getTime();
  return ageMs > 24 * 60 * 60 * 1000;  // 24h
}

// Detect ?whoop=connected in URL — fired on app load
function handleWhoopReturn() {
  try {
    const u = new URL(window.location.href);
    if (u.searchParams.get('whoop') === 'connected') {
      // Mark connected (sync will populate the rest)
      state.whoop = state.whoop || {};
      state.whoop.connected = true;
      saveState();
      // Clean URL so a refresh doesn't re-trigger
      u.searchParams.delete('whoop');
      window.history.replaceState({}, '', u.pathname + (u.searchParams.toString() ? '?' + u.searchParams.toString() : ''));
      // First sync
      syncWhoop({ silent: false });
    } else if (whoopShouldAutoSync()) {
      // Background daily sync
      syncWhoop({ silent: true });
    }
  } catch (e) { console.error('handleWhoopReturn:', e); }
}

// Parse a free-text birthday like "Oct 4", "October 4", "4 Oct", "10/04", "Jan 4 · turns 41"
// Returns a { month: 0-11, day: 1-31 } or null if unparseable.
function parseBirthday(s) {
  if (!s) return null;
  const months = { jan:0, feb:1, mar:2, apr:3, may:4, jun:5, jul:6, aug:7, sep:8, oct:9, nov:10, dec:11 };
  const lower = s.toLowerCase();
  // Try "Mon D" or "D Mon"
  for (const [abbr, idx] of Object.entries(months)) {
    const rx1 = new RegExp(`${abbr}[a-z]*\\s+(\\d{1,2})`);
    const rx2 = new RegExp(`(\\d{1,2})\\s+${abbr}[a-z]*`);
    let m = lower.match(rx1) || lower.match(rx2);
    if (m) {
      const day = parseInt(m[1], 10);
      if (day >= 1 && day <= 31) return { month: idx, day };
    }
  }
  // Try M/D or MM/DD
  const slash = lower.match(/(\d{1,2})\s*[\/\-]\s*(\d{1,2})/);
  if (slash) {
    const m = parseInt(slash[1], 10), d = parseInt(slash[2], 10);
    if (m >= 1 && m <= 12 && d >= 1 && d <= 31) return { month: m - 1, day: d };
  }
  return null;
}

// Find birthdays within ±7 days. Returns { person, date, daysUntil } for the closest one, or null.
function upcomingBirthday() {
  if (!state.people || !state.people.length) return null;
  const now = new Date();
  const year = now.getFullYear();
  let best = null;
  for (const p of state.people) {
    const bday = p.remember && p.remember.birthday;
    if (!bday) continue;
    const parsed = parseBirthday(bday);
    if (!parsed) continue;
    // Build this year's birthday date
    const dThisYear = new Date(year, parsed.month, parsed.day);
    const dNextYear = new Date(year + 1, parsed.month, parsed.day);
    const todayMid = new Date(year, now.getMonth(), now.getDate());
    // Pick whichever is closer and still within ±7 days
    for (const candidate of [dThisYear, dNextYear]) {
      const diffDays = Math.round((candidate - todayMid) / 86400000);
      if (diffDays >= -3 && diffDays <= 7) {
        if (!best || Math.abs(diffDays) < Math.abs(best.daysUntil)) {
          best = { person: p, date: candidate, daysUntil: diffDays };
        }
      }
    }
  }
  return best;
}

function dueMostPerson() {
  if (!state.people || !state.people.length) return null;
  let worst = null;
  for (const p of state.people) {
    if (!p.cadence || !CADENCE_DAYS[p.cadence]) continue;
    const lastTs = p.last_touch_ts ? new Date(p.last_touch_ts).getTime() : 0;
    const daysSince = lastTs ? Math.floor((Date.now() - lastTs) / 86400000) : 999;
    const overdue = daysSince - CADENCE_DAYS[p.cadence];
    if (overdue > 0) {
      if (!worst || overdue > worst.overdue) worst = { person: p, daysSince, overdue };
    }
  }
  return worst;
}

function peopleAvatars() {
  if (!state.people || !state.people.length) return [];
  const inner = state.people.filter(p => p.tier === 'inner' || p.tier === 'close');
  const pool = inner.length ? inner : state.people;
  return [...pool]
    .sort((a,b) => {
      const ta = a.last_touch_ts ? new Date(a.last_touch_ts).getTime() : 0;
      const tb = b.last_touch_ts ? new Date(b.last_touch_ts).getTime() : 0;
      return tb - ta;
    })
    .slice(0, 3);
}

function daysAgoShort(ts) {
  if (!ts) return '';
  const d = Math.floor((Date.now() - new Date(ts).getTime()) / 86400000);
  if (d === 0) return 'today';
  if (d === 1) return '1d ago';
  if (d < 30) return `${d}d ago`;
  const w = Math.floor(d / 7);
  if (w < 5) return `${w}w ago`;
  return `${Math.floor(d / 30)}mo ago`;
}

function isAfterSunset() {
  const [h, m] = (state.config.sunset_time || '19:30').split(':').map(Number);
  const now = new Date();
  const cutoff = new Date(now);
  cutoff.setHours(h || 19, m || 30, 0, 0);
  return now >= cutoff;
}

// v2.11: Four distinct ring renderers — each ring fills differently.
// At rest, all four look identical: empty 32px-radius circle, muted ink stroke.
// In active states, each fills with its own grammar (vessel / dot / sweep / ring-by-ring).
function ringSVG_train(filled) {
  // Train fills bottom-up like a vessel
  const fillHeight = filled ? 32 : 0;  // bottom-half height when filled
  return `<svg width="46" height="46" viewBox="0 0 48 48">
    <defs><clipPath id="clip-train"><circle cx="24" cy="24" r="19"/></clipPath></defs>

    ${filled ? `<rect x="0" y="${48 - fillHeight}" width="48" height="${fillHeight}" fill="rgba(62,122,94,0.32)" clip-path="url(#clip-train)"/>` : ''}
  </svg>`;
}
function ringSVG_pulse(signals) {
  // signals: 0-3. Single dot at center, sized by signal count.
  // 0 = empty, 1 = small, 2 = medium, 3 = full
  if (signals === 0) {
    return `<svg width="46" height="46" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="19" fill="none" stroke="var(--ring-track)" stroke-width="2.4"/>
    </svg>`;
  }
  const dotRadius = signals === 1 ? 2.5 : signals === 2 ? 4 : 5.5;
  return `<svg width="46" height="46" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="19" fill="none" stroke="var(--accent-bright)" stroke-width="2.4"/>
    <circle cx="24" cy="24" r="${dotRadius}" fill="var(--accent-bright)"/>
  </svg>`;
}
function ringSVG_mind(filled, pending) {
  // Mind: empty until examen complete, then a swept brass arc.
  // pending = brass border without sweep (after sunset, examen not yet done).
  if (filled) {
    // Full brass ring
    return `<svg width="46" height="46" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="19" fill="none" stroke="var(--brass)" stroke-width="2.4"/>
    </svg>`;

    return `<svg width="46" height="46" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="19" fill="none" stroke="var(--brass)" stroke-width="2.4"/>

  return `<svg width="46" height="46" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="19" fill="none" stroke="var(--ring-track)" stroke-width="2.4"/>

function ringSVG_habits(done, total) {
  // Three concentric rings filling outer → middle → inner as habits complete.

  if (total === 0) {
    // No habits set up — looks like the at-rest state
    return `<svg width="46" height="46" viewBox="0 0 48 48">
      <circle cx="24" cy="24" r="19" fill="none" stroke="var(--ring-track)" stroke-width="1.6"/>
      <circle cx="24" cy="24" r="13" fill="none" stroke="var(--ring-track)" stroke-width="1.6"/>
      <circle cx="24" cy="24" r="7"  fill="none" stroke="var(--ring-track)" stroke-width="1.6"/>
    </svg>`;
  }
  // Threshold logic: outer fills at >= 1, middle at >= ceil(total/3)+1, inner at total
  const outerOn = done >= 1;
  const middleOn = done >= Math.max(2, Math.ceil(total / 3) + 1);
  const innerOn  = done >= total;
  const ringStroke = (on) => on ? 'var(--accent-bright)' : 'var(--ring-track)';
  return `<svg width="46" height="46" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="19" fill="none" stroke="${ringStroke(outerOn)}" stroke-width="1.6"/>
    <circle cx="24" cy="24" r="13" fill="none" stroke="${ringStroke(middleOn)}" stroke-width="1.6"/>
    <circle cx="24" cy="24" r="7"  fill="none" stroke="${ringStroke(innerOn)}" stroke-width="1.6"/>
  </svg>`;
}

function renderToday() {
  const adj = todayAdjective();
  const runway = runwayMonths();
  const recentMention = recentPersonMention();
  const dueMost = dueMostPerson();
  const avatars = peopleAvatars();
  const inProg = inProgressItem();
  const quote = quoteOfDay();
  const examen = todayExamen();

  const now = new Date();
  const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][now.getDay()];
  const monthName = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()];
  const dateLine = `${dayName} · ${now.getDate()} ${monthName}`;

  // Ambient line
  let ambientParts = [];
  // Today's intention (highest priority — the day's focus)
  const todayIntForAmbient = todayIntention();
  if (todayIntForAmbient) {
    ambientParts.push(`Today: ${escapeHtml(todayIntForAmbient.text)}`);
  }
  // Weekly intent (shows what you said this week's work was)
  const wkIso = weekISO(new Date());
  const openIntents = state.weekly_intents.filter(i => i.week_iso === wkIso && !i.completed);
  if (openIntents.length && !todayIntForAmbient) {
    const first = openIntents[0];
    const more = openIntents.length > 1 ? ` +${openIntents.length - 1}` : '';
    ambientParts.push(`This week: ${escapeHtml(first.text)}${more}`);
  }
  if (runway != null) ambientParts.push(`Runway: ${runway.toFixed(1)} months`);
  // Birthday within ±7 days — add before recentMention so it gets priority over "wrote about X"
  const bday = upcomingBirthday();
  if (bday) {
    let when;
    if (bday.daysUntil === 0) when = 'today';
    else if (bday.daysUntil === 1) when = 'tomorrow';
    else if (bday.daysUntil === -1) when = 'was yesterday';
    else if (bday.daysUntil < 0) when = `was ${Math.abs(bday.daysUntil)} days ago`;
    else {
      const wk = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][bday.date.getDay()];
      when = `on ${wk}`;
    }
    ambientParts.push(`${escapeHtml(bday.person.name)}'s birthday ${when}`);
  }
  if (recentMention) {
    const when = recentMention.daysAgo === 0 ? 'today' : recentMention.daysAgo === 1 ? 'yesterday' : `${recentMention.daysAgo} days ago`;
    ambientParts.push(`You wrote about ${recentMention.name} ${when}`);
  }
  const ambient = ambientParts.length
    ? ambientParts.join(' <span class="sep">·</span> ')
    : `<span class="empty">The day is yours.</span>`;

  // Morning intention card — shows 5am–noon if no intention set for today.
  // After intention is set, becomes a small brass-confirmed chip.
  let morningCard = '';
  const todayInt = todayIntention();
  const carryText = carryForwardCandidate();
  const skippedThisMorning = state._morning_skip_date === todayISO();
  if (todayInt) {
    // Intention already set — confirmation chip (visible all day, tap to edit)
    const setTime = todayInt.created_at
      ? new Date(todayInt.created_at).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })
      : '';
    const editedTime = todayInt.edited_at
      ? new Date(todayInt.edited_at).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })
      : '';
    morningCard = `
      <button class="card" onclick="openIntentionEditor()" style="background:rgba(200,155,106,0.04);border-color:rgba(200,155,106,0.22);">
        <div class="card-head">
          <span class="card-kicker" style="color:var(--brass);">Intention set${setTime ? ' · ' + setTime : ''}${editedTime ? ` · edited ${editedTime}` : ''}</span>
          <span class="card-kicker-r">tap to edit</span>
        </div>
        <div class="card-title" style="font-size:17px;">${escapeHtml(todayInt.text)}</div>
      </button>`;
  } else if (isMorningWindow() && !skippedThisMorning) {
    // Before noon, no intention yet — show the prompt
    const carryBlock = carryText ? `
      <div style="margin:10px 0 4px;padding:10px 12px;background:var(--surface-2);border:0.5px solid var(--line);border-radius:10px;">
        <div style="font-size:9.5px;letter-spacing:0.14em;color:var(--ink-muted);text-transform:uppercase;margin-bottom:4px;">Last night you said</div>
        <div style="font-family:'Fraunces',serif;font-style:italic;font-size:13px;color:var(--ink);line-height:1.5;">&ldquo;${escapeHtml(carryText)}&rdquo;</div>
        <div style="margin-top:10px;display:flex;gap:6px;">
          <button class="btn-primary" style="flex:1;padding:8px;font-size:11px;" onclick="acceptCarryForward()">Keep this</button>
          <button class="btn-secondary" style="flex:1;padding:8px;font-size:11px;" onclick="openIntentionEditor()">Change</button>
        </div>
      </div>
    ` : '';
    morningCard = `
      <div class="card">
        <div class="card-head">
          <span class="card-kicker">Before the day begins</span>
          <span class="card-kicker-r">~1 min</span>
        </div>
        <div class="card-title">What do you want from today?</div>
        <div class="card-sub" style="font-family:'Fraunces',serif;font-style:italic;">One sentence. Kept, not just intended.</div>
        ${carryBlock}
        ${!carryText ? `
          <div class="card-row">
            <button class="btn-primary" onclick="openIntentionEditor()">Set intention</button>
            <button class="btn-secondary" onclick="skipMorning()">Not today</button>
          </div>
        ` : `
          <div style="text-align:center;margin-top:10px;">
            <button class="btn-skip" onclick="skipMorning()" style="font-size:11px;">Not today</button>
          </div>
        `}
      </div>`;
  }

  // Examen card — only at / after sunset (or if already done today)
  let examenCard = '';
  if (examen) {
    examenCard = `
      <button class="card" onclick="openExamenSummary()">

          <span class="card-kicker">Evening examen</span>

  } else if (isAfterSunset()) {

          <button class="btn-secondary" onclick="examenSkipTonight()">Not tonight</button>

  }
  // Between noon and sunset: no ritual card at all. The day is for doing.

  // Ledger card
  let ledgerCard;
  if (runway != null) {
    ledgerCard = `
      <button class="card" onclick="openLedgerSnapshot()">

          <span class="card-kicker">Ledger</span>

          <span class="card-kicker">Ledger</span>
          <span class="card-kicker-r">not yet</span>
        </div>
        <div class="ledger-title">Take a snapshot to begin.</div>
      </button>`;
  }

  // People card
  let peopleCard;
  if (avatars.length && dueMost) {
    const avatarHTML = avatars.map((p, i) =>
      `<div class="avatar a${(i % 3) + 1}">${escapeHtml((p.name || '?')[0].toUpperCase())}</div>`
    ).join('');
    const innerCount = state.people.filter(p => p.tier === 'inner').length;
    peopleCard = `
      <button class="card" onclick="switchTab('people')">
        <div class="card-head">
          <span class="card-kicker">People</span>
          ${innerCount ? `<span class="card-kicker-r">Inner ${innerCount}</span>` : ''}
        </div>
        <div class="people-row">
          <div class="avatars">${avatarHTML}</div>
          <div class="people-body">It&rsquo;s been a while with <span style="font-style:italic;">${escapeHtml(dueMost.person.name)}</span>.</div>
        </div>
      </button>`;
  } else if (state.people.length) {
    const avatarHTML = avatars.map((p, i) =>
      `<div class="avatar a${(i % 3) + 1}">${escapeHtml((p.name || '?')[0].toUpperCase())}</div>`
    ).join('');
    peopleCard = `
      <button class="card" onclick="switchTab('people')">
        <div class="card-head">
          <span class="card-kicker">People</span>
          <span class="card-kicker-r">${state.people.length} total</span>
        </div>
        <div class="people-row">
          <div class="avatars">${avatarHTML}</div>
          <div class="people-body">Everyone's on time.</div>
        </div>
      </button>`;
  } else {
    peopleCard = `
      <button class="card" onclick="openTouchModal()">
        <div class="card-head">
          <span class="card-kicker">People</span>
        </div>
        <div class="people-empty">No one logged yet. Tap to log a touch with someone.</div>
      </button>`;
  }

  // In progress card
  let progressCard = '';
  if (inProg) {
    progressCard = `
      <button class="progress-card" onclick="switchTab('me')">
        <div class="progress-left">
          <div class="card-kicker">In progress</div>
          <div class="progress-title">${escapeHtml(inProg.text || '')}</div>
        </div>
        <div class="progress-right">
          <div class="progress-arrow">↓</div>
          <div class="progress-ago">${daysAgoShort(inProg.ts)}</div>
        </div>
      </button>`;
  }

  // Phase 4 — Pause banner (Saturday-evening / Sunday window)
  let pauseBanner = '';
  if (pauseWindowOpen() && !thisWeekPause()) {
    const isSat = isSaturday();
    pauseBanner = `
      <button class="pause-banner" onclick="openPause()">
        <div class="kicker">${isSat ? 'Saturday · the week ends' : 'Sunday · before the new week'}</div>
        <div class="title">The Pause</div>
        <div class="sub">Look back. Look forward. About 4 minutes.</div>
        <div class="arrow">›</div>
      </button>`;
  }

  // Hard-pause workout — resume banner if there's a paused session from today
  let resumeBanner = '';
  const paused = pausedWorkoutFromToday();
  if (paused) {
    const minAgo = Math.max(1, Math.floor((Date.now() - new Date(paused.ts).getTime()) / 60000));
    const ago = formatDurationMin(minAgo);
    const doneSets = paused.exercises.reduce((a, e) => a + e.sets.filter(s => s.rating).length, 0);
    const totalSets = paused.exercises.filter(e => !e.prep).reduce((a, e) => a + e.sets.length, 0);

      <button class="resume-banner" onclick="resumePausedWorkout()">

  // v2.12.2 — monthly recap banner. Shows in the first 3 days of a new month

  let recapBanner = '';
  const recapInfo = previousMonthRecapInfo();
  if (recapInfo && state._monthly_recap_dismissed_for !== recapInfo.key) {

        <button onclick="openMonthlyRecapFromBanner()" style="flex:1;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(200,155,106,0.05);border:0.5px solid var(--brass-dim);border-radius:12px 0 0 12px;color:inherit;font-family:inherit;cursor:pointer;text-align:left;">
          <div>
            <div style="font-size:9.5px;letter-spacing:0.16em;color:var(--brass);font-weight:500;margin-bottom:4px;">${escapeHtml(recapInfo.monthName.toUpperCase())} CLOSED</div>

          </div>

        </button>
        <button onclick="dismissMonthlyRecap('${recapInfo.key}')" aria-label="Dismiss" style="display:flex;align-items:center;justify-content:center;width:38px;background:rgba(200,155,106,0.05);border:0.5px solid var(--brass-dim);border-left:none;border-radius:0 12px 12px 0;color:var(--ink-faint);cursor:pointer;font-family:inherit;font-size:14px;">×</button>
      </div>
    `;
  }

  const html = `
    <div class="today-header">
      <div class="today-header-l">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/></svg>
        </button>

    </div>

    <div class="rings-wrap">
      <div class="rings-label">The Four, Today</div>

        <button class="ring-col" onclick="openTrainPicker()">
          ${ringSVG_train(ringValue('train') >= 1)}

        <button class="ring-col" onclick="openHabitsTodaySheet()">

      </div>

      <div class="quote-attr">${escapeHtml(quote.attr)}</div>

    ${recapBanner}
    ${resumeBanner}
    ${pauseBanner}
    ${morningCard}
    ${examenCard}
    ${ledgerCard}
    ${peopleCard}
    ${progressCard}
  `;
  document.getElementById('screen-today').innerHTML = html;
}

function ledgerDue() {
  if (!state.ledger || !state.ledger.length) return true;
  const latest = [...state.ledger].sort((a,b) => (b.date || '').localeCompare(a.date || ''))[0];
  if (!latest) return true;
  return Math.floor((Date.now() - new Date(latest.date).getTime()) / 86400000) >= 7;
}

// v2.8.1: Capture state — textarea + optional photo
let captureDraftPhoto = null;

function onCaptureTextareaInput() {
  const ta = document.getElementById('capture-textarea');
  const btn = document.getElementById('capture-save-btn');
  if (!ta || !btn) return;
  const hasContent = ta.value.trim().length > 0 || captureDraftPhoto !== null;
  btn.disabled = !hasContent;
}

function onCapturePhotoSelected(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const maxDim = 800;
      let w = img.width, h = img.height;
      if (w > h && w > maxDim) { h = h * (maxDim / w); w = maxDim; }
      else if (h > maxDim) { w = w * (maxDim / h); h = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      captureDraftPhoto = {
        data: canvas.toDataURL('image/jpeg', 0.7),
        captured_at: new Date().toISOString(),
      };
      const wrap = document.getElementById('capture-photo-preview-wrap');
      if (wrap) {
        wrap.innerHTML = `
          <div class="capture-photo-preview">
            <img src="${captureDraftPhoto.data}" alt="">
            <button type="button" class="capture-photo-remove" onclick="removeCapturePhoto()" aria-label="Remove">×</button>
          </div>`;
      }
      onCaptureTextareaInput();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removeCapturePhoto() {
  captureDraftPhoto = null;
  const wrap = document.getElementById('capture-photo-preview-wrap');
  if (wrap) wrap.innerHTML = '';
  onCaptureTextareaInput();
}

// v2.10: Pin gesture state for capture orb
let capturePinChapterId = null;

function capturePinBlockHTML() {
  const activeChapter = (state.chapters || []).find(c => !c.end_date);
  if (!activeChapter) return '';
  const isPinned = capturePinChapterId === activeChapter.id;
  return `
    <button type="button" onclick="toggleCapturePin('${activeChapter.id}')" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:9px;background:transparent;border:0.5px solid ${isPinned ? 'var(--brass)' : 'var(--line)'};border-radius:10px;color:${isPinned ? 'var(--brass)' : 'var(--ink-muted)'};font-family:inherit;font-size:11px;cursor:pointer;margin-top:8px;letter-spacing:0.02em;">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg>
      <span>${isPinned ? `Pinned to ${escapeHtml(activeChapter.title)}` : `Pin to ${escapeHtml(activeChapter.title)}`}</span>
    </button>
  `;
}

function toggleCapturePin(chapterId) {
  capturePinChapterId = capturePinChapterId === chapterId ? null : chapterId;
  // Re-render just the pin block in place (avoid full sheet re-render which would lose textarea content)
  const sheet = document.querySelector('.sheet-panel');
  if (!sheet) return;
  // Find existing pin button and replace it
  const existing = Array.from(sheet.querySelectorAll('button')).find(b => /Pin to|Pinned to/.test(b.textContent));
  if (existing) {
    const wrapper = document.createElement('div');
    wrapper.innerHTML = capturePinBlockHTML().trim();
    if (wrapper.firstElementChild) {
      existing.replaceWith(wrapper.firstElementChild);
    }
  }
}

function saveCapture() {
  const ta = document.getElementById('capture-textarea');
  const text = (ta?.value || '').trim();
  if (!text && !captureDraftPhoto) return;
  state.captures = state.captures || [];
  const capture = {
    id: uid(),
    ts: new Date().toISOString(),
    text,
    photo: captureDraftPhoto || null,
  };
  state.captures.push(capture);

  // v2.10: pin to active chapter if user opted in
  if (capturePinChapterId) {
    const ch = state.chapters.find(c => c.id === capturePinChapterId && !c.end_date);
    if (ch) {
      if (!Array.isArray(ch.pinned_capture_ids)) ch.pinned_capture_ids = [];
      if (!ch.pinned_capture_ids.includes(capture.id)) ch.pinned_capture_ids.push(capture.id);
    }
  }

  // Auto-extract @mentions: same pipeline as examen mentions
  if (text) {
    extractMentionsFromCapture(capture);
  }

  saveState();
  captureDraftPhoto = null;
  capturePinChapterId = null;  // reset for next capture
  closeOrbSheet();
  checkStorageCapacity();
  render();
  toast('Captured.');
}

// Pull @Name mentions out of capture text and either log a touch with the matched
// person or stash as a pending mention if no match.
function extractMentionsFromCapture(capture) {
  const text = capture.text;
  const mentions = text.match(/@([A-Za-z][A-Za-z0-9_-]*)/g);
  if (!mentions) return;
  state._pendingMentions = state._pendingMentions || [];
  for (const raw of mentions) {
    const name = raw.slice(1);
    const matched = (state.people || []).find(p => p.name && p.name.toLowerCase() === name.toLowerCase());
    if (matched) {
      // Log a touch with excerpt
      const sentence = text.split(/(?<=[.!?])\s+/).find(s => s.includes(raw)) || text;
      matched.touches = matched.touches || [];
      matched.touches.push({
        id: uid(),
        ts: capture.ts,
        type: 'reflection_mention',
        note: sentence.trim().slice(0, 240),
        source: 'capture',
        source_id: capture.id,
      });
      matched.last_touch_ts = capture.ts;
    } else {
      // Stash as pending — same shape as examen-pending
      state._pendingMentions.push({
        id: uid(),
        name,
        ts: capture.ts,
        source: 'capture',
        source_id: capture.id,
      });
    }
  }
}

// ─── Touch flow (v2.9.2 — two modes)
// Module-level draft state so re-renders don't lose data
let touchType = 'note';
let touchMode = null;        // 'quick' | 'memory' — initialized from config on open
let touchDraftPhoto = null;  // { data, captured_at, keep:false } | null
const TOUCH_TYPES = [
  { id: 'note',    label: 'Note'    },
  { id: 'call',    label: 'Call'    },
  { id: 'message', label: 'Message' },
  { id: 'meal',    label: 'Meal'    },
  { id: 'visit',   label: 'Visit'   },
];

function openTouchModal(personId) {
  // Reset draft state
  touchType = 'note';
  touchDraftPhoto = null;
  touchPinChapterId = null;  // v2.10: reset pin state
  // Persisted last-used mode (Q1c) — first time defaults to 'memory'
  state.config = state.config || {};
  touchMode = state.config.last_touch_mode || 'memory';

  const preset = personId ? state.people.find(p => p.id === personId) : null;
  renderTouchSheet(preset);
}

function renderTouchSheet(preset) {
  const personId = preset ? preset.id : '';
  const nameField = preset
    ? `<div style="padding:10px 14px;background:var(--accent-faint);border:0.5px solid var(--accent-dim);border-radius:10px;margin-bottom:14px;font-family:'Fraunces',serif;font-size:14px;color:var(--ink);">${escapeHtml(preset.name)}</div>`
    : `<input type="text" class="modal-input" id="touch-input" placeholder="Name" style="margin-bottom:14px;">`;

  // Mode toggle pill
  const modeToggle = `
    <div class="touch-mode-toggle">
      <button type="button" class="touch-mode-btn ${touchMode === 'quick' ? 'active' : ''}" onclick="setTouchMode('quick', '${personId}')">Quick</button>
      <button type="button" class="touch-mode-btn ${touchMode === 'memory' ? 'active' : ''}" onclick="setTouchMode('memory', '${personId}')">Memory</button>
    </div>
  `;

  // Type chips (used in both modes)
  const typeChips = `
    <div id="touch-type-row" style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;">
      ${TOUCH_TYPES.map(t => `
        <button type="button" class="touch-type-chip ${t.id === touchType ? 'selected' : ''}" data-type="${t.id}" onclick="selectTouchType('${t.id}')"
          style="padding:6px 11px;background:${t.id === touchType ? 'rgba(62,122,94,0.10)' : 'var(--surface-2)'};border:0.5px solid ${t.id === touchType ? 'rgba(62,122,94,0.40)' : 'var(--line)'};border-radius:100px;font-size:11px;color:${t.id === touchType ? 'var(--accent-bright)' : 'var(--ink-muted)'};font-family:inherit;cursor:pointer;">
          ${t.label}
        </button>
      `).join('')}
    </div>
  `;

  // Duration field — appears for Call type
  const durationField = `
    <div id="touch-duration-wrap" style="display:${touchType === 'call' ? 'block' : 'none'};margin-bottom:12px;">
      <div style="font-size:10px;letter-spacing:0.14em;color:var(--ink-muted);text-transform:uppercase;margin-bottom:6px;font-weight:500;">Duration <span style="color:var(--ink-faint);text-transform:none;letter-spacing:0;font-style:italic;font-family:'Fraunces',serif;">optional</span></div>
      <input type="number" inputmode="numeric" class="modal-input" id="touch-duration" placeholder="minutes" min="1" max="999" style="margin-bottom:0;">
    </div>
  `;

  let body, saveLabel, saveDisabled;
  if (touchMode === 'memory') {
    // Memory mode: textarea-first, photo button, type chips
    saveLabel = 'Save memory';
    // Save disabled until text or photo present (Q3a)
    const hasContent = touchDraftPhoto !== null;  // text is checked live via input handler
    saveDisabled = !hasContent;
    const photoBlock = touchDraftPhoto
      ? `<div class="touch-photo-preview" id="touch-photo-preview">
           <img src="${touchDraftPhoto.data}" alt="">
           <button type="button" class="touch-photo-remove" onclick="removeDraftPhoto()" aria-label="Remove photo">×</button>
         </div>`
      : `<button type="button" class="touch-photo-btn" onclick="document.getElementById('touch-photo-input').click()">
           <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
           Add a photo
         </button>`;
    body = `
      ${nameField}
      <textarea class="touch-textarea" id="touch-textarea" placeholder="What happened?" oninput="onTouchTextareaInput()"></textarea>
      <input type="file" accept="image/*" id="touch-photo-input" style="display:none;" onchange="onTouchPhotoSelected(event, '${personId}')">
      ${photoBlock}
      <div style="font-size:10px;letter-spacing:0.14em;color:var(--ink-muted);text-transform:uppercase;margin:14px 0 6px;font-weight:500;">Kind <span style="color:var(--ink-faint);text-transform:none;letter-spacing:0;font-style:italic;font-family:'Fraunces',serif;">optional</span></div>
      ${typeChips}
      ${durationField}
    `;
  } else {
    // Quick mode: type chips first, optional duration, optional one-line note
    saveLabel = 'Log';
    saveDisabled = false;
    body = `
      ${nameField}
      <div style="font-size:10px;letter-spacing:0.14em;color:var(--ink-muted);text-transform:uppercase;margin-bottom:6px;font-weight:500;">Kind</div>
      ${typeChips}
      ${durationField}
      <input type="text" class="modal-input" id="touch-note" placeholder="Note (optional)" style="margin-bottom:14px;">
    `;
  }

  openModal(`
    <div class="modal-title" style="margin-bottom:10px;">Log a touch</div>
    ${modeToggle}
    ${body}
    ${touchPinBlockHTML()}
    <div class="modal-row" style="margin-top:6px;">
      <button class="btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="touch-save-btn" style="flex:1;${saveDisabled ? 'opacity:0.5;pointer-events:none;' : ''}" onclick="saveTouch('${personId}')">${saveLabel}</button>
    </div>
  `);
  setTimeout(() => {
    if (touchMode === 'memory') {
      const ta = document.getElementById('touch-textarea');
      if (ta) ta.focus();
    } else {
      const focusEl = document.getElementById(preset ? 'touch-note' : 'touch-input');
      if (focusEl) focusEl.focus();
    }
  }, 80);
}

function setTouchMode(mode, personId) {
  if (touchMode === mode) return;
  touchMode = mode;
  // v2.10: pin state preserved across mode switches — user may have toggled before flipping
  state.config = state.config || {};
  state.config.last_touch_mode = mode;
  saveState();
  const preset = personId ? state.people.find(p => p.id === personId) : null;
  renderTouchSheet(preset);
}

function onTouchTextareaInput() {
  // Live save-button enable in Memory mode (Q3a)
  const ta = document.getElementById('touch-textarea');
  const btn = document.getElementById('touch-save-btn');
  if (!ta || !btn) return;
  const hasText = ta.value.trim().length > 0;
  const hasPhoto = touchDraftPhoto !== null;
  const enabled = hasText || hasPhoto;
  btn.style.opacity = enabled ? '1' : '0.5';
  btn.style.pointerEvents = enabled ? '' : 'none';
}

function onTouchPhotoSelected(event, personId) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      // Resize to max 800px on long edge, JPEG q0.7
      const maxDim = 800;
      let w = img.width, h = img.height;
      if (w > h && w > maxDim) { h = h * (maxDim / w); w = maxDim; }
      else if (h > maxDim) { w = w * (maxDim / h); h = maxDim; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
      touchDraftPhoto = {
        data: dataUrl,
        captured_at: new Date().toISOString(),
        keep: false,
      };
      const preset = personId ? state.people.find(p => p.id === personId) : null;
      renderTouchSheet(preset);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removeDraftPhoto() {
  touchDraftPhoto = null;
  // Just re-render through whatever state we had
  const personIdInput = document.getElementById('touch-input');
  // We need to know if it was a preset — if no input field exists, it was preset
  const isPreset = !personIdInput;
  if (isPreset) {
    // Find preset from current modal name field (we lose it on remove)
    // Simpler: just re-derive from any previous render's onclick. Punt: full close+reopen.
    // Cleaner: stash personId on the wrapper. For now, rerender memory mode no-preset is fine.
  }
  // Re-render with current preset retrievable from textarea state? No way to know.
  // We'll rely on the photo preview's parent context. Simplest: use the photo input's onchange handler captured personId.
  // Actually: just blank the preview DOM element directly — no re-render needed.
  const preview = document.getElementById('touch-photo-preview');
  if (preview) {
    preview.outerHTML = `<button type="button" class="touch-photo-btn" onclick="document.getElementById('touch-photo-input').click()">
       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
       Add a photo
     </button>`;
  }
  onTouchTextareaInput();
}

function selectTouchType(id) {
  touchType = id;
  document.querySelectorAll('.touch-type-chip').forEach(chip => {
    const isActive = chip.dataset.type === id;
    chip.classList.toggle('selected', isActive);
    chip.style.background = isActive ? 'rgba(62,122,94,0.10)' : 'var(--surface-2)';
    chip.style.borderColor = isActive ? 'rgba(62,122,94,0.40)' : 'var(--line)';
    chip.style.color = isActive ? 'var(--accent-bright)' : 'var(--ink-muted)';
  });
  const durWrap = document.getElementById('touch-duration-wrap');
  if (durWrap) durWrap.style.display = id === 'call' ? 'block' : 'none';
}

// v2.10: Pin gesture state for touch sheet (Memory mode only)
let touchPinChapterId = null;

function touchPinBlockHTML() {

function toggleTouchPin(chapterId) {
  touchPinChapterId = touchPinChapterId === chapterId ? null : chapterId;
  // In-place re-render of the pin button only — preserves textarea content
  const modal = document.querySelector('.modal');
  if (!modal) return;
  const existing = Array.from(modal.querySelectorAll('button')).find(b => /Pin to|Pinned to/.test(b.textContent));
  if (existing) {
    const wrapper = document.createElement('div');
    wrapper.innerHTML = touchPinBlockHTML().trim();
    if (wrapper.firstElementChild) {
      existing.replaceWith(wrapper.firstElementChild);
    }
  }
}

function saveTouch(personId) {
  // Note source depends on mode
  const note = touchMode === 'memory'
    ? (document.getElementById('touch-textarea')?.value || '').trim()
    : (document.getElementById('touch-note')?.value || '').trim();
  const durationRaw = document.getElementById('touch-duration')?.value;
  const duration = durationRaw ? parseInt(durationRaw, 10) : null;

  // Memory mode requires text or photo (Q3a)
  if (touchMode === 'memory' && !note && !touchDraftPhoto) {
    toast('Add a few words or a photo.');
    return;
  }

  let person;
  if (personId) {
    person = state.people.find(p => p.id === personId);
  } else {
    const name = document.getElementById('touch-input').value.trim();
    if (!name) { closeModal(); return; }
    person = state.people.find(p => p.name && p.name.toLowerCase() === name.toLowerCase());
    if (!person) {
      person = { id: uid(), name, tier: 'tribe', cadence: null, last_touch_ts: null, touches: [], remember: {} };
      state.people.push(person);
    }
  }
  if (!person) { closeModal(); return; }

  const touch = {
    id: uid(),
    ts: new Date().toISOString(),
    note,
    type: touchType,
    source: 'manual',
    mode: touchMode,  // tag for distinct rendering in history
  };
  if (touchType === 'call' && duration && duration > 0) {
    touch.duration_min = duration;
  }
  if (touchDraftPhoto) {
    touch.photo = { ...touchDraftPhoto };  // includes data, captured_at, keep:false
  }

  person.last_touch_ts = touch.ts;
  person.touches = person.touches || [];
  person.touches.push(touch);

  // v2.10: pin to active chapter if user opted in (works in both Quick and Memory modes)
  if (touchPinChapterId) {
    const ch = state.chapters.find(c => c.id === touchPinChapterId && !c.end_date);
    if (ch) {
      if (!Array.isArray(ch.pinned_touch_ids)) ch.pinned_touch_ids = [];
      if (!ch.pinned_touch_ids.includes(touch.id)) ch.pinned_touch_ids.push(touch.id);
    }
  }

  saveState();
  closeModal();
  // Reset draft
  touchDraftPhoto = null;
  touchPinChapterId = null;  // reset for next touch
  // Capacity check (4.5MB ~ 4500000 chars)
  checkStorageCapacity();
  render();
  toast(touchMode === 'memory' ? 'Memory saved.' : `Logged ${touchType} with ${person.name}`);
}

// 30-day photo expiry — runs once on boot
function expireOldPhotos() {
  if (!state.people) return;
  const now = Date.now();
  const THIRTY_DAYS = 30 * 86400000;
  let changed = false;
  for (const p of state.people) {
    for (const t of (p.touches || [])) {
      if (t.photo && t.photo.data && !t.photo.keep && t.photo.captured_at) {
        const age = now - new Date(t.photo.captured_at).getTime();
        if (age > THIRTY_DAYS) {
          // Q2c: keep the touch + note, replace photo with faded marker
          t.photo = {
            faded: true,
            captured_at: t.photo.captured_at,
            keep: false,
          };
          changed = true;
        }
      }
    }
  }
  if (changed) saveState();
}

// Capacity warning at 4.5MB (Q from spec section 8)
function checkStorageCapacity() {
  state.config = state.config || {};
  const size = JSON.stringify(state).length;
  if (size > 4500000) {
    const lastWarn = state.config.last_capacity_warn || 0;
    if (Date.now() - lastWarn > 86400000) {  // Re-warn at most once per day
      toast('Storage is getting full. Old photos will fade unless marked Keep.');
      state.config.last_capacity_warn = Date.now();
      saveState();
    }
  }
}

// Toggle "keep this photo" — called from touch detail
function toggleTouchPhotoKeep(personId, touchId) {
  const p = state.people.find(x => x.id === personId);
  if (!p) return;
  const t = p.touches.find(x => x.id === touchId);
  if (!t || !t.photo) return;
  t.photo.keep = !t.photo.keep;
  saveState();
  openPersonDetail(personId);
  toast(t.photo.keep ? 'Photo kept.' : 'Will fade after 30 days.');
}

let examenDraft = null;

function voiceAvailable() {
  if (state.config.examen_voice_enabled === false) return false;
  if (typeof window.webkitSpeechRecognition === 'undefined' && typeof window.SpeechRecognition === 'undefined') return false;
  if (window.location.protocol === 'file:') return false;
  return true;
}

function openExamen() {
  const existing = todayExamen();
  if (existing) return openExamenSummary();
  examenDraft = {
    date_iso: todayISO(),
    went_well: '',
    went_poorly: '',
    remains: '',
    virtue_tags: [],
    skipped: { poorly: false, remains: false },
    carry_forward: true,
    pin_to_chapter_id: null,

  renderExamen();

function closeExamen() {
  stopExamenVoice();
  closeOverlay();

}
function renderExamen() {
  if (!examenDraft) return;
  captureExamenFields();
  const dots = [0,1,2,3,4].map(i => {
    if (i < examenStep) return '<span class="done"></span>';
    if (i === examenStep) return '<span class="active"></span>';
    return '<span></span>';
  }).join('');
  let body;
  if (examenStep === 0) body = examenInvocation();
  else if (examenStep === 1) body = examenWentWell();
  else if (examenStep === 2) body = examenWentPoorly();
  else if (examenStep === 3) body = examenRemains();
  else body = examenClosing();

  openOverlay(`
    <div class="ex-progress">${dots}</div>
    ${body}
  `);
  setTimeout(() => {

function examenClosing() {
  const well = (examenDraft.went_well || '').trim();

        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M9 10.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24V16a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V7a1 1 0 0 1 1-1 2 2 0 0 0 0-4H8a2 2 0 0 0 0 4 1 1 0 0 1 1 1z"/></svg>

function toggleExamenPin(chapterId) {
  if (!examenDraft) return;
  examenDraft.pin_to_chapter_id = examenDraft.pin_to_chapter_id === chapterId ? null : chapterId;

}
function examenNext() {
  captureExamenFields();
  stopExamenVoice();
  if (examenStep < 4) examenStep++;
  renderExamen();
}
function examenSkipStep(step) {
  captureExamenFields();
  stopExamenVoice();
  if (step === 2) examenDraft.skipped.poorly = true;
  if (step === 3) examenDraft.skipped.remains = true;
  examenStep++;
  renderExamen();
}
function examenSkipTonight() {
  state.examens.push({
    id: uid(), date_iso: todayISO(),
    skipped_entirely: true,
    created_at: new Date().toISOString(),
    completed_at: new Date().toISOString(),
  });
  saveState();

function toggleVirtue(vid) {
  if (!examenDraft) return;

  const idx = examenDraft.virtue_tags.indexOf(vid);
  if (idx >= 0) examenDraft.virtue_tags.splice(idx, 1);
  else examenDraft.virtue_tags.push(vid);
  renderExamen();
}
// v2.8.2: Extract #themes from text. Matches #word patterns, dedupes case-insensitively, lowercases.
function extractThemes(text) {
  if (!text) return [];
  const matches = text.match(/#([a-zA-Z][a-zA-Z0-9_-]*)/g);
  if (!matches) return [];
  const seen = new Set();
  const out = [];
  for (const m of matches) {
    const tag = m.slice(1).toLowerCase();
    if (!seen.has(tag)) {
      seen.add(tag);
      out.push(tag);
    }
  }
  return out;
}

function examenFinalize() {
  if (!examenDraft) return;
  captureExamenFields();
  stopExamenVoice();
  const now = new Date().toISOString();

  // v2.8.2: Extract themes from all three fields
  const allText = [examenDraft.went_well, examenDraft.went_poorly, examenDraft.remains].join(' ');
  const themes = extractThemes(allText);

  const record = {
    id: uid(),
    date_iso: examenDraft.date_iso,
    went_well: examenDraft.went_well.trim(),
    went_poorly: examenDraft.went_poorly.trim(),
    remains: examenDraft.remains.trim(),
    themes,                                   // v2.8.2: new field
    virtue_tags: [...examenDraft.virtue_tags], // legacy: still empty for new examens
    skipped: { ...examenDraft.skipped },
    carry_forward: examenDraft.carry_forward,
    created_at: now,
    completed_at: now,
  };
  state.examens.push(record);
  // v2.10: pin to active chapter if user opted in
  if (examenDraft.pin_to_chapter_id) {
    const ch = state.chapters.find(c => c.id === examenDraft.pin_to_chapter_id && !c.end_date);
    if (ch) {
      if (!Array.isArray(ch.pinned_examen_ids)) ch.pinned_examen_ids = [];
      if (!ch.pinned_examen_ids.includes(record.id)) ch.pinned_examen_ids.push(record.id);
    }
  }
  // @mention auto-extraction — inside-out accretion
  const mentioned = scanForMentions(
    [record.went_well, record.went_poorly, record.remains].join(' '),
    { source: 'examen', source_id: record.id, ts: now }
  );
  if (mentioned.length) {
    record.mentions = mentioned.map(p => p.id);
  }
  if (record.carry_forward && record.remains) {
    const tmrw = new Date(); tmrw.setDate(tmrw.getDate() + 1);
    const tmrwISO = tmrw.toISOString().slice(0,10);
    state.intentions = state.intentions.filter(i => i.for_date !== tmrwISO);
    state.intentions.push({
      id: uid(), for_date: tmrwISO,
      text: record.remains, completed: false, source: 'examen',
    });
  }
  saveState();
  closeExamen();
  render();
  toast('Rest well.');
}

function toggleExamenVoice(targetId) {

function startExamenVoice(targetId) {
  stopExamenVoice();
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  const rec = new SR();
  rec.continuous = true;
  rec.interimResults = true;
  rec.lang = 'en-US';
  examenRecognition = rec;
  examenVoiceTargetId = targetId;
  const ta = document.getElementById(targetId);
  if (!ta) return;
  const baseText = ta.value;
  rec.onresult = (event) => {
    let interim = '', final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const r = event.results[i];
      if (r.isFinal) final += r[0].transcript + ' ';
      else interim += r[0].transcript;
    }
    ta.value = (baseText + (baseText && (final || interim) ? ' ' : '') + final + interim).replace(/\s+/g, ' ').trim();
  };
  rec.onerror = () => { stopExamenVoice(); renderExamen(); };
  rec.onend = () => {
    if (examenVoiceTargetId === targetId) {
      examenVoiceTargetId = null;
      examenRecognition = null;
      renderExamen();
    }
  };
  try { rec.start(); renderExamen(); }
  catch (e) { stopExamenVoice(); }
}
function stopExamenVoice() {
  if (examenRecognition) {
    try { examenRecognition.stop(); } catch(_){}
  }
  examenRecognition = null;
  examenVoiceTargetId = null;
}

// PHASE 4 — THE PAUSE
// Saturday-evening / Sunday weekly ritual.
// 3 cards (4 if first Saturday of month: Ledger card appears).
// Steps: Reflect on the week → Set intentions → (Ledger) → Closing
// ═══════════════════════════════════════════════════════════════════════
let pauseDraft = null;
let pauseStep = 0;

function isFirstSaturdayOfMonth(d = new Date()) {
  if (d.getDay() !== 6) return false;
  return d.getDate() <= 7;
}
function pauseShowsLedger() {
  // Show ledger card on first Saturday of month, OR if no ledger snapshot in 28+ days
  if (isFirstSaturdayOfMonth()) return true;
  if (!state.ledger.length) return true;
  const latest = [...state.ledger].sort((a,b) => (b.date || '').localeCompare(a.date || ''))[0];
  const daysSince = Math.floor((Date.now() - new Date(latest.date).getTime()) / 86400000);
  return daysSince >= 28;
}
function pauseShowsPeople() {
  // Show people step if there's anyone in the circle at all — even if no one is overdue,
  // the free-text "who this week" box is still valuable.
  return (state.people || []).length > 0;
}
function pauseTotalSteps() {
  // week + intents + closing = 3 baseline
  let n = 3;
  if (pauseShowsPeople()) n++;
  if (pauseShowsLedger()) n++;
  return n;
}

function openPause() {
  if (thisWeekPause()) return openPauseSummary();
  pauseDraft = {
    week_iso: weekISO(new Date()),
    saturday_iso: todayISO(),
    reflection: '',
    people_plan: '',    // NEW — free text for "who will you reach out to this week"
    intents: [],         // strings, max 5
    ledger: { liquid: '', invested: '', monthly_burn: '', note: '' },
    skipped: { ledger: false, people: false },
  };
  pauseStep = 0;
  renderPause();
}
function closePause() {
  closeOverlay();
  pauseDraft = null;
}
function renderPause() {
  if (!pauseDraft) return;
  capturePauseFields();
  const total = pauseTotalSteps();
  const dots = Array.from({ length: total }, (_, i) => {
    if (i < pauseStep) return '<span class="done"></span>';
    if (i === pauseStep) return '<span class="active"></span>';
    return '<span></span>';
  }).join('');
  // Step order: 0=week, 1=people (if shown), 2=intents, 3=ledger (if shown), last=closing
  // We compute the semantic step based on which optional steps are present.
  const steps = ['week'];
  if (pauseShowsPeople()) steps.push('people');
  steps.push('intents');
  if (pauseShowsLedger()) steps.push('ledger');
  steps.push('closing');
  const stepName = steps[pauseStep] || 'closing';

  let body;
  if (stepName === 'week')         body = pauseStepWeek();
  else if (stepName === 'people')  body = pauseStepPeople();
  else if (stepName === 'intents') body = pauseStepIntents();
  else if (stepName === 'ledger')  body = pauseStepLedger();
  else                             body = pauseStepClosing();

  openOverlay(`
    <div class="ex-progress">${dots}</div>
    ${body}
  `);
  setTimeout(() => {
    const ta = document.querySelector('#overlay textarea');
    if (ta) ta.focus();
  }, 280);
}
function capturePauseFields() {
  if (!pauseDraft) return;
  const refl = document.getElementById('pause-reflection');
  if (refl) pauseDraft.reflection = refl.value;
  const peoplePlan = document.getElementById('pause-people-plan');
  if (peoplePlan) pauseDraft.people_plan = peoplePlan.value;
  ['liquid','invested','monthly_burn','note'].forEach(k => {
    const el = document.getElementById('pause-led-' + k);
    if (el) pauseDraft.ledger[k] = el.value;
  });
}

function pauseWeekStats() {
  const start = startOfWeek(new Date()).getTime();
  const end = endOfWeek(new Date()).getTime();
  const inWeek = (ts) => {
    if (!ts) return false;
    const t = new Date(ts).getTime();
    return t >= start && t <= end;
  };
  const workouts = state.workouts.filter(w => inWeek(w.ts) || inWeek(w.started_at));
  const lifts = workouts.filter(w => w.type === 'lift').length;
  const runs = workouts.filter(w => w.type === 'run').length;
  const examens = state.examens.filter(e => {
    const t = new Date(e.date_iso).getTime();
    return t >= start && t <= end;
  });
  const realExamens = examens.filter(e => !e.skipped_entirely).length;
  const sleepNights = state.sleep.filter(s => {
    const t = new Date(s.date).getTime();
    return t >= start && t <= end;
  });
  const avgSleep = sleepNights.length
    ? sleepNights.reduce((a,s)=>a+s.duration_h,0) / sleepNights.length
    : null;
  const touches = state.people.reduce((a, p) => a + (p.touches || []).filter(t => inWeek(t.ts)).length, 0);
  return { lifts, runs, workouts: workouts.length, examens: realExamens, avgSleep, sleepNights: sleepNights.length, touches };
}
function pauseWeekGrid() {
  const start = startOfWeek(new Date());

    const iso = d.toISOString().slice(0, 10);
    const dayName = ['M','T','W','T','F','S','S'][i];
    const isToday = iso === todayStr;
    const isFuture = d.getTime() > Date.now();
    const dayWorkouts = state.workouts.filter(w => isSameDay(w.ts || w.started_at, iso));
    const dayExamen = state.examens.find(e => e.date_iso === iso && !e.skipped_entirely);
    const dayTouches = state.people.reduce((a, p) => a + (p.touches || []).filter(t => isSameDay(t.ts, iso)).length, 0);
    const dots = [];
    if (dayExamen) dots.push('<div class="dot examen"></div>');
    dayWorkouts.forEach(() => dots.push('<div class="dot train"></div>'));
    for (let k = 0; k < Math.min(dayTouches, 3); k++) dots.push('<div class="dot touch"></div>');
    cells.push(`
      <div class="week-cell ${isToday ? 'today' : ''} ${isFuture ? 'future' : ''}">
        <div class="day">${dayName}</div>
