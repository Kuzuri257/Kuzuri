// TRAINING — LIFT SESSION (live)
// ═══════════════════════════════════════════════════════════════════════
let expandedSetKey = null;  // 'exIdx-setIdx' or null
let restTimer = null;
let restEnd = null;
// Pause state for the floating rest chip
let restPausedAt = null;       // Timestamp when paused (also acts as a paused flag)
let restPausedRemaining = 0;   // Seconds left at pause time

function startLiftSession(sessionId) {
  const sess = state.program && state.program.sessions[sessionId];
  if (!sess) { toast('Session not found'); return; }

  // Find the most recent prior workout for this session (by name match)
  const priorWorkouts = (state.workouts || [])
    .filter(w => w.type === 'lift' && w.session_name === sess.name)
    .sort((a, b) => new Date(b.ts) - new Date(a.ts));
  const lastWorkout = priorWorkouts[0] || null;

  // Build a map of exercise name → last_note from prior session (for carry-forward)
  const lastNoteMap = {};
  if (lastWorkout) {
    for (const ex of (lastWorkout.exercises || [])) {
      if (ex._next_note && ex._next_note.trim()) {
        lastNoteMap[ex.name] = ex._next_note.trim();
      }
    }
  }

  activeWorkout = {
    id: uid(),
    type: 'lift',
    session_id: sessionId,
    session_name: sess.name,
    started_at: Date.now(),
    ts: new Date().toISOString(),
    exercises: (sess.exercises || []).map(ex => ({
      code: ex.code,
      name: ex.name,
      note: ex.note || '',
      prep: !!ex.prep,
      last: ex.last || null,
      last_note: lastNoteMap[ex.name] || '',
      _next_note: '',
      sets: (ex.sets || []).map(s => ({ ...s })),
    })),
  };
  saveActiveWorkout();
  expandedSetKey = null;
  renderLiftSession();
}
function renderLiftSession() {
  if (!activeWorkout) return;
  // Count work-only sets for progress (prep is separate)
  const workExercises = activeWorkout.exercises.filter(e => !e.prep);
  const prepExercises = activeWorkout.exercises.filter(e => e.prep);
  const totalSets = workExercises.reduce((a, e) => a + e.sets.length, 0);
  const doneSets = workExercises.reduce((a, e) => a + e.sets.filter(s => s.rating).length, 0);
  const elapsedMin = Math.floor((Date.now() - activeWorkout.started_at) / 60000);
  const elapsed = elapsedMin <= 0 ? 'just started' : formatDurationMin(elapsedMin);
  const currentIdx = activeWorkout.exercises.findIndex(e => !e.prep && e.sets.some(s => !s.rating));
  // Floating circular rest chip — only when timer active
  const restChipHTML = restEnd ? (() => {
    // restPaused holds remaining seconds when paused; restEnd is set to a sentinel during pause
    const isPaused = !!restPausedAt;
    const remaining = isPaused
      ? restPausedRemaining
      : Math.max(0, Math.ceil((restEnd - Date.now())/1000));
    const mm = Math.floor(remaining / 60);
    const ss = String(remaining % 60).padStart(2, '0');
    // Total = whatever was originally set; keep as window var
    const total = window.__restTotal || 90;
    const pct = Math.max(0, Math.min(1, remaining / total));
    const r = 32, c = 2 * Math.PI * r;
    const dashOffset = c * (1 - pct);
    const ringColor = isPaused ? 'var(--ink-faint)' : 'var(--brass)';
    const textColor = isPaused ? 'var(--ink-muted)' : 'var(--ink)';
    const labelColor = isPaused ? 'var(--ink-faint)' : 'var(--brass)';
    const labelText = isPaused ? 'PAUSED' : 'REST';
    return `
      <div class="rest-chip" id="rest-chip">
        <button class="rest-chip-circle" id="rest-chip-circle" onclick="onRestChipTap()" aria-label="${isPaused ? 'Stop rest' : 'Pause rest'}">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="${r}" fill="var(--surface)" stroke="var(--ring-track)" stroke-width="3"/>
            <circle cx="40" cy="40" r="${r}" fill="none" stroke="${ringColor}" stroke-width="3" stroke-linecap="round"
                    stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${dashOffset.toFixed(1)}" transform="rotate(-90 40 40)"
                    class="rest-chip-arc"/>
            <text x="40" y="38" text-anchor="middle" class="rest-chip-time" fill="${textColor}">${mm}:${ss}</text>
            <text x="40" y="51" text-anchor="middle" class="rest-chip-label" fill="${labelColor}">${labelText}</text>
          </svg>
        </button>
        <div class="rest-chip-ctrls">
          <button class="rest-chip-btn" onclick="adjustRest(-15)" aria-label="Subtract 15 seconds">−15</button>
          <button class="rest-chip-btn" onclick="adjustRest(15)" aria-label="Add 15 seconds">+15</button>
        </div>
      </div>
    `;
  })() : '';

  // ── Prep card (grouped, collapsible) ──────────────────────────────
  let prepCard = '';
  if (prepExercises.length) {
    const prepDone = prepExercises.every(e => e.prep_done);
    const isExpanded = !!activeWorkout._prep_expanded;
    const prepStatus = prepDone ? 'Done' : `${prepExercises.filter(e => e.prep_done).length} of ${prepExercises.length}`;
    const prepItems = prepExercises.map(ex => {
      const origIdx = activeWorkout.exercises.indexOf(ex);
      return `
        <button class="prep-item ${ex.prep_done ? 'done' : ''}" onclick="togglePrepItem(${origIdx})">
          <div class="prep-item-tick">${ex.prep_done ? '✓' : ''}</div>
          <div class="prep-item-body">
            <div class="prep-item-name">${escapeHtml(ex.name)}</div>
            <div class="prep-item-meta">${ex.sets.length} × ${ex.sets[0]?.range || ''}${ex.sets[0]?.intensity ? ' · ' + ex.sets[0].intensity : ''}${ex.note ? ' · ' + escapeHtml(ex.note) : ''}</div>
          </div>
        </button>
      `;
    }).join('');
    prepCard = `
      <div class="prep-card ${prepDone ? 'done' : ''}">
        <button class="prep-card-head" onclick="togglePrepCard()">
          <div class="prep-card-head-l">
            <div class="prep-card-kicker">Prep</div>
            <div class="prep-card-title">Warmup &amp; activation</div>
            <div class="prep-card-sub">${prepExercises.length} items · ${prepStatus}</div>
          </div>
          <div class="prep-card-chevron ${isExpanded ? 'open' : ''}">
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 5l3 3 3-3"/></svg>
          </div>
        </button>
        ${isExpanded ? `
          <div class="prep-card-body">
            ${prepItems}
            ${!prepDone ? `
              <button class="prep-mark-all" onclick="markAllPrepDone()">Mark all prep done</button>
            ` : ''}
          </div>
        ` : ''}
      </div>
    `;
  }

  // ── Work exercise cards ──────────────────────────────────────────
  const workCards = workExercises.map((ex) => {
    const exIdx = activeWorkout.exercises.indexOf(ex);
    const isCurrent = exIdx === currentIdx;
    const allDone = ex.sets.length > 0 && ex.sets.every(s => s.rating);
    const anyLogged = ex.sets.some(s => s.rating);
    const cls = allDone ? 'done' : (isCurrent ? 'current' : '');
    const showHandle = !anyLogged;

    // Auto-collapse when all sets done, unless user has explicitly expanded
    // ex._collapsed === undefined → default behavior (allDone = collapse)
    // ex._collapsed === false → user manually expanded
    // ex._collapsed === true → user manually collapsed
    const collapsed = ex._collapsed !== undefined ? ex._collapsed : allDone;

    const handleHTML = showHandle ? `
      <button class="drag-handle"
              ontouchstart="dragStart(${exIdx}, event)"
              onmousedown="dragStart(${exIdx}, event)"
              onclick="event.stopPropagation()"
              aria-label="Reorder">
        <svg viewBox="0 0 12 16" fill="none"><circle cx="3.5" cy="3" r="1.2" fill="currentColor"/><circle cx="8.5" cy="3" r="1.2" fill="currentColor"/><circle cx="3.5" cy="8" r="1.2" fill="currentColor"/><circle cx="8.5" cy="8" r="1.2" fill="currentColor"/><circle cx="3.5" cy="13" r="1.2" fill="currentColor"/><circle cx="8.5" cy="13" r="1.2" fill="currentColor"/></svg>
      </button>` : '';

    // Collapsed summary line — most useful info at a glance
    let summaryLine = '';
    if (collapsed && anyLogged) {
      const loggedSets = ex.sets.filter(s => s.rating);
      const setStrs = loggedSets.map(s => {
        const w = s.weight || '—';

function startRestTimer(seconds) {

    const remaining = Math.max(0, Math.ceil((restEnd - Date.now()) / 1000));
    updateRestChipDOM(remaining);
    if (remaining <= 0) {

// Update the chip DOM in place (called every tick while running)
function updateRestChipDOM(remaining) {
  const timeEl = document.querySelector('.rest-chip-time');
  if (!timeEl) return;
  const mm = Math.floor(remaining / 60);
  const ss = String(remaining % 60).padStart(2, '0');
  timeEl.textContent = `${mm}:${ss}`;
  // Update ring fill
  const arc = document.querySelector('.rest-chip-arc');
  if (arc) {
    const total = window.__restTotal || 90;
    const r = 32, c = 2 * Math.PI * r;
    const pct = Math.max(0, Math.min(1, remaining / total));
    arc.setAttribute('stroke-dashoffset', (c * (1 - pct)).toFixed(1));
  }
}
function stopRestTimer() {

  restTimer = null;
  restEnd = null;
  restPausedAt = null;
  restPausedRemaining = 0;
  window.__restTotal = null;
  // Old selectors kept for safety
  const badge = document.getElementById('rest-badge');

function onRestChipTap() {

  if (!restPausedAt) {
    // First tap: pause
    restPausedAt = Date.now();
    restPausedRemaining = Math.max(0, Math.ceil((restEnd - Date.now()) / 1000));
    renderLiftSession();
  } else {

function adjustRest(deltaSec) {

    if (restPausedRemaining <= 0) {

      return;

    renderLiftSession();

  // Running: shift restEnd

// ── Weight parser (string weights: "BW", "BW+10", "80kg", etc.)
function parseWeight(str) {
  if (!str) return { numeric: null, raw: '', hasBodyweight: false };
  const s = String(str).trim();
  if (!s) return { numeric: null, raw: '', hasBodyweight: false };
  const upper = s.toUpperCase();
  if (upper === 'BW' || upper === 'BODYWEIGHT') return { numeric: 0, raw: s, hasBodyweight: true };
  const bw = upper.match(/^BW\s*([+-])\s*(\d+(?:\.\d+)?)/);
  if (bw) return { numeric: (bw[1] === '-' ? -1 : 1) * parseFloat(bw[2]), raw: s, hasBodyweight: true };
  const n = s.match(/^(-?\d+(?:\.\d+)?)/);
  if (n) return { numeric: parseFloat(n[1]), raw: s, hasBodyweight: false };
  return { numeric: null, raw: s, hasBodyweight: false };
}
function prepWeightsFor(exerciseName, setIdx) {
  const seen = new Set();
  const chips = [];
  const past = [...state.workouts].reverse();
  for (const wk of past) {
    if (wk.type !== 'lift') continue;
    if (wk.id === (activeWorkout && activeWorkout.id)) continue;
    const ex = (wk.exercises || []).find(e => e.name === exerciseName);
    if (!ex) continue;
    const ordered = [ex.sets[setIdx], ...ex.sets.filter((_, i) => i !== setIdx)].filter(Boolean);
    for (const s of ordered) {
      if (!s.weight) continue;
      const w = String(s.weight).trim();
      if (!w || seen.has(w)) continue;
      seen.add(w);
      chips.push(w);
      if (chips.length >= 4) return chips;
    }
  }
  // Fallback to seeded last-session data on the active workout's exercise
  if (!chips.length && activeWorkout) {
    const liveEx = activeWorkout.exercises.find(e => e.name === exerciseName);
    if (liveEx && liveEx.last) {
      const ordered = [liveEx.last[setIdx], ...liveEx.last.filter((_, i) => i !== setIdx)].filter(Boolean);
      for (const s of ordered) {
        if (!s || s.weight == null) continue;
        const w = String(s.weight).trim();
        if (!w || seen.has(w)) continue;
        seen.add(w);
        chips.push(w);
        if (chips.length >= 4) return chips;
      }
    }
  }
  return chips;
}

// ── Drag-reorder
let dragState = null;
function dragStart(exIdx, event) {

  if ((ex.sets || []).some(s => s.rating)) return;
  event.preventDefault();
  const touch = event.touches ? event.touches[0] : event;
  dragState = { exIdx, startY: touch.clientY, overIdx: exIdx };
  const card = document.getElementById(`excard-${exIdx}`);
  if (card) card.classList.add('p2-dragging');
  document.body.style.overflow = 'hidden';

function dragMove(event) {
  if (!dragState) return;
  event.preventDefault();
  const touch = event.touches ? event.touches[0] : event;
  const card = document.getElementById(`excard-${dragState.exIdx}`);
  if (card) {
    card.style.transform = `translateY(${touch.clientY - dragState.startY}px)`;
    card.style.zIndex = '50';
  }
  const underEl = document.elementFromPoint(touch.clientX, touch.clientY);
  if (underEl) {
    const nearCard = underEl.closest('.ex-card');
    if (nearCard && nearCard.id && nearCard.id.startsWith('excard-')) {
      const overIdx = parseInt(nearCard.id.replace('excard-', ''));
      if (overIdx !== dragState.overIdx) {
        const target = activeWorkout.exercises[overIdx];
        if (target && !(target.sets || []).some(s => s.rating)) {
          dragState.overIdx = overIdx;
          document.querySelectorAll('.ex-card').forEach(c => c.classList.remove('p2-drag-target'));
          nearCard.classList.add('p2-drag-target');
        }
      }
    }
  }
}

  const { exIdx, overIdx } = dragState;
  const card = document.getElementById(`excard-${exIdx}`);
  if (card) {
    card.classList.remove('p2-dragging');
    card.style.transform = '';
    card.style.zIndex = '';
  }
  document.querySelectorAll('.ex-card').forEach(c => c.classList.remove('p2-drag-target'));
  document.body.style.overflow = '';
  if (overIdx !== exIdx) {
    const moved = activeWorkout.exercises.splice(exIdx, 1)[0];

function detectPR(workout) {

  for (const exercise of workout.exercises) {
    for (const set of (exercise.sets || [])) {
      const p = parseWeight(set.weight);
      if (p.numeric == null) continue;
      const r = parseInt(set.reps);
      if (!r) continue;
      let histBest = null;
      state.workouts.forEach(wk => {
        if (wk.id === workout.id || wk.type !== 'lift') return;
        (wk.exercises || []).forEach(e => {
          if (e.name !== exercise.name) return;
          (e.sets || []).forEach(s => {
            const pp = parseWeight(s.weight);
            const pr = parseInt(s.reps);
            if (pp.numeric == null || !pr || pr < r) return;
            if (p.hasBodyweight !== pp.hasBodyweight) return;
            if (histBest === null || pp.numeric > histBest) histBest = pp.numeric;
          });
        });
      });
      if (histBest !== null && p.numeric >= histBest) {
        const score = p.numeric * r;
        if (!bestNew || score > bestNew.score) {
          bestNew = { exercise: exercise.name, weight: p.raw, reps: r, score, matched: p.numeric === histBest };
        }
      }
    }
  }
  return bestNew;
}
function marqueeLift(workout) {
  let best = null;
  for (const exercise of workout.exercises || []) {
    for (const set of (exercise.sets || [])) {
      const p = parseWeight(set.weight);
      if (p.numeric == null) continue;
      const r = parseInt(set.reps);
      if (!r) continue;
      const score = p.numeric * r;
      if (!best || score > best.score) best = { weight: p.raw, reps: r, score };
    }
  }
  return best;
}
function sessionShape(workout) {
  const sets = (workout.exercises || []).flatMap(e => e.sets || []);
  const rated = sets.filter(s => s.rating);
  if (rated.length === 0) return 'minimal';
  if (detectPR(workout)) return 'pr';
  if (rated.length < 6) return 'minimal';
  const scaled = rated.filter(s => s.rating === 'scaled' || s.rating === 'easier').length;
  const honest = rated.filter(s => s.rating === 'prescribed' || s.rating === 'pr').length;
  if (scaled > honest) return 'scaled';
  return 'solid';
}
function openLiftClose(workout) {
  const shape = sessionShape(workout);
  const pr = detectPR(workout);
  const m = marqueeLift(workout);
  const pool = LIFT_CLOSE_QUOTES[shape] || LIFT_CLOSE_QUOTES.solid;
  const q = pool[Math.floor(Math.random() * pool.length)];
  const totalSets = (workout.exercises || []).reduce((a, e) => a + (e.sets || []).filter(s => s.rating).length, 0);
  const honest = (workout.exercises || []).reduce((a, e) => a + (e.sets || []).filter(s => s.rating === 'prescribed' || s.rating === 'pr').length, 0);

  const prBadge = pr ? `
    <div style="text-align:center;">
      <span class="pr-badge">${pr.matched ? 'Matched' : 'New'} PR · ${escapeHtml(pr.weight)} × ${pr.reps} ${escapeHtml(pr.exercise)}</span>
    </div>` : '';
  const marqueeStr = m ? `${escapeHtml(m.weight)}×${m.reps}` : '—';
  const existingNote = workout.close_note || '';

  openOverlay(`
    ${prBadge}
    <div class="close-headline">That was the work.</div>
    <div class="quote-card">
      <div class="quote-body">${escapeHtml(q.text)}</div>
      <div class="quote-attr">${escapeHtml(q.attr)}</div>
    </div>
    <div class="close-stats">
      <div class="close-stat"><div class="close-stat-n">${totalSets}</div><div class="close-stat-l">Sets</div></div>
      <div class="close-stat"><div class="close-stat-n">${honest}</div><div class="close-stat-l">Honest</div></div>
      <div class="close-stat"><div class="close-stat-n brass">${marqueeStr}</div><div class="close-stat-l">Marquee</div></div>
      <div class="close-stat"><div class="close-stat-n">${workout.duration_min || 0}m</div><div class="close-stat-l">Duration</div></div>
    </div>
    <div class="close-note-h">
      <span>A line, if you like</span>
    </div>
    <textarea class="close-note" id="close-note"
              placeholder="What was that work about?">${escapeHtml(existingNote)}</textarea>
    <button class="btn-full" onclick="saveLiftClose('${workout.id}')">Close session</button>
  `);
}
function saveLiftClose(workoutId) {
  const workout = state.workouts.find(w => w.id === workoutId);
  if (!workout) { closeOverlay(); return; }

  const seen = new Map();
  // Iterate newest first
  for (let i = state.workouts.length - 1; i >= 0; i--) {
    const w = state.workouts[i];
    if (w.type !== 'activity') continue;
    const key = (w.activity_name || '').trim().toLowerCase();
    if (!key) continue;
    if (!seen.has(key)) {
      seen.set(key, {
        name: w.activity_name.trim(),
        emoji: w.emoji || suggestHabitEmoji(w.activity_name)[0] || '',
      });
    }
    if (seen.size >= limit) break;
  }
  return Array.from(seen.values());
}

// DEFAULT PROGRAM SEED — Abdulla's upper/lower 4-session split
// Runs once on first boot; can be re-seeded via Me → Training → Reload program
// ═══════════════════════════════════════════════════════════════════════
function seedDefaultProgram() {
  // Helper — build a single working-set exercise
  function ex(code, name, setCount, range, intensity, opts = {}) {
    const sets = [];
    // If range/intensity are arrays (per-set), use them; else fill uniformly
    const ranges = Array.isArray(range) ? range : Array(setCount).fill(range);
    const intensities = Array.isArray(intensity) ? intensity : Array(setCount).fill(intensity);
    for (let i = 0; i < setCount; i++) {
      sets.push({
        range: ranges[i] || ranges[ranges.length - 1],
        intensity: intensities[i] || intensities[intensities.length - 1],
      });
    }
    return {
      code, name,
      sets,
      note: opts.note || '',
      last: opts.last || null,   // array of {weight, reps} per set, last time
      prep: !!opts.prep,
    };
  }
  function prep(code, name, setCount, range, intensity, note) {
    return ex(code, name, setCount, range, intensity, { prep: true, note: note || '' });
  }

  const sessions = {};

  // ─── UPPER I ─────────────────────────────────────────────────────────
  sessions['sess_upper_i'] = {
    id: 'sess_upper_i',
    name: 'Upper I',
    exercises: [
      prep('P1', 'Knee Raises in Dip Bar',          2, '8-12',  'Mod'),
      prep('P2', 'SA Cable Lateral Raises',         2, '12-15', 'Mod'),
      prep('P3', 'Cable Pullover',                  2, '12-15', 'Mod'),
      prep('P4', 'Ab Roller',                       2, '12-15', 'Mod'),
      ex('A1', 'Machine Rear Delt Flys',  3, '8-15', '1-0 RIR',
         { note: 'Cable · focus on scap movement',
           last: [{weight:48,reps:12},{weight:54,reps:10},{weight:54,reps:null}] }),
      ex('B1', 'Pull-ups',                3, ['4-6','4-6','AMRAP'], '1-2 RIR',
         { last: [{weight:10,reps:5},{weight:10,reps:5},{weight:'BW',reps:10}] }),
      ex('C1', 'High Cable Biceps Curls', 3, '8-12', '1-0 RIR',
         { last: [{weight:23,reps:12},{weight:28.5,reps:9},{weight:28.5,reps:null}] }),
      ex('D1', 'Bench Press', 3,
         ['2','2','AMRAP(-1)'],
         ['RPE 7','RPE 7','80% of top set'],
         { last: [{weight:70,reps:2},{weight:75,reps:2},{weight:60,reps:11}] }),
      ex('E1', 'SA Machine Row',          2, '8-12', '1-0 RIR',
         { note: 'Watson',
           last: [{weight:35,reps:12},{weight:45,reps:8}] }),
      ex('F1', 'Low DB Incline Bench Press', 2, ['6-8','8-12'], '1-0 RIR',
         { note: 'Pause in lengthened, 2ct',
           last: [{weight:22.5,reps:8},{weight:27.2,reps:12}] }),
      ex('G1', 'SA X-Over Triceps',       2, '8-12', '1-0 RIR'),
      ex('H1', 'SA Machine Preacher Curls', 2, '8-12', '1-0 RIR'),
    ],
  };

  // ─── LOWER I ─────────────────────────────────────────────────────────
  sessions['sess_lower_i'] = {
    id: 'sess_lower_i',

// BOOT
// ═══════════════════════════════════════════════════════════════════════
if (!state.startDate) {
  state.startDate = todayISO();
  saveState();
}

// First-boot program seeding — Abdulla's 4-session upper/lower split.
// Only seeds if no program exists yet. Won't overwrite an existing program.
if (!state.program || !state.program.sessions || !Object.keys(state.program.sessions).length) {
  state.program = seedDefaultProgram();
  saveState();
}

applyTheme();
// v2.9.2: Run photo expiry once on boot
expireOldPhotos();
// Ensure the active screen matches state.nav.active
document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
const bootActive = state.nav.active || 'today';
const bootScreen = document.getElementById('screen-' + bootActive);
if (bootScreen) bootScreen.classList.add('active');
render();

// v3.0 — Whoop init: check for ?whoop=connected return, or run daily background sync
handleWhoopReturn();

</script>
