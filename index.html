// EXAMEN
// ═══════════════════════════════════════════════════════════════════════
let examenDraft = null;
let examenStep = 0;
let examenRecognition = null;
let examenVoiceTargetId = null;

function voiceAvailable() {
  if (state.config.examen_voice_enabled === false) return false;
  if (typeof window.webkitSpeechRecognition === 'undefined' && typeof window.SpeechRecognition === 'undefined') return false;
  if (window.location.protocol === 'file:') return false;
  return true;
}

function openExamen() {
  const existing = todayExamen();
  if (existing) return openExamenSummary();
  examenDraft = {
    date_iso: todayISO(),
    went_well: '',
    went_poorly: '',
    remains: '',
    virtue_tags: [],
    skipped: { poorly: false, remains: false },
    carry_forward: true,
  };
  examenStep = 0;
  renderExamen();
}
function closeExamen() {
  stopExamenVoice();
  closeOverlay();
  examenDraft = null;
}
function renderExamen() {
  if (!examenDraft) return;
  captureExamenFields();
  const dots = [0,1,2,3,4].map(i => {
    if (i < examenStep) return '<span class="done"></span>';
    if (i === examenStep) return '<span class="active"></span>';
    return '<span></span>';
  }).join('');
  let body;
  if (examenStep === 0) body = examenInvocation();
  else if (examenStep === 1) body = examenWentWell();
  else if (examenStep === 2) body = examenWentPoorly();
  else if (examenStep === 3) body = examenRemains();
  else body = examenClosing();

  openOverlay(`
    <div class="ex-progress">${dots}</div>
    ${body}
  `);
  setTimeout(() => {
    const ta = document.querySelector('#overlay textarea');
    if (ta) ta.focus();
  }, 280);
}
function captureExamenFields() {
  if (!examenDraft) return;
  const well = document.getElementById('ex-field-well');
  if (well) examenDraft.went_well = well.value;
  const poor = document.getElementById('ex-field-poor');
  if (poor) examenDraft.went_poorly = poor.value;
  const rem = document.getElementById('ex-field-rem');
  if (rem) examenDraft.remains = rem.value;
}
function examenInvocation() {
  return `
    <div class="ex-kicker">After sunset</div>
    <div class="ex-prompt">The day is ending.</div>
    <div style="font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--ink-muted);line-height:1.6;margin-bottom:4px;">

    </div>
    <button class="btn-brass" onclick="examenNext()">Begin</button>

}
function micBtn(targetId) {

  const active = examenVoiceTargetId === targetId;
  return `<button class="ex-mic-btn ${active ? 'listening' : ''}" onclick="toggleExamenVoice('${targetId}')" aria-label="Voice input">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
      <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
      <line x1="12" y1="18" x2="12" y2="22"/>

}
function examenWentWell() {

    return `<button class="ex-virtue-chip ${sel}" onclick="toggleVirtue('${v.id}')">

function examenWentPoorly() {

    <div style="opacity:0.78">

}
function examenRemains() {
  const checked = examenDraft.carry_forward ? 'checked' : '';
  return `
    <div class="ex-kicker">Three of three</div>
    <div class="ex-prompt">What did I leave undone?</div>
    <div class="ex-field-wrap">
      <textarea id="ex-field-rem" class="ex-field" placeholder="If there is anything.">${escapeHtml(examenDraft.remains)}</textarea>
      ${micBtn('ex-field-rem')}
    </div>
    <label class="ex-toggle-row">
      <span class="ex-toggle">
        <input type="checkbox" ${checked} onchange="examenDraft.carry_forward = this.checked">
        <span class="ex-toggle-slider"></span>
      </span>
      <span>Carry this to tomorrow as my intention</span>
    </label>
    <button class="btn-brass" onclick="examenNext()">Continue</button>
    <button class="btn-skip" onclick="examenSkipStep(3)">Skip</button>

}
function examenClosing() {
  const well = (examenDraft.went_well || '').trim();
  const poor = (examenDraft.went_poorly || '').trim();
  const rem = (examenDraft.remains || '').trim();
  const allSkipped = !well && !poor && !rem;
  let virtueLine = '';
  if (examenDraft.virtue_tags.length) {
    const names = examenDraft.virtue_tags.map(id => VIRTUES.find(v => v.id === id)?.label).filter(Boolean);
    if (names.length) virtueLine = `<div class="ex-close-virtue">${names.join(' · ')}</div>`;
  }
  let echo;
  if (allSkipped) echo = `<div class="ex-close-echo">${EXAMEN_ALL_SKIPPED}</div>`;
  else if (well) echo = `<div class="ex-close-echo">&ldquo;${escapeHtml(well)}&rdquo;</div>`;
  else {
    const fb = EXAMEN_CLOSING_FALLBACKS[Math.floor(Math.random() * EXAMEN_CLOSING_FALLBACKS.length)];
    echo = `<div class="ex-close-echo">${fb}</div>`;
  }
  return `
    <svg class="ex-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    ${virtueLine}
    <div class="ex-close-headline">The day is sealed.</div>
    ${echo}
    <button class="btn-brass" onclick="examenFinalize()">Close</button>

}
function examenNext() {
  captureExamenFields();
  stopExamenVoice();
  if (examenStep < 4) examenStep++;
  renderExamen();
}
function examenSkipStep(step) {
  captureExamenFields();
  stopExamenVoice();
  if (step === 2) examenDraft.skipped.poorly = true;
  if (step === 3) examenDraft.skipped.remains = true;
  examenStep++;
  renderExamen();
}
function examenSkipTonight() {
  state.examens.push({
    id: uid(), date_iso: todayISO(),
    skipped_entirely: true,
    created_at: new Date().toISOString(),
    completed_at: new Date().toISOString(),
  });
  saveState();
  closeExamen();
  render();
  toast('Rest well.');
}
function toggleVirtue(vid) {
  if (!examenDraft) return;
  captureExamenFields();
  const idx = examenDraft.virtue_tags.indexOf(vid);
  if (idx >= 0) examenDraft.virtue_tags.splice(idx, 1);
  else examenDraft.virtue_tags.push(vid);
  renderExamen();
}
function examenFinalize() {
  if (!examenDraft) return;
  captureExamenFields();
  stopExamenVoice();
  const now = new Date().toISOString();
  const record = {
    id: uid(),
    date_iso: examenDraft.date_iso,
    went_well: examenDraft.went_well.trim(),
    went_poorly: examenDraft.went_poorly.trim(),
    remains: examenDraft.remains.trim(),
    virtue_tags: [...examenDraft.virtue_tags],
    skipped: { ...examenDraft.skipped },
    carry_forward: examenDraft.carry_forward,
    created_at: now,
    completed_at: now,
  };
  state.examens.push(record);
  // @mention auto-extraction — inside-out accretion
  const mentioned = scanForMentions(
    [record.went_well, record.went_poorly, record.remains].join(' '),
    { source: 'examen', source_id: record.id, ts: now }
  );
  if (mentioned.length) {
    record.mentions = mentioned.map(p => p.id);
  }
  if (record.carry_forward && record.remains) {
    const tmrw = new Date(); tmrw.setDate(tmrw.getDate() + 1);
    const tmrwISO = tmrw.toISOString().slice(0,10);
    state.intentions = state.intentions.filter(i => i.for_date !== tmrwISO);
    state.intentions.push({
      id: uid(), for_date: tmrwISO,
      text: record.remains, completed: false, source: 'examen',
    });
  }
  saveState();
  closeExamen();
  render();
  toast('Rest well.');
}
function openExamenSummary() {
  const ex = todayExamen();
  if (!ex) return;
  const virtues = (ex.virtue_tags || []).map(id => VIRTUES.find(v => v.id === id)?.label).filter(Boolean);
  const virtueLine = virtues.length ? `<div class="ex-close-virtue">${virtues.join(' · ')}</div>` : '';
  const block = (label, text, dim) => text ? `
    <div style="padding:12px 14px;background:var(--surface-2);border-radius:10px;margin-bottom:10px;${dim?'opacity:0.78;':''}">
      <div class="ex-kicker" style="margin-bottom:6px;">${label}</div>
      <div style="font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--ink);line-height:1.55;">${escapeHtml(text)}</div>
    </div>` : '';
  const skipped = ex.skipped_entirely ? `
    <div style="text-align:center;padding:40px 20px;color:var(--ink-muted);font-family:'Fraunces',serif;font-style:italic;">
      — Not tonight —
    </div>` : '';
  openOverlay(`
    <div class="ex-kicker" style="text-align:center;">Tonight's examen</div>
    ${virtueLine}
    ${skipped || (block('Did well', ex.went_well) + block('Did poorly', ex.went_poorly, true) + block('Remains', ex.remains))}
    <button class="btn-skip" onclick="closeOverlay()" style="margin-top:20px;">Close</button>
  `);
}
function toggleExamenVoice(targetId) {
  if (examenVoiceTargetId === targetId) {
    stopExamenVoice();
    renderExamen();
    return;
  }
  startExamenVoice(targetId);
}
function startExamenVoice(targetId) {
  stopExamenVoice();
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  const rec = new SR();
  rec.continuous = true;
  rec.interimResults = true;
  rec.lang = 'en-US';
  examenRecognition = rec;
  examenVoiceTargetId = targetId;
  const ta = document.getElementById(targetId);
  if (!ta) return;
  const baseText = ta.value;
  rec.onresult = (event) => {
    let interim = '', final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const r = event.results[i];
      if (r.isFinal) final += r[0].transcript + ' ';
      else interim += r[0].transcript;
    }
    ta.value = (baseText + (baseText && (final || interim) ? ' ' : '') + final + interim).replace(/\s+/g, ' ').trim();
  };
  rec.onerror = () => { stopExamenVoice(); renderExamen(); };
  rec.onend = () => {
    if (examenVoiceTargetId === targetId) {
      examenVoiceTargetId = null;
      examenRecognition = null;
      renderExamen();
    }
  };
  try { rec.start(); renderExamen(); }
  catch (e) { stopExamenVoice(); }
}
function stopExamenVoice() {
  if (examenRecognition) {
    try { examenRecognition.stop(); } catch(_){}
  }
  examenRecognition = null;
  examenVoiceTargetId = null;
}

// ═══════════════════════════════════════════════════════════════════════
// PHASE 4 — THE PAUSE
// Saturday-evening / Sunday weekly ritual.
// 3 cards (4 if first Saturday of month: Ledger card appears).
// Steps: Reflect on the week → Set intentions → (Ledger) → Closing
// ═══════════════════════════════════════════════════════════════════════
let pauseDraft = null;
let pauseStep = 0;

function isFirstSaturdayOfMonth(d = new Date()) {
  if (d.getDay() !== 6) return false;
  return d.getDate() <= 7;
}
function pauseShowsLedger() {
  // Show ledger card on first Saturday of month, OR if no ledger snapshot in 28+ days
  if (isFirstSaturdayOfMonth()) return true;
  if (!state.ledger.length) return true;
  const latest = [...state.ledger].sort((a,b) => (b.date || '').localeCompare(a.date || ''))[0];
  const daysSince = Math.floor((Date.now() - new Date(latest.date).getTime()) / 86400000);
  return daysSince >= 28;
}
function pauseShowsPeople() {
  // Show people step if there's anyone in the circle at all — even if no one is overdue,
  // the free-text "who this week" box is still valuable.
  return (state.people || []).length > 0;
}
function pauseTotalSteps() {
  // week + intents + closing = 3 baseline
  let n = 3;
  if (pauseShowsPeople()) n++;
  if (pauseShowsLedger()) n++;
  return n;
}

function openPause() {
  if (thisWeekPause()) return openPauseSummary();
  pauseDraft = {
    week_iso: weekISO(new Date()),
    saturday_iso: todayISO(),
    reflection: '',
    people_plan: '',    // NEW — free text for "who will you reach out to this week"
    intents: [],         // strings, max 5
    ledger: { liquid: '', invested: '', monthly_burn: '', note: '' },
    skipped: { ledger: false, people: false },
  };
  pauseStep = 0;
  renderPause();
}
function closePause() {
  closeOverlay();
  pauseDraft = null;
}
function renderPause() {
  if (!pauseDraft) return;
  capturePauseFields();
  const total = pauseTotalSteps();
  const dots = Array.from({ length: total }, (_, i) => {
    if (i < pauseStep) return '<span class="done"></span>';
    if (i === pauseStep) return '<span class="active"></span>';
    return '<span></span>';
  }).join('');
  // Step order: 0=week, 1=people (if shown), 2=intents, 3=ledger (if shown), last=closing
  // We compute the semantic step based on which optional steps are present.
  const steps = ['week'];
  if (pauseShowsPeople()) steps.push('people');
  steps.push('intents');
  if (pauseShowsLedger()) steps.push('ledger');
  steps.push('closing');
  const stepName = steps[pauseStep] || 'closing';

  let body;
  if (stepName === 'week')         body = pauseStepWeek();
  else if (stepName === 'people')  body = pauseStepPeople();
  else if (stepName === 'intents') body = pauseStepIntents();
  else if (stepName === 'ledger')  body = pauseStepLedger();
  else                             body = pauseStepClosing();

  openOverlay(`
    <div class="ex-progress">${dots}</div>
    ${body}
  `);
  setTimeout(() => {
    const ta = document.querySelector('#overlay textarea');
    if (ta) ta.focus();
  }, 280);
}
function capturePauseFields() {
  if (!pauseDraft) return;
  const refl = document.getElementById('pause-reflection');
  if (refl) pauseDraft.reflection = refl.value;
  const peoplePlan = document.getElementById('pause-people-plan');
  if (peoplePlan) pauseDraft.people_plan = peoplePlan.value;
  ['liquid','invested','monthly_burn','note'].forEach(k => {
    const el = document.getElementById('pause-led-' + k);
    if (el) pauseDraft.ledger[k] = el.value;
  });
}

function pauseWeekStats() {
  const start = startOfWeek(new Date()).getTime();
  const end = endOfWeek(new Date()).getTime();
  const inWeek = (ts) => {
    if (!ts) return false;
    const t = new Date(ts).getTime();
    return t >= start && t <= end;
  };
  const workouts = state.workouts.filter(w => inWeek(w.ts) || inWeek(w.started_at));
  const lifts = workouts.filter(w => w.type === 'lift').length;
  const runs = workouts.filter(w => w.type === 'run').length;
  const examens = state.examens.filter(e => {
    const t = new Date(e.date_iso).getTime();
    return t >= start && t <= end;
  });
  const realExamens = examens.filter(e => !e.skipped_entirely).length;
  const sleepNights = state.sleep.filter(s => {
    const t = new Date(s.date).getTime();
    return t >= start && t <= end;
  });
  const avgSleep = sleepNights.length
    ? sleepNights.reduce((a,s)=>a+s.duration_h,0) / sleepNights.length
    : null;
  const touches = state.people.reduce((a, p) => a + (p.touches || []).filter(t => inWeek(t.ts)).length, 0);
  return { lifts, runs, workouts: workouts.length, examens: realExamens, avgSleep, sleepNights: sleepNights.length, touches };
}
function pauseWeekGrid() {
  const start = startOfWeek(new Date());
  const todayStr = todayISO();
  const cells = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(start);
    d.setDate(start.getDate() + i);
    const iso = d.toISOString().slice(0, 10);
    const dayName = ['M','T','W','T','F','S','S'][i];
    const isToday = iso === todayStr;
    const isFuture = d.getTime() > Date.now();
    const dayWorkouts = state.workouts.filter(w => isSameDay(w.ts || w.started_at, iso));
    const dayExamen = state.examens.find(e => e.date_iso === iso && !e.skipped_entirely);
    const dayTouches = state.people.reduce((a, p) => a + (p.touches || []).filter(t => isSameDay(t.ts, iso)).length, 0);
    const dots = [];
    if (dayExamen) dots.push('<div class="dot examen"></div>');
    dayWorkouts.forEach(() => dots.push('<div class="dot train"></div>'));
    for (let k = 0; k < Math.min(dayTouches, 3); k++) dots.push('<div class="dot touch"></div>');
    cells.push(`
      <div class="week-cell ${isToday ? 'today' : ''} ${isFuture ? 'future' : ''}">
        <div class="day">${dayName}</div>
        <div class="dots">${dots.join('')}</div>
      </div>
    `);
  }
  return `<div class="week-grid">${cells.join('')}</div>`;
}
function pauseStepWeek() {
  const stats = pauseWeekStats();
  const sleepStr = stats.avgSleep != null ? `${stats.avgSleep.toFixed(1)}h` : '—';
  return `
    <div class="pause-kicker">The week behind</div>
    <div class="pause-headline">What did the week hold?</div>
    ${pauseWeekGrid()}
    <div class="week-stats-row">
      <div class="week-stat">
        <div class="week-stat-n accent">${stats.workouts}</div>
        <div class="week-stat-l">Workouts</div>
      </div>
      <div class="week-stat">
        <div class="week-stat-n brass">${stats.examens}</div>
        <div class="week-stat-l">Examens</div>
      </div>
      <div class="week-stat">
        <div class="week-stat-n">${sleepStr}</div>
        <div class="week-stat-l">Sleep avg</div>
      </div>
      <div class="week-stat">
        <div class="week-stat-n">${stats.touches}</div>
        <div class="week-stat-l">Touches</div>
      </div>
    </div>
    <div style="font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--ink-muted);line-height:1.55;margin:12px 0 10px;">
      A line on what mattered. What you tended. What surprised you.
    </div>
    <textarea id="pause-reflection" class="ex-field" placeholder="Anything you don't write down is forgotten by Tuesday.">${escapeHtml(pauseDraft.reflection)}</textarea>
    <button class="btn-brass" onclick="pauseNext()">Continue</button>
    <button class="btn-skip" onclick="pauseSkipStep()">Skip this</button>
  `;
}
function pauseStepPeople() {
  // Build sorted overdue list (most overdue first), then on-time recently-touched.
  const overdue = (state.people || [])
    .filter(personIsDue)
    .map(p => ({ p, over: daysOverdue(p) }))
    .sort((a, b) => b.over - a.over);
  const onTime = (state.people || [])
    .filter(p => !personIsDue(p))
    .sort((a, b) => {
      const ta = a.last_touch_ts ? new Date(a.last_touch_ts).getTime() : 0;
      const tb = b.last_touch_ts ? new Date(b.last_touch_ts).getTime() : 0;
      return tb - ta;
    })
    .slice(0, 3);

  const overdueRows = overdue.slice(0, 6).map(({ p, over }) => {
    const weeks = Math.floor(over / 7);
    const overStr = weeks >= 1 ? `${weeks}w` : `${over}d`;
    const tierLabel = p.tier ? (p.tier.charAt(0).toUpperCase() + p.tier.slice(1)) : 'Tribe';
    const avatarClass = p.tier === 'inner' ? 'a1' : p.tier === 'close' ? 'a2' : 'a3';
    return `
      <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-top:0.5px solid var(--line);">
        <div class="avatar ${avatarClass}" style="width:28px;height:28px;font-size:11px;margin-left:0;">${escapeHtml((p.name || '?')[0].toUpperCase())}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-family:'Fraunces',serif;font-size:14px;color:var(--ink);line-height:1.2;">${escapeHtml(p.name)}</div>
          <div style="font-size:10.5px;color:var(--ink-muted);margin-top:2px;letter-spacing:0.02em;">${tierLabel} · ${p.cadence}</div>
        </div>
        <div style="font-size:11px;color:var(--clay);font-family:ui-monospace,monospace;letter-spacing:0.02em;">${overStr}</div>
      </div>
    `;
  }).join('');

  const onTimeRows = onTime.map(p => {
    const lastStr = p.last_touch_ts ? daysAgoShort(p.last_touch_ts) : '—';
    const tierLabel = p.tier ? (p.tier.charAt(0).toUpperCase() + p.tier.slice(1)) : 'Tribe';
    const avatarClass = p.tier === 'inner' ? 'a1' : p.tier === 'close' ? 'a2' : 'a3';
    return `
      <div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-top:0.5px solid var(--line);">
        <div class="avatar ${avatarClass}" style="width:28px;height:28px;font-size:11px;margin-left:0;">${escapeHtml((p.name || '?')[0].toUpperCase())}</div>

function pauseAddIntent() {

function finalizePause() {
  if (!pauseDraft) return;
  capturePauseFields();
  const now = new Date().toISOString();
  // Persist Pause record
  state.pauses.push({
    id: uid(),
    week_iso: pauseDraft.week_iso,
    saturday_iso: pauseDraft.saturday_iso,
    reflection: (pauseDraft.reflection || '').trim(),
    people_plan: (pauseDraft.people_plan || '').trim(),
    intents: [...pauseDraft.intents],
    ledger_skipped: pauseDraft.skipped.ledger,
    people_skipped: pauseDraft.skipped.people,
    created_at: now,
  });
  // Persist intents to weekly_intents for the new week
  const newWeekIso = (() => {
    const d = startOfWeek(new Date());
    d.setDate(d.getDate() + 7);
    return d.toISOString().slice(0, 10);
  })();
  // Wipe any prior intents for that week (in case re-doing)
  state.weekly_intents = state.weekly_intents.filter(i => i.week_iso !== newWeekIso);
  pauseDraft.intents.forEach(text => {
    state.weekly_intents.push({
      id: uid(), week_iso: newWeekIso, text, completed: false, created_at: now,
    });
  });
  // Persist ledger snapshot if filled
  if (!pauseDraft.skipped.ledger) {
    const liquid = parseFloat(pauseDraft.ledger.liquid);
    const burn = parseFloat(pauseDraft.ledger.monthly_burn);
    if (liquid > 0 && burn > 0) {
      const invested = parseFloat(pauseDraft.ledger.invested);
      state.ledger.push({
        id: uid(),
        date: pauseDraft.saturday_iso,
        liquid,
        invested: isFinite(invested) ? invested : null,
        monthly_burn: burn,
        note: (pauseDraft.ledger.note || '').trim(),
      });
    }
  }
  saveState();
  closePause();
  render();
  toast('The week is closed.');
}

// PEOPLE TAB
// ═══════════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════════
// PHASE 4 — PEOPLE TAB (Dunbar surface)
// Tiers: inner (≤5) · close (≤15) · tribe (≤50) · community (≤150)
// Concentric SVG, tier tabs below for list filter, tap person → detail
// ═══════════════════════════════════════════════════════════════════════
let peopleTierFilter = 'all';   // 'all' | 'inner' | 'close' | 'tribe' | 'community'

const TIERS = [
  { id: 'inner',     label: 'Inner',     radius: 48,  cap: 5,   color: 'var(--accent-bright)' },
  { id: 'close',     label: 'Close',     radius: 80,  cap: 15,  color: 'var(--brass)' },
  { id: 'tribe',     label: 'Tribe',     radius: 115, cap: 50,  color: 'var(--ink-muted)' },
  { id: 'community', label: 'Community', radius: 148, cap: 150, color: 'var(--ink-faint)' },
];
const CADENCE_DAYS = { daily: 1, weekly: 7, biweekly: 14, monthly: 30 };

function personIsDue(p) {
  const days = CADENCE_DAYS[p.cadence];
  if (!days) return false;
  if (!p.last_touch_ts) return true;
  const daysSince = Math.floor((Date.now() - new Date(p.last_touch_ts).getTime()) / 86400000);
  return daysSince > days;
}
function daysOverdue(p) {
  const days = CADENCE_DAYS[p.cadence];
  if (!days) return 0;
  if (!p.last_touch_ts) return 999;
  const daysSince = Math.floor((Date.now() - new Date(p.last_touch_ts).getTime()) / 86400000);
  return Math.max(0, daysSince - days);
}
function peopleInTier(tierId) {
  return state.people.filter(p => (p.tier || 'tribe') === tierId);
}

// @mention parser — inside-out accretion.
// Parses @name patterns from any text. For each match:
//   - If the name matches an existing person: auto-log a touch of type 'reflection_mention'.
//   - If no match: collect into `unmatched` and surface a toast asking to add them.
// Match is case-insensitive and matches on first-name-only or exact full name.
// Returns array of matched people (so caller can store their IDs on the source record).
function scanForMentions(text, meta) {
  if (!text || typeof text !== 'string') return [];
  const rx = /@([A-Za-z][A-Za-z'\-]{1,30})/g;
  const matches = [...text.matchAll(rx)].map(m => m[1]);
  if (!matches.length) return [];

  const matched = [];
  const unmatched = [];
  const seenIds = new Set();

  for (const raw of matches) {
    const lower = raw.toLowerCase();
    const person = state.people.find(p => {
      if (!p.name) return false;
      const full = p.name.toLowerCase();
      const first = full.split(/\s+/)[0];
      return full === lower || first === lower;
    });
    if (person) {
      if (seenIds.has(person.id)) continue;
      seenIds.add(person.id);
      person.last_touch_ts = meta.ts;
      person.touches = person.touches || [];
      person.touches.push({
        id: uid(),
        ts: meta.ts,
        note: '',
        source: meta.source || 'mention',
        source_id: meta.source_id || null,
        type: 'reflection_mention',
      });
      matched.push(person);
    } else {
      if (!unmatched.includes(raw)) unmatched.push(raw);
    }
  }

  if (unmatched.length) {
    // Store pending mentions — user can resolve them later from a small toast or People tab banner.
    state._pendingMentions = state._pendingMentions || [];
    for (const name of unmatched) {
      state._pendingMentions.push({
        id: uid(),
        name,
        source: meta.source || 'mention',
        source_id: meta.source_id || null,
        ts: meta.ts,
      });
    }
    // Surface to user after save commits. A little delay so toast doesn't collide with examen close.
    setTimeout(() => {
      const nm = unmatched[0];
      const more = unmatched.length > 1 ? ` +${unmatched.length - 1} more` : '';
      toast(`@${nm}${more} — tap People to add`);
    }, 1200);
  }

  return matched;
}

function dunbarSVG() {
  const cx = 170, cy = 170;
  const rings = TIERS.map(t => `
    <circle class="dunbar-ring ${t.id}" cx="${cx}" cy="${cy}" r="${t.radius}"/>
  `).join('');
  // Arrange dots around each ring — spread evenly by position in tier
  const dotEls = [];
  TIERS.forEach(t => {
    const people = peopleInTier(t.id);
    if (!people.length) return;
    const count = people.length;
    // place along the ring — start angle rotates per tier so dots don't all line up
    const startAngle = { inner: -90, close: -90 + 20, tribe: -90 + 10, community: -90 - 15 }[t.id];
    people.forEach((p, i) => {
      const step = count === 1 ? 0 : (360 / count);
      const angle = (startAngle + i * step) * Math.PI / 180;
      const dotR = t.id === 'inner' ? 13 : t.id === 'close' ? 11 : t.id === 'tribe' ? 9 : 7;
      const px = cx + t.radius * Math.cos(angle);
      const py = cy + t.radius * Math.sin(angle);
      const isDue = personIsDue(p);
      const initial = (p.name || '?')[0].toUpperCase();
      dotEls.push(`
        <g class="dunbar-dot ${t.id} ${isDue ? 'due' : ''}" onclick="openPersonDetail('${p.id}')">
          <circle cx="${px}" cy="${py}" r="${dotR}"/>
          <text class="dunbar-dot-init" x="${px}" y="${py}">${escapeHtml(initial)}</text>
        </g>
      `);
    });
  });
  // tier labels
  const labels = TIERS.map(t => `
    <text class="dunbar-label" x="${cx}" y="${cy - t.radius + 14}" text-anchor="middle">${t.label}</text>
  `).join('');
  return `
    <svg class="dunbar-svg" viewBox="0 0 340 340">
      ${rings}
      ${labels}
      <text class="dunbar-center" x="${cx}" y="${cy - 6}">you</text>
      <text class="dunbar-center" x="${cx}" y="${cy + 10}" style="font-size:9px;letter-spacing:0.14em;text-transform:uppercase;font-style:normal;fill:var(--ink-faint);">here</text>
      ${dotEls.join('')}
    </svg>
  `;
}

function renderPeople() {
  const allCount = state.people.length;
  const counts = {
    inner: peopleInTier('inner').length,
    close: peopleInTier('close').length,
    tribe: peopleInTier('tribe').length,
    community: peopleInTier('community').length,
  };
  const dueCount = state.people.filter(personIsDue).length;

  let listPeople = peopleTierFilter === 'all'
    ? [...state.people]
    : peopleInTier(peopleTierFilter);
  // Sort: due first (by overdueness), then most-recent-touch first
  listPeople.sort((a, b) => {
    const aDue = personIsDue(a), bDue = personIsDue(b);
    if (aDue !== bDue) return aDue ? -1 : 1;
    if (aDue && bDue) return daysOverdue(b) - daysOverdue(a);
    const ta = a.last_touch_ts ? new Date(a.last_touch_ts).getTime() : 0;
    const tb = b.last_touch_ts ? new Date(b.last_touch_ts).getTime() : 0;
    return tb - ta;
  });

  const chevSVG = `<svg class="person-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 6l6 6-6 6"/></svg>`;

  const listHTML = listPeople.length ? listPeople.map((p, i) => {
    const due = personIsDue(p);
    const overdue = daysOverdue(p);
    const lastStr = p.last_touch_ts ? daysAgoShort(p.last_touch_ts) : 'never';
    let metaLine;
    if (due && overdue) {
      const weeks = Math.floor(overdue / 7);
      metaLine = `${p.tier} · ${p.cadence} · <span class="overdue">${weeks >= 1 ? weeks + 'w' : overdue + 'd'} overdue</span>`;
    } else {
      metaLine = `${p.tier} · ${p.cadence} · last ${lastStr}`;
    }
    const avatarClass = p.tier === 'inner' ? 'a1' : p.tier === 'close' ? 'a2' : 'a3';
    return `
      <button class="person-row ${due ? 'due' : ''}" onclick="openPersonDetail('${p.id}')">
        <div class="avatar ${avatarClass}">${escapeHtml((p.name || '?')[0].toUpperCase())}</div>
        <div class="person-body">
          <div class="person-name">${escapeHtml(p.name || '?')}</div>
          <div class="person-meta ${due ? 'overdue' : ''}">${metaLine}</div>
        </div>
        ${chevSVG}
      </button>
    `;
  }).join('') : `
    <div class="touch-empty">
      ${allCount === 0 ? 'No one yet. Tap the orb to log your first touch.' : 'No one in this tier yet.'}
    </div>
  `;

  const tierTabs = `
    <div class="tier-tabs">
      <button class="tier-tab ${peopleTierFilter === 'all' ? 'active' : ''}" onclick="setPeopleTier('all')">All<span class="count">${allCount}</span></button>
      <button class="tier-tab ${peopleTierFilter === 'inner' ? 'active' : ''}" onclick="setPeopleTier('inner')">Inner<span class="count">${counts.inner}</span></button>
      <button class="tier-tab ${peopleTierFilter === 'close' ? 'active' : ''}" onclick="setPeopleTier('close')">Close<span class="count">${counts.close}</span></button>
      <button class="tier-tab ${peopleTierFilter === 'tribe' ? 'active' : ''}" onclick="setPeopleTier('tribe')">Tribe<span class="count">${counts.tribe}</span></button>
      <button class="tier-tab ${peopleTierFilter === 'community' ? 'active' : ''}" onclick="setPeopleTier('community')">Comm.<span class="count">${counts.community}</span></button>
    </div>
  `;

  const ambient = dueCount
    ? `<span style="color:var(--clay);">${dueCount} ${dueCount === 1 ? 'person' : 'people'} overdue.</span>`
    : allCount
      ? 'Everyone\u2019s on time.'
      : '';

  // Pending @mentions banner — names written in examens that don't match anyone in circle yet.
  const pending = state._pendingMentions || [];
  const pendingBanner = pending.length ? `
    <div style="padding:12px 14px;background:var(--accent-faint);border:0.5px solid var(--accent-dim);border-radius:12px;margin-bottom:14px;">
      <div style="font-size:10px;letter-spacing:0.14em;color:var(--ink-muted);text-transform:uppercase;margin-bottom:6px;">Mentioned, not yet in circle</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${pending.slice(0, 8).map(m => `
          <button onclick="adoptPendingMention('${m.id}')" style="padding:6px 12px;background:var(--surface-2);border:0.5px solid var(--line);border-radius:100px;font-size:12px;color:var(--ink);font-family:inherit;cursor:pointer;">
            @${escapeHtml(m.name)} <span style="color:var(--accent-bright);">+</span>
          </button>
        `).join('')}
      </div>
    </div>
  ` : '';

  document.getElementById('screen-people').innerHTML = `
    <div class="today-header">
      <div class="today-header-l">
        <div class="today-date">People</div>
        <div class="today-title">Your circle</div>
      </div>
      <div class="today-header-r">
        <button class="icon-btn" onclick="openTouchModal()" aria-label="Log touch">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </div>
    ${allCount ? `<div class="dunbar-wrap">${dunbarSVG()}</div>` : ''}
    ${pendingBanner}
    ${ambient ? `<div class="ambient-line" style="margin-bottom:18px;padding-top:0;">${ambient}</div>` : ''}
    ${tierTabs}
    ${listHTML}
    ${allCount === 0 ? `
      <button class="btn-full" onclick="openTouchModal()" style="margin-top:16px;">Log your first touch</button>
    ` : ''}
  `;
}
function setPeopleTier(t) {
  peopleTierFilter = t;
  renderPeople();
}

// Adopt a pending @mention into the circle: creates the person with the original
// mention logged as their first touch (preserving the inside-out accretion history).
function adoptPendingMention(pendingId) {
  const pending = (state._pendingMentions || []).find(m => m.id === pendingId);
  if (!pending) return;
  // Check if another pending entry or a real person with this name already exists (race)
  const existing = state.people.find(p => p.name && p.name.toLowerCase() === pending.name.toLowerCase());
  let person;
  if (existing) {
    person = existing;
    person.last_touch_ts = pending.ts;
    person.touches = person.touches || [];
    person.touches.push({
      id: uid(), ts: pending.ts, note: '',
      source: pending.source, source_id: pending.source_id,
      type: 'reflection_mention',
    });
  } else {
    person = {
      id: uid(),
      name: pending.name,
      tier: 'tribe',
      cadence: 'monthly',
      last_touch_ts: pending.ts,
      touches: [{
        id: uid(), ts: pending.ts, note: '',
        source: pending.source, source_id: pending.source_id,
        type: 'reflection_mention',
      }],
    };
    state.people.push(person);
  }
  // Remove the pending entry
  state._pendingMentions = (state._pendingMentions || []).filter(m => m.id !== pendingId);
  saveState();
  render();
  toast(`${person.name} added to Tribe`);
}

function editPersonName(personId) {
  const p = state.people.find(x => x.id === personId);
  if (!p) return;
  const v = prompt('Name', p.name);
  if (v === null || !v.trim()) return;
  p.name = v.trim();
  saveState();
  openPersonDetail(personId);
}
function editRememberField(personId, field, label) {
  const p = state.people.find(x => x.id === personId);
  if (!p) return;
  p.remember = p.remember || {};
  const current = p.remember[field] || '';
  const v = prompt(label, current);
  if (v === null) return;
  const trimmed = v.trim();
  if (trimmed) {
    p.remember[field] = trimmed;
  } else {
    delete p.remember[field];
  }
  saveState();
  openPersonDetail(personId);
}
function cyclePersonTier(personId) {
  const p = state.people.find(x => x.id === personId);
  if (!p) return;
  const order = ['inner', 'close', 'tribe', 'community'];
  const i = order.indexOf(p.tier || 'tribe');
  p.tier = order[(i + 1) % order.length];
  saveState();
  openPersonDetail(personId);
}
function cyclePersonCadence(personId) {
  const p = state.people.find(x => x.id === personId);
  if (!p) return;
  const order = ['daily', 'weekly', 'biweekly', 'monthly'];
  const i = order.indexOf(p.cadence || 'monthly');
  p.cadence = order[(i + 1) % order.length];
  saveState();
  openPersonDetail(personId);
}
function deletePerson(personId) {
  const p = state.people.find(x => x.id === personId);
  if (!p) return;
  if (!confirm(`Remove ${p.name} from your circle? Touch history will be lost.`)) return;
  state.people = state.people.filter(x => x.id !== personId);
  saveState();
  closeOverlay();
  render();
  toast(`Removed ${p.name}`);
}

// PHASE 4 — REVIEW TAB
// Segments: Week · Month · Year · All
// Surfaces: presence strip, observation, stats, virtue bars, examen archive
// All segment is the Life view: chapters, on-this-day, lifetime grid
// ═══════════════════════════════════════════════════════════════════════
let reviewSegment = 'month';
let reviewVirtueFilter = null;  // when a virtue is tapped, archive filters
let lifeYearFilter = null;       // when a year is tapped on lifetime grid

function reviewRangeDays() {
  if (reviewSegment === 'week') return 7;
  if (reviewSegment === 'month') return 30;
  if (reviewSegment === 'year') return 365;
  return null; // all
}
function reviewRangeStart() {
  const days = reviewRangeDays();
  if (days == null) return new Date(state.startDate || '2020-01-01').getTime();
  const d = new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - days + 1);
  return d.getTime();
}

// Build a 30-day strip (always 30 even on Week segment — gives shape)
function presenceStripHTML() {
  const days = 30;
  const todayStr = todayISO();
  const cells = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const iso = d.toISOString().slice(0,10);
    const isToday = iso === todayStr;
    const dayWorkouts = state.workouts.some(w => isSameDay(w.ts || w.started_at, iso));
    const dayExamen = state.examens.some(e => e.date_iso === iso && !e.skipped_entirely);
    const dayTouch = state.people.some(p => (p.touches || []).some(t => isSameDay(t.ts, iso)));
    const corners = [];
    if (dayExamen)   corners.push('<div class="presence-corner tl"></div>');
    if (dayWorkouts) corners.push('<div class="presence-corner tr"></div>');
    if (dayTouch)    corners.push('<div class="presence-corner bl"></div>');
    cells.push(`<div class="presence-day ${isToday ? 'today' : ''}">${corners.join('')}</div>`);
  }
  return `
    <div class="presence-strip">${cells.join('')}</div>
    <div class="presence-legend">
      <span class="ll"><span class="swatch brass"></span>examen</span>
      <span class="ll"><span class="swatch accent"></span>workout</span>
      <span class="ll"><span class="swatch ink"></span>touch</span>
    </div>
  `;
}

function observationFor() {
  // Pick the most striking pattern in the current range
  const start = reviewRangeStart();
  const inRange = ts => {
    if (!ts) return false;
    return new Date(ts).getTime() >= start;
  };
  const workouts = state.workouts.filter(w => inRange(w.ts || w.started_at));
  const examens = state.examens.filter(e => {
    const t = new Date(e.date_iso).getTime();
    return t >= start;
  });
  const realExamens = examens.filter(e => !e.skipped_entirely);
  const skippedExamens = examens.filter(e => e.skipped_entirely);
  const sleeps = state.sleep.filter(s => new Date(s.date).getTime() >= start);
  const moods = state.moods.filter(m => inRange(m.ts));

  // Choose strongest signal
  const observations = [];

  // Pattern: many workouts, low examens
  if (workouts.length >= 8 && realExamens.length < workouts.length / 2) {
    observations.push({
      fact: `${workouts.length} workouts, ${realExamens.length} examens.`,
      q: 'You showed up for the body more than the day. Was that the right balance?',
    });
  }
  // Pattern: low sleep
  if (sleeps.length >= 5) {
    const avg = sleeps.reduce((a,s)=>a+s.duration_h,0) / sleeps.length;
    if (avg < 6.5) {
      observations.push({
        fact: `Sleep averaged ${avg.toFixed(1)}h.`,
        q: "What's keeping you up — and is it worth it?",
      });
    } else if (avg >= 7.5) {
      observations.push({
        fact: `Sleep averaged ${avg.toFixed(1)}h. Good.`,
        q: 'What changed to make this possible?',
      });
    }
  }
  // Pattern: skipped examens
  if (skippedExamens.length >= 3) {
    observations.push({
      fact: `You said "not tonight" ${skippedExamens.length} times.`,
      q: 'Was something heavy, or just full?',
    });
  }
  // Pattern: low mood spell
  const lowMoods = moods.filter(m => m.score <= 2).length;
  if (lowMoods >= 3) {
    observations.push({
      fact: `${lowMoods} difficult days logged.`,
      q: 'Anything you can name about the pattern?',
    });
  }
  // Pattern: high consistency
  const distinctTrainDays = new Set(workouts.map(w => (w.ts || new Date(w.started_at).toISOString()).slice(0,10))).size;
  const totalDays = Math.min(reviewRangeDays() || 30, 30);
  if (distinctTrainDays >= totalDays * 0.5) {
    observations.push({
      fact: `Trained ${distinctTrainDays} of the last ${totalDays} days.`,
      q: 'Consistency is the rarer skill. What made it stick?',
    });
  }
  // Default
  if (!observations.length) {
    if (workouts.length === 0 && realExamens.length === 0) {
      observations.push({
        fact: 'A quiet stretch.',
        q: 'Resting, drifting, or waiting for the right thing?',
      });
    } else {
      observations.push({
        fact: `${workouts.length} workouts. ${realExamens.length} examens. ${sleeps.length} sleep records.`,
        q: 'What does the shape of this stretch tell you?',
      });
    }
  }
  // Return the first (highest priority) match
  return observations[0];
}

function virtueTallies() {
  const start = reviewRangeStart();
  const tally = { wisdom: 0, courage: 0, justice: 0, temperance: 0 };
  state.examens.forEach(e => {
    if (new Date(e.date_iso).getTime() < start) return;
    (e.virtue_tags || []).forEach(v => { if (tally[v] != null) tally[v]++; });
  });
  return tally;
}

function virtueBarsHTML() {
  const tally = virtueTallies();
  const max = Math.max(1, ...Object.values(tally));
  return `
    <div class="virtue-bars">

        const count = tally[v.id] || 0;
        const pct = (count / max) * 100;

            <div class="virtue-bar"><div class="virtue-fill" style="width:${pct}%"></div></div>
            <div class="virtue-count">${count}</div>
          </button>

      }).join('')}
    </div>

}

// ─── Life view (All segment) ───
function onThisDayItems() {
  const today = new Date();
  const m = today.getMonth();
  const d = today.getDate();
  const y = today.getFullYear();
  const items = [];
  // ±3 day fuzzy match across past examens and workouts (different year)
  const dateMatch = (date) => {
    const dd = new Date(date);
    if (dd.getFullYear() === y) return false;
    if (dd.getMonth() !== m) return false;
    return Math.abs(dd.getDate() - d) <= 3;
  };
  state.examens.forEach(e => {
    if (e.skipped_entirely) return;
    if (!dateMatch(e.date_iso)) return;
    const yr = new Date(e.date_iso).getFullYear();
    const text = (e.went_well || e.remains || '').trim();
    if (text) items.push({
      year: yr,
      kind: 'examen',
      text: text,
    });
  });
  state.workouts.forEach(w => {
    const ts = w.ts || (w.started_at && new Date(w.started_at).toISOString());
    if (!ts) return;
    if (!dateMatch(ts)) return;
    const yr = new Date(ts).getFullYear();
    if (w.type === 'lift' && w.close_note) {
      items.push({ year: yr, kind: 'lift', text: w.close_note });
    } else if (w.type === 'run' && w.close_note) {
      items.push({ year: yr, kind: 'run', text: w.close_note });
    }
  });
  return items.sort((a, b) => b.year - a.year);
}
function onThisDayHTML() {
  const items = onThisDayItems();
  if (!items.length) return '';
  return `
    <div class="on-this-day">
      <div class="otd-kicker">On this day · earlier years</div>
      ${items.slice(0, 3).map(i => `
        <div class="otd-text" style="margin-top:6px;">
          <span style="color:var(--brass);font-style:normal;font-family:'Inter',sans-serif;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;margin-right:6px;">${i.year}</span>
          &ldquo;${escapeHtml((i.text || '').slice(0, 200))}&rdquo;
        </div>
      `).join('')}
    </div>
  `;
}
function chaptersHTML() {
  const todayStr = todayISO();
  const items = [...state.chapters].sort((a, b) => (b.start_date || '').localeCompare(a.start_date || ''));
  if (!items.length) {
    return `
      <div class="empty-line">
        No chapters yet.<br>Mark the eras of your life as you live them.

  return items.map(c => {

    const start = c.start_date ? new Date(c.start_date) : null;

    const dates = `${fmt(start)} — ${end ? fmt(end) : 'now'}`;
    return `
      <button class="chapter-card ${isCurrent ? 'current' : ''}" onclick="editChapter('${c.id}')" style="background:var(--surface-2);border:0.5px solid var(--line);border-left:3px solid ${isCurrent ? 'var(--accent)' : 'var(--brass)'};border-radius:0 12px 12px 0;text-align:left;width:100%;color:inherit;font-family:inherit;cursor:pointer;">
        <div class="chapter-dates">${dates}</div>
        <div class="chapter-title">${escapeHtml(c.title)}</div>
        ${c.note ? `<div class="chapter-note">${escapeHtml(c.note)}</div>` : ''}
      </button>
    `;
  }).join('');
}
function lifetimeGridHTML() {
  // 12-month grid for the selected year, shading by activity density
  const year = lifeYearFilter || new Date().getFullYear();
  const monthCounts = Array.from({ length: 12 }, () => 0);
  // Count any activity (workout, examen, touch) per month in that year
  state.workouts.forEach(w => {
    const ts = w.ts || (w.started_at && new Date(w.started_at).toISOString());
    if (!ts) return;
    const d = new Date(ts);
    if (d.getFullYear() === year) monthCounts[d.getMonth()]++;
  });
  state.examens.forEach(e => {
    if (e.skipped_entirely) return;
    const d = new Date(e.date_iso);
    if (d.getFullYear() === year) monthCounts[d.getMonth()]++;
  });
  state.people.forEach(p => {
    (p.touches || []).forEach(t => {
      const d = new Date(t.ts);
      if (d.getFullYear() === year) monthCounts[d.getMonth()]++;
    });
  });
  const max = Math.max(1, ...monthCounts);
  const today = new Date();
  const cells = monthCounts.map((n, i) => {
    const opacity = n === 0 ? 0 : 0.15 + (n / max) * 0.65;
    const isFuture = year === today.getFullYear() && i > today.getMonth();
    return `
      <div class="month-cell" style="${isFuture ? 'opacity:0.3;' : ''}">
        <div class="label">${['J','F','M','A','M','J','J','A','S','O','N','D'][i]}</div>
        <div class="density" style="opacity:${opacity}"></div>
      </div>
    `;
  }).join('');
  return `<div class="lifetime-grid">${cells}</div>`;
}
function yearPickerHTML() {
  // Pull years from data, plus current year
  const years = new Set([new Date().getFullYear()]);
  state.workouts.forEach(w => {
    const ts = w.ts || (w.started_at && new Date(w.started_at).toISOString());
    if (ts) years.add(new Date(ts).getFullYear());
  });
  state.examens.forEach(e => years.add(new Date(e.date_iso).getFullYear()));
  if (state.startDate) years.add(new Date(state.startDate).getFullYear());
  const sorted = [...years].sort((a, b) => b - a);
  const active = lifeYearFilter || new Date().getFullYear();
  return `
    <div class="year-picker">
      ${sorted.map(y => `
        <button class="year-pill ${y === active ? 'active' : ''}" onclick="setLifeYear(${y})">${y}</button>
      `).join('')}
    </div>
  `;
}
function setLifeYear(y) {
  lifeYearFilter = y;
  renderReview();
}

function editChapter(chapterId) {
  const c = chapterId ? state.chapters.find(x => x.id === chapterId) : null;
  const isNew = !c;
  const title = prompt('Chapter title (e.g., "After the move")', c ? c.title : '');
  if (title === null) return;
  if (!title.trim()) {
    if (!isNew && confirm('Delete this chapter?')) {
      state.chapters = state.chapters.filter(x => x.id !== chapterId);
      saveState(); render();
    }
    return;
  }
  const start = prompt('Start date (YYYY-MM-DD)', c ? c.start_date : todayISO());
  if (start === null) return;
  if (!/^\d{4}-\d{2}-\d{2}$/.test(start)) { toast('Use YYYY-MM-DD'); return; }
  const endRaw = prompt('End date (YYYY-MM-DD, or empty for ongoing)', c && c.end_date ? c.end_date : '');
  if (endRaw === null) return;
  const end = endRaw.trim();
  if (end && !/^\d{4}-\d{2}-\d{2}$/.test(end)) { toast('Use YYYY-MM-DD or empty'); return; }
  const note = prompt('Note (optional)', c ? c.note || '' : '');
  if (note === null) return;
  if (isNew) {
    state.chapters.push({
      id: uid(), title: title.trim(),
      start_date: start, end_date: end || null,
      note: note.trim() || '', color: null,
    });
  } else {
    c.title = title.trim();
    c.start_date = start;
    c.end_date = end || null;
    c.note = note.trim() || '';
  }
  saveState();
  render();
}

function renderReview() {

  if (reviewSegment !== 'all') lifeYearFilter = null;
  const seg = reviewSegment;
  const obs = (seg !== 'all') ? observationFor() : null;

  const segNav = `
    <div class="review-segs">
      ${['week','month','year','all'].map(s => `

      `).join('')}

  let body;

    // Life view
    const onThisDay = onThisDayHTML();
    body = `
      ${onThisDay}

      </div>

  } else {

      </div>

      <div class="section-h" style="display:flex;justify-content:space-between;align-items:baseline;">
        <span>Examen archive${reviewVirtueFilter ? ` · ${reviewVirtueFilter}` : ''}</span>
        ${reviewVirtueFilter ? `<button onclick="toggleVirtueFilter('${reviewVirtueFilter}')" style="background:none;border:none;color:var(--brass);font-family:inherit;font-size:11px;letter-spacing:0.04em;cursor:pointer;font-weight:500;">clear</button>` : ''}

    <div class="today-header">

        <div class="today-date">${seg === 'all' ? 'Your life' : seg === 'year' ? 'Last 365 days' : seg === 'month' ? 'Last 30 days' : 'Last 7 days'}</div>
        <div class="today-title">Review</div>
      </div>

  `;
}
function setReviewSegment(s) {

}

function editName() {
  const v = prompt('What should I call you?', state.profile.name || '');
  if (v === null) return;
  state.profile.name = v.trim() || 'there';
  saveState();
  render();
}
function editSunsetTime() {
  const v = prompt('When does your evening begin? (HH:MM, 24h)', state.config.sunset_time || '19:30');
  if (v === null) return;
  const t = v.trim();
  if (!/^\d{1,2}:\d{2}$/.test(t)) { toast('Use HH:MM'); return; }
  const [h, m] = t.split(':').map(Number);
  if (h > 23 || m > 59) { toast('Invalid time'); return; }
  state.config.sunset_time = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  saveState();
  render();
  toast('Saved');
}
function toggleExamenVoiceSetting() {
  state.config.examen_voice_enabled = !(state.config.examen_voice_enabled !== false);
  saveState();
  render();
}
function editDistanceUnit() {
  state.config.distance_unit = state.config.distance_unit === 'km' ? 'mi' : 'km';
  saveState();
  render();
}
function exportJSON() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `kuzuri-${todayISO()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function resetData() {
  if (!confirm('Erase ALL Kuzuri data from this device? This cannot be undone.')) return;
  if (!confirm('Really? Everything will be gone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  location.reload();
}

function addSession() {
  const name = prompt('Session name (e.g., "Upper I")');
  if (!name || !name.trim()) return;
  state.program = state.program || { sessions: {}, schedule: {} };
  const id = 'sess_' + uid();
  state.program.sessions[id] = {
    id, name: name.trim(), exercises: [],
  };
  saveState();
  editSession(id);
}
function editSession(sessionId) {
  const sess = state.program.sessions[sessionId];
  if (!sess) return;
  const exList = (sess.exercises || []).map((ex, i) => `
    <div class="picker-card" style="margin-bottom:6px;cursor:default;">
      <div class="picker-card-title">${escapeHtml(ex.name)}</div>
      <div class="picker-card-meta">${(ex.sets || []).length} sets · ${ex.sets && ex.sets[0] ? ex.sets[0].range : '—'}</div>
      <div style="display:flex;gap:6px;margin-top:8px;">
        <button class="btn-secondary" style="flex:1;padding:8px;font-size:10px;" onclick="removeExerciseFromSession('${sessionId}', ${i})">Remove</button>
      </div>
    </div>
  `).join('');
  openOverlay(`
    <div class="today-header">
      <div class="today-header-l">
        <div class="today-date">Session</div>
        <div class="today-title">${escapeHtml(sess.name)}</div>
      </div>
    </div>
    <div style="margin-bottom:16px;">${exList || '<div class="empty-line">No exercises yet.</div>'}</div>
    <button class="btn-full" onclick="addExerciseToSession('${sessionId}')">+ Add exercise</button>
    <button class="btn-secondary" style="width:100%;margin-top:8px;" onclick="deleteSession('${sessionId}')">Delete session</button>
    <button class="btn-secondary" style="width:100%;margin-top:8px;" onclick="openProgramEditor()">Back</button>
  `);
}
function addExerciseToSession(sessionId) {
  const name = prompt('Exercise name (e.g., "Bench press")');
  if (!name || !name.trim()) return;
  const sets = parseInt(prompt('How many sets?', '3') || '3');
  const range = prompt('Rep range (e.g., "6-8" or "8-10")', '6-8') || '6-8';
  const intensity = prompt('Intensity note (e.g., "RPE 8")', 'RPE 8') || 'RPE 8';
  const sess = state.program.sessions[sessionId];
  sess.exercises = sess.exercises || [];
  const code = String.fromCharCode(65 + sess.exercises.length); // A, B, C, ...
  sess.exercises.push({
    code, name: name.trim(),
    sets: Array.from({ length: sets }, () => ({ range, intensity })),
  });
  saveState();
  editSession(sessionId);
}
function removeExerciseFromSession(sessionId, exIdx) {
  const sess = state.program.sessions[sessionId];
  if (!sess || !sess.exercises) return;
  sess.exercises.splice(exIdx, 1);
  // Re-letter
  sess.exercises.forEach((ex, i) => { ex.code = String.fromCharCode(65 + i); });
  saveState();
  editSession(sessionId);
}
function deleteSession(sessionId) {
  if (!confirm('Delete this session?')) return;
  delete state.program.sessions[sessionId];
  saveState();
  openProgramEditor();
}
