// ═══════════════════════════════════════════════════════════════════════
// TRAINING — LIFT SESSION (live)
// ═══════════════════════════════════════════════════════════════════════
let expandedSetKey = null;  // 'exIdx-setIdx' or null
let restTimer = null;
let restEnd = null;

function startLiftSession(sessionId) {
  const sess = state.program && state.program.sessions[sessionId];
  if (!sess) { toast('Session not found'); return; }
  activeWorkout = {
    id: uid(),
    type: 'lift',
    session_id: sessionId,
    session_name: sess.name,
    started_at: Date.now(),
    ts: new Date().toISOString(),
    exercises: (sess.exercises || []).map(ex => ({
      code: ex.code,
      name: ex.name,
      sets: (ex.sets || []).map(s => ({ ...s })),
    })),
  };
  expandedSetKey = null;
  renderLiftSession();
}
function renderLiftSession() {
  if (!activeWorkout) return;
  const totalSets = activeWorkout.exercises.reduce((a, e) => a + e.sets.length, 0);
  const doneSets = activeWorkout.exercises.reduce((a, e) => a + e.sets.filter(s => s.rating).length, 0);
  const elapsedMin = Math.floor((Date.now() - activeWorkout.started_at) / 60000);
  const elapsed = `${Math.floor(elapsedMin / 60)}:${String(elapsedMin % 60).padStart(2,'0')}`;
  const currentIdx = activeWorkout.exercises.findIndex(e => e.sets.some(s => !s.rating));
  const restBadge = restEnd ? `<div class="rest-timer" id="rest-badge">Rest · ${Math.max(0, Math.ceil((restEnd - Date.now())/1000))}s</div>` : '';

  const exCards = activeWorkout.exercises.map((ex, exIdx) => {
    const isCurrent = exIdx === currentIdx;
    const allDone = ex.sets.every(s => s.rating);
    const anyLogged = ex.sets.some(s => s.rating);
    const cls = allDone ? 'done' : (isCurrent ? 'current' : '');
    const showHandle = !anyLogged;
    const handleHTML = showHandle ? `
      <button class="drag-handle"
              ontouchstart="dragStart(${exIdx}, event)"
              onmousedown="dragStart(${exIdx}, event)"
              onclick="event.stopPropagation()"
              aria-label="Reorder">
        <svg viewBox="0 0 12 16" fill="none"><circle cx="3.5" cy="3" r="1.2" fill="currentColor"/><circle cx="8.5" cy="3" r="1.2" fill="currentColor"/><circle cx="3.5" cy="8" r="1.2" fill="currentColor"/><circle cx="8.5" cy="8" r="1.2" fill="currentColor"/><circle cx="3.5" cy="13" r="1.2" fill="currentColor"/><circle cx="8.5" cy="13" r="1.2" fill="currentColor"/></svg>
      </button>` : '';
    return `
      <div class="ex-card ${cls}" id="excard-${exIdx}">
        <div class="ex-header">
          ${handleHTML}
          <div class="ex-letter">${ex.code}</div>
          <div class="ex-name">${escapeHtml(ex.name)}</div>
        </div>
        <div class="ex-prescription">${ex.sets.length} sets · ${ex.sets[0]?.intensity || ''}</div>
        ${ex.sets.map((s, si) => renderSetRow(ex, exIdx, s, si)).join('')}
      </div>
    `;
  }).join('');

  const overlayEl = document.getElementById('overlay');
  overlayEl.innerHTML = `
    <button class="overlay-close" onclick="confirmCancelLift()">×</button>
    <div class="overlay-inner" style="padding-bottom:100px">
      <div class="workout-header">
        <div>
          <div class="workout-meta-l">In session</div>
          <div class="workout-meta-t">${escapeHtml(activeWorkout.session_name)}</div>
          <div class="workout-progress">${elapsed} · ${doneSets} of ${totalSets} sets</div>
        </div>
        ${restBadge}
      </div>
      ${exCards}
    </div>
    <div class="workout-cta">
      <button class="btn-primary" onclick="finishLiftSession()">Finish workout</button>
      <button class="btn-secondary" onclick="confirmCancelLift()">Save · close</button>
    </div>
  `;
  overlayEl.classList.add('active');
}
function renderSetRow(ex, exIdx, set, setIdx) {
  const isExpanded = expandedSetKey === `${exIdx}-${setIdx}`;
  const isLogged = !!set.rating;
  if (isExpanded) {
    const chips = prepWeightsFor(ex.name, setIdx);
    const chipRow = chips.length ? `
      <div class="prep-chips">
        ${chips.map((w, i) => `<button class="prep-chip ${i === 0 ? 'suggest' : ''}" onclick="applyPrepWeight(${exIdx},${setIdx},'${escapeJs(w)}')">${escapeHtml(w)}</button>`).join('')}
      </div>` : '';
    return `
      <div class="set-row expanded" id="setrow-${exIdx}-${setIdx}">
        <div class="set-expand-meta">
          <div class="set-num">${setIdx + 1}</div>
          <div class="set-range">${set.range || ''}</div>
          <div class="set-expand-label">Set ${setIdx + 1} of ${ex.sets.length}</div>
        </div>
        ${chipRow}
        <div class="set-input-row">
          <input type="text" id="w-${exIdx}-${setIdx}" class="set-input"
                 placeholder="kg or BW" value="${escapeHtml(set.weight || '')}" inputmode="text" autocomplete="off">
          <span class="set-input-x">×</span>
          <input type="number" id="r-${exIdx}-${setIdx}" class="set-input reps"
                 placeholder="reps" value="${escapeHtml(set.reps || '')}" inputmode="numeric" autocomplete="off">
          <button class="set-save-btn" onclick="saveSetEntry(${exIdx},${setIdx})" aria-label="Save">
            <svg viewBox="0 0 12 12" fill="none"><path d="M2 6 L5 9 L10 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          ${isLogged ? `<button class="set-del-btn" onclick="clearSetEntry(${exIdx},${setIdx})" aria-label="Clear">×</button>` : ''}
        </div>
      </div>`;
  }
  if (isLogged) {
    return `
      <div class="set-row logged" onclick="expandSet(${exIdx},${setIdx})">
        <div class="set-num">${setIdx + 1}</div>
        <div class="set-range">${set.range || ''}</div>
        <div class="set-logged-vals">
          <span>${escapeHtml(set.weight || '—')}${set.weight && /^\d/.test(set.weight) ? ' kg' : ''}</span>
          <span class="set-logged-sep">×</span>
          <span>${escapeHtml(set.reps || '—')}</span>
        </div>
        <svg class="set-chev check" viewBox="0 0 10 10"><path d="M2 5 L4.5 7.5 L8.5 2.5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>`;
  }
  return `
    <div class="set-row" onclick="expandSet(${exIdx},${setIdx})">
      <div class="set-num">${setIdx + 1}</div>
      <div class="set-range">${set.range || ''}</div>
      <div class="set-hint">Tap to log</div>
      <svg class="set-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 6l6 6-6 6"/></svg>
    </div>`;
}
function escapeJs(s) {
  return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}
function expandSet(exIdx, setIdx) {
  expandedSetKey = `${exIdx}-${setIdx}`;
  renderLiftSession();
  setTimeout(() => {
    const w = document.getElementById(`w-${exIdx}-${setIdx}`);
    if (w) w.focus();
  }, 80);
}
function saveSetEntry(exIdx, setIdx) {
  const w = document.getElementById(`w-${exIdx}-${setIdx}`).value.trim();
  const r = document.getElementById(`r-${exIdx}-${setIdx}`).value.trim();
  if (!w && !r) { expandedSetKey = null; renderLiftSession(); return; }
  const set = activeWorkout.exercises[exIdx].sets[setIdx];
  const wasLogged = !!set.rating;
  set.weight = w;
  set.reps = r;
  set.rating = set.rating || 'prescribed';
  set.logged_at = set.logged_at || new Date().toISOString();
  expandedSetKey = null;
  if (!wasLogged) {
    startRestTimer(90);
    // Auto-advance
    const nextIdx = activeWorkout.exercises[exIdx].sets.findIndex((s, i) => i > setIdx && !s.rating);
    if (nextIdx >= 0) {
      setTimeout(() => { expandedSetKey = `${exIdx}-${nextIdx}`; renderLiftSession(); setTimeout(() => { const el = document.getElementById(`w-${exIdx}-${nextIdx}`); if (el) el.focus(); }, 80); }, 180);
      return;
    }
  }
  renderLiftSession();
}
function clearSetEntry(exIdx, setIdx) {
  const set = activeWorkout.exercises[exIdx].sets[setIdx];
  set.weight = ''; set.reps = ''; set.rating = null; set.logged_at = null;
  expandedSetKey = null;
  renderLiftSession();
}
function startRestTimer(seconds) {
  stopRestTimer();
  restEnd = Date.now() + seconds * 1000;
  restTimer = setInterval(() => {
    const badge = document.getElementById('rest-badge');
    const remaining = Math.max(0, Math.ceil((restEnd - Date.now()) / 1000));
    if (badge) badge.textContent = `Rest · ${remaining}s`;
    if (remaining <= 0) stopRestTimer();
  }, 500);
}
function stopRestTimer() {
  if (restTimer) clearInterval(restTimer);
  restTimer = null;
  restEnd = null;
  const badge = document.getElementById('rest-badge');
  if (badge) badge.remove();
}
function confirmCancelLift() {
  if (!activeWorkout) { closeOverlay(); return; }
  const doneSets = activeWorkout.exercises.reduce((a, e) => a + e.sets.filter(s => s.rating).length, 0);
  if (doneSets === 0) {
    activeWorkout = null;
    stopRestTimer();
    closeOverlay();
    return;
  }
  if (confirm('Save progress and close?')) {
    saveLiftAsIs();
  }
}
function saveLiftAsIs() {
  if (!activeWorkout) return;
  activeWorkout.duration_min = Math.round((Date.now() - activeWorkout.started_at) / 60000);
  state.workouts.push(activeWorkout);
  saveState();
  activeWorkout = null;
  stopRestTimer();
  closeOverlay();
  render();
  toast('Session saved');
}
function finishLiftSession() {
  if (!activeWorkout) return;
  activeWorkout.duration_min = Math.round((Date.now() - activeWorkout.started_at) / 60000);
  // Save FIRST, then show close screen
  state.workouts.push(activeWorkout);
  saveState();
  stopRestTimer();
  const w = activeWorkout;
  activeWorkout = null;
  openLiftClose(w);
}

// ── Weight parser (string weights: "BW", "BW+10", "80kg", etc.)
function parseWeight(str) {
  if (!str) return { numeric: null, raw: '', hasBodyweight: false };
  const s = String(str).trim();
  if (!s) return { numeric: null, raw: '', hasBodyweight: false };
  const upper = s.toUpperCase();
  if (upper === 'BW' || upper === 'BODYWEIGHT') return { numeric: 0, raw: s, hasBodyweight: true };
  const bw = upper.match(/^BW\s*([+-])\s*(\d+(?:\.\d+)?)/);
  if (bw) return { numeric: (bw[1] === '-' ? -1 : 1) * parseFloat(bw[2]), raw: s, hasBodyweight: true };
  const n = s.match(/^(-?\d+(?:\.\d+)?)/);
  if (n) return { numeric: parseFloat(n[1]), raw: s, hasBodyweight: false };
  return { numeric: null, raw: s, hasBodyweight: false };
}
function prepWeightsFor(exerciseName, setIdx) {
  const seen = new Set();
  const chips = [];
  const past = [...state.workouts].reverse();
  for (const wk of past) {
    if (wk.type !== 'lift') continue;
    if (wk.id === (activeWorkout && activeWorkout.id)) continue;
    const ex = (wk.exercises || []).find(e => e.name === exerciseName);
    if (!ex) continue;
    const ordered = [ex.sets[setIdx], ...ex.sets.filter((_, i) => i !== setIdx)].filter(Boolean);
    for (const s of ordered) {
      if (!s.weight) continue;
      const w = String(s.weight).trim();
      if (!w || seen.has(w)) continue;
      seen.add(w);
      chips.push(w);
      if (chips.length >= 4) return chips;
    }
  }
  return chips;
}
function applyPrepWeight(exIdx, setIdx, weight) {
  const w = document.getElementById(`w-${exIdx}-${setIdx}`);
  if (w) {
    w.value = weight;
    const r = document.getElementById(`r-${exIdx}-${setIdx}`);
    if (r && !r.value) r.focus();
  }
}

// ── Drag-reorder
let dragState = null;
function dragStart(exIdx, event) {
  if (!activeWorkout) return;
  const ex = activeWorkout.exercises[exIdx];
  if ((ex.sets || []).some(s => s.rating)) return;
  event.preventDefault();
  const touch = event.touches ? event.touches[0] : event;
  dragState = { exIdx, startY: touch.clientY, overIdx: exIdx };
  const card = document.getElementById(`excard-${exIdx}`);
  if (card) card.classList.add('p2-dragging');
  document.body.style.overflow = 'hidden';
}
function dragMove(event) {
  if (!dragState) return;
  event.preventDefault();
  const touch = event.touches ? event.touches[0] : event;
  const card = document.getElementById(`excard-${dragState.exIdx}`);
  if (card) {
    card.style.transform = `translateY(${touch.clientY - dragState.startY}px)`;
    card.style.zIndex = '50';
  }
  const underEl = document.elementFromPoint(touch.clientX, touch.clientY);
  if (underEl) {
    const nearCard = underEl.closest('.ex-card');
    if (nearCard && nearCard.id && nearCard.id.startsWith('excard-')) {
      const overIdx = parseInt(nearCard.id.replace('excard-', ''));
      if (overIdx !== dragState.overIdx) {
        const target = activeWorkout.exercises[overIdx];
        if (target && !(target.sets || []).some(s => s.rating)) {
          dragState.overIdx = overIdx;
          document.querySelectorAll('.ex-card').forEach(c => c.classList.remove('p2-drag-target'));
          nearCard.classList.add('p2-drag-target');
        }
      }
    }
  }
}
function dragEnd() {
  if (!dragState) return;
  const { exIdx, overIdx } = dragState;
  const card = document.getElementById(`excard-${exIdx}`);
  if (card) {
    card.classList.remove('p2-dragging');
    card.style.transform = '';
    card.style.zIndex = '';
  }
  document.querySelectorAll('.ex-card').forEach(c => c.classList.remove('p2-drag-target'));
  document.body.style.overflow = '';
  if (overIdx !== exIdx) {
    const moved = activeWorkout.exercises.splice(exIdx, 1)[0];
    activeWorkout.exercises.splice(overIdx, 0, moved);
    renderLiftSession();
    toast('Reordered');
  }
  dragState = null;
}
document.addEventListener('touchmove', dragMove, { passive: false });
document.addEventListener('touchend', dragEnd);
document.addEventListener('touchcancel', dragEnd);
document.addEventListener('mousemove', dragMove);
document.addEventListener('mouseup', dragEnd);

// ═══════════════════════════════════════════════════════════════════════
// TRAINING — STOIC CLOSE (lift)
// ═══════════════════════════════════════════════════════════════════════
function detectPR(workout) {
  if (!workout.exercises) return null;
  let bestNew = null;
  for (const exercise of workout.exercises) {
    for (const set of (exercise.sets || [])) {
      const p = parseWeight(set.weight);
      if (p.numeric == null) continue;
      const r = parseInt(set.reps);
      if (!r) continue;
      let histBest = null;
      state.workouts.forEach(wk => {
        if (wk.id === workout.id || wk.type !== 'lift') return;
        (wk.exercises || []).forEach(e => {
          if (e.name !== exercise.name) return;
          (e.sets || []).forEach(s => {
            const pp = parseWeight(s.weight);
            const pr = parseInt(s.reps);
            if (pp.numeric == null || !pr || pr < r) return;
            if (p.hasBodyweight !== pp.hasBodyweight) return;
            if (histBest === null || pp.numeric > histBest) histBest = pp.numeric;
          });
        });
      });
      if (histBest !== null && p.numeric >= histBest) {
        const score = p.numeric * r;
        if (!bestNew || score > bestNew.score) {
          bestNew = { exercise: exercise.name, weight: p.raw, reps: r, score, matched: p.numeric === histBest };
        }
      }
    }
  }
  return bestNew;
}
function marqueeLift(workout) {
  let best = null;
  for (const exercise of workout.exercises || []) {
    for (const set of (exercise.sets || [])) {
      const p = parseWeight(set.weight);
      if (p.numeric == null) continue;
      const r = parseInt(set.reps);
      if (!r) continue;
      const score = p.numeric * r;
      if (!best || score > best.score) best = { weight: p.raw, reps: r, score };
    }
  }
  return best;
}
function sessionShape(workout) {
  const sets = (workout.exercises || []).flatMap(e => e.sets || []);
  const rated = sets.filter(s => s.rating);
  if (rated.length === 0) return 'minimal';
  if (detectPR(workout)) return 'pr';
  if (rated.length < 6) return 'minimal';
  const scaled = rated.filter(s => s.rating === 'scaled' || s.rating === 'easier').length;
  const honest = rated.filter(s => s.rating === 'prescribed' || s.rating === 'pr').length;
  if (scaled > honest) return 'scaled';
  return 'solid';
}
function openLiftClose(workout) {
  const shape = sessionShape(workout);
  const pr = detectPR(workout);
  const m = marqueeLift(workout);
  const pool = LIFT_CLOSE_QUOTES[shape] || LIFT_CLOSE_QUOTES.solid;
  const q = pool[Math.floor(Math.random() * pool.length)];
  const totalSets = (workout.exercises || []).reduce((a, e) => a + (e.sets || []).filter(s => s.rating).length, 0);
  const honest = (workout.exercises || []).reduce((a, e) => a + (e.sets || []).filter(s => s.rating === 'prescribed' || s.rating === 'pr').length, 0);

  const prBadge = pr ? `
    <div style="text-align:center;">
      <span class="pr-badge">${pr.matched ? 'Matched' : 'New'} PR · ${escapeHtml(pr.weight)} × ${pr.reps} ${escapeHtml(pr.exercise)}</span>
    </div>` : '';
  const marqueeStr = m ? `${escapeHtml(m.weight)}×${m.reps}` : '—';
  const existingNote = workout.close_note || '';
  const craftActive = existingNote.length >= 20;

  openOverlay(`
    ${prBadge}
    <div class="close-headline">That was the work.</div>
    <div class="quote-card">
      <div class="quote-body">${escapeHtml(q.text)}</div>
      <div class="quote-attr">${escapeHtml(q.attr)}</div>
    </div>
    <div class="close-stats">
      <div class="close-stat"><div class="close-stat-n">${totalSets}</div><div class="close-stat-l">Sets</div></div>
      <div class="close-stat"><div class="close-stat-n">${honest}</div><div class="close-stat-l">Honest</div></div>
      <div class="close-stat"><div class="close-stat-n brass">${marqueeStr}</div><div class="close-stat-l">Marquee</div></div>
      <div class="close-stat"><div class="close-stat-n">${workout.duration_min || 0}m</div><div class="close-stat-l">Duration</div></div>
    </div>
    <div class="close-note-h">
      <span>A line, if you like</span>
      <span class="craft-tick ${craftActive ? '' : 'inactive'}" id="craft-ind">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Craft
      </span>
    </div>
    <textarea class="close-note ${craftActive ? 'has-craft' : ''}" id="close-note"
              placeholder="What was that work about?"
              oninput="updateCraftInd()">${escapeHtml(existingNote)}</textarea>
    <div class="close-hint" id="close-hint">
      ${existingNote.length > 0 ? `${existingNote.length} chars${craftActive ? ' · Craft ticks the Mind ring' : ' · 20+ for Craft'}` : '20+ characters ticks the Craft contribution'}
    </div>
    <button class="btn-full" onclick="saveLiftClose('${workout.id}')">Close session</button>
  `);
}
function updateCraftInd() {
  const ta = document.getElementById('close-note');
  const ind = document.getElementById('craft-ind');
  const hint = document.getElementById('close-hint');
  if (!ta) return;
  const len = ta.value.length;
  const active = len >= 20;
  if (ind) ind.classList.toggle('inactive', !active);
  ta.classList.toggle('has-craft', active);
  if (hint) hint.textContent = len > 0
    ? `${len} chars${active ? ' · Craft ticks the Mind ring' : ' · 20+ for Craft'}`
    : '20+ characters ticks the Craft contribution';
}
function saveLiftClose(workoutId) {
  const workout = state.workouts.find(w => w.id === workoutId);
  if (!workout) { closeOverlay(); return; }
  const note = (document.getElementById('close-note').value || '').trim();
  workout.close_note = note;
  workout.craft_ticked = note.length >= 20;
  const pr = detectPR(workout);
  if (pr) workout.pr = { exercise: pr.exercise, weight: pr.weight, reps: pr.reps, matched: pr.matched };
  saveState();
  closeOverlay();
  render();
  toast('That was the work.');
}

// ═══════════════════════════════════════════════════════════════════════
// TRAINING — RUN (preamble → close, no in-session timer)
// ═══════════════════════════════════════════════════════════════════════
function startRun() {
  activeRun = {
    id: uid(),
    type: 'run',
    run_type: 'easy',
    session_name: 'Easy',
    started_at: Date.now(),
    intent_distance: '',
    intent_pace: '',
  };
  renderRunPreamble();
}
function renderRunPreamble() {
  if (!activeRun) return;
  const unit = state.config.distance_unit || 'km';
  const paceLabel = unit === 'km' ? '/km' : '/mi';
  const lastEasy = [...state.workouts].reverse().find(w => w.type === 'run' && w.run_type === activeRun.run_type);
  const lastRef = lastEasy ? `
    <div class="last-ref">
      <div class="last-ref-label">Last ${activeRun.run_type} run</div>
      ${escapeHtml(runSummaryLine(lastEasy))}
    </div>` : '';
  const chips = ['easy','tempo','long','intervals','recovery'].map(t => `
    <button class="type-chip ${activeRun.run_type === t ? 'selected' : ''}" onclick="setRunType('${t}')">${t.charAt(0).toUpperCase() + t.slice(1)}</button>
  `).join('');
  const now = new Date();
  const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][now.getDay()];
  const monthName = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()];
  openOverlay(`
    <div class="today-header">
      <div class="today-header-l">
        <div class="today-date">${dayName} · ${now.getDate()} ${monthName}</div>
        <div class="today-title">Run</div>
      </div>
    </div>
    <div class="session-chip">Run · ${activeRun.run_type}</div>
    <div class="intent-card">
      <div class="intent-h">Today's intent</div>
      <div class="intent-grid">
        <div>
          <div class="intent-label">Distance</div>
          <div style="display:flex;align-items:baseline;">
            <input type="number" inputmode="decimal" step="0.1" class="intent-input" id="run-dist" placeholder="6" value="${activeRun.intent_distance}">
            <span class="intent-unit">${unit}</span>
          </div>
        </div>
        <div>
          <div class="intent-label">Pace</div>
          <div style="display:flex;align-items:baseline;">
            <input type="text" class="intent-input" id="run-pace" placeholder="5:20" value="${escapeHtml(activeRun.intent_pace)}" style="max-width:70px;">
            <span class="intent-unit">${paceLabel}</span>
          </div>
        </div>
      </div>
    </div>
    <div class="type-label">Session type</div>
    <div class="type-row">${chips}</div>
    ${lastRef}
    <div class="run-note-line">
      Log from memory or after a Strava run. Kuzuri holds the reflection, not the GPS.
    </div>
    <button class="btn-full" onclick="beginRun()">Begin</button>
  `);
}
function setRunType(t) {
  if (!activeRun) return;
  const d = document.getElementById('run-dist'); if (d) activeRun.intent_distance = d.value;
  const p = document.getElementById('run-pace'); if (p) activeRun.intent_pace = p.value;
  activeRun.run_type = t;
  activeRun.session_name = t.charAt(0).toUpperCase() + t.slice(1);
  renderRunPreamble();
}
function beginRun() {
  if (!activeRun) return;
  const d = document.getElementById('run-dist'); if (d) activeRun.intent_distance = d.value;
  const p = document.getElementById('run-pace'); if (p) activeRun.intent_pace = p.value;
  renderRunClose();
}
function renderRunClose() {
  if (!activeRun) return;
  const unit = state.config.distance_unit || 'km';
  const poolKey = activeRun.run_type === 'tempo' || activeRun.run_type === 'intervals' ? 'hard' : activeRun.run_type;
  const pool = RUN_CLOSE_QUOTES[poolKey] || RUN_CLOSE_QUOTES.easy;
  const q = pool[Math.floor(Math.random() * pool.length)];
  const efforts = ['Easy','Moderate','Hard','Max'].map(e => `
    <button class="effort-chip ${activeRun.effort === e ? 'selected' : ''}" onclick="setRunEffort('${e}')">${e}</button>
  `).join('');
  const existingNote = activeRun.close_note || '';
  const craftActive = existingNote.length >= 20;
  openOverlay(`
    <div class="close-headline">You moved.</div>
    <div class="quote-card">
      <div class="quote-body">${escapeHtml(q.text)}</div>
      <div class="quote-attr">${escapeHtml(q.attr)}</div>
    </div>
    <div class="intent-h" style="margin: 4px 0 8px;">Log from the run</div>
    <div class="close-stats three-col">
      <div class="close-stat">
        <input type="number" inputmode="decimal" step="0.1" id="rc-dist" placeholder="0.0" value="${activeRun.distance || ''}">
        <div class="close-stat-l">${unit}</div>
      </div>
      <div class="close-stat">
        <input type="text" id="rc-time" placeholder="0:00" value="${escapeHtml(activeRun.duration || '')}">
        <div class="close-stat-l">Time</div>
      </div>
      <div class="close-stat brass">
        <input type="text" id="rc-pace" placeholder="0:00" value="${escapeHtml(activeRun.pace || '')}" style="color:var(--brass);">
        <div class="close-stat-l">Pace /${unit}</div>
      </div>
    </div>
    <div class="close-note-h"><span>How was it?</span></div>
    <div class="effort-row">${efforts}</div>
    <div class="close-note-h">
      <span>A line, if you like</span>
      <span class="craft-tick ${craftActive ? '' : 'inactive'}" id="craft-ind">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Craft
      </span>
    </div>
    <textarea class="close-note ${craftActive ? 'has-craft' : ''}" id="close-note"
              placeholder="Where did your mind go?"
              oninput="updateCraftInd()">${escapeHtml(existingNote)}</textarea>
    <div class="close-hint" id="close-hint">
      ${existingNote.length > 0 ? `${existingNote.length} chars${craftActive ? ' · Craft ticked' : ' · 20+ for Craft'}` : '20+ characters ticks the Craft contribution'}
    </div>
    <button class="btn-full" onclick="saveRunClose()">Close session</button>
  `);
}
function setRunEffort(e) {
  if (!activeRun) return;
  // preserve field values
  const d = document.getElementById('rc-dist'); if (d) activeRun.distance = d.value;
  const t = document.getElementById('rc-time'); if (t) activeRun.duration = t.value;
  const p = document.getElementById('rc-pace'); if (p) activeRun.pace = p.value;
  const n = document.getElementById('close-note'); if (n) activeRun.close_note = n.value;
  activeRun.effort = e;
  renderRunClose();
}
function saveRunClose() {
  if (!activeRun) return;
  const d = document.getElementById('rc-dist');
  const t = document.getElementById('rc-time');
  const p = document.getElementById('rc-pace');
  const n = document.getElementById('close-note');
  const record = {
    id: activeRun.id,
    type: 'run',
    run_type: activeRun.run_type,
    session_name: activeRun.session_name,
    session_id: `run_${activeRun.run_type}`,
    ts: new Date().toISOString(),
    started_at: activeRun.started_at,
    intent_distance: activeRun.intent_distance,
    intent_pace: activeRun.intent_pace,
    distance: d ? parseFloat(d.value) || null : null,
    distance_unit: state.config.distance_unit || 'km',
    duration: t ? t.value.trim() : '',
    pace: p ? p.value.trim() : '',
    effort: activeRun.effort || null,
    close_note: n ? n.value.trim() : '',
    craft_ticked: n ? n.value.trim().length >= 20 : false,
  };
  state.workouts.push(record);
  saveState();
  closeOverlay();
  activeRun = null;
  render();
  toast('You moved.');
}
function runSummaryLine(run) {
  const parts = [];
  if (run.distance) parts.push(`${run.distance} ${run.distance_unit || 'km'}`);
  if (run.pace) parts.push(`@ ${run.pace}/${run.distance_unit || 'km'}`);
  if (run.duration) parts.push(run.duration);
  const ago = daysAgoShort(run.ts || new Date(run.started_at).toISOString());
  if (ago) parts.push(ago);
  return parts.join(' · ');
}

// ═══════════════════════════════════════════════════════════════════════
// RENDER DISPATCH
// ═══════════════════════════════════════════════════════════════════════
function render() {
  applyTheme();
  const active = state.nav.active || 'today';
  if (active === 'today') renderToday();
  else if (active === 'people') renderPeople();
  else if (active === 'review') renderReview();
  else if (active === 'me') renderMe();
  renderNav();
}

// ═══════════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════════
if (!state.startDate) {
  state.startDate = todayISO();
  saveState();
}
applyTheme();
// Ensure the active screen matches state.nav.active
document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
const bootActive = state.nav.active || 'today';
const bootScreen = document.getElementById('screen-' + bootActive);
if (bootScreen) bootScreen.classList.add('active');
render();

</script>
