<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#14110E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kuzuri">
<title>Kuzuri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────── design tokens ─────────────────────────── */
:root[data-theme="dark"], :root:not([data-theme]) {
  --bg:           #14110E;
  --surface:      #1C1916;
  --surface-2:    rgba(237,230,216,0.03);
  --ink:          #EDE6D8;
  --ink-muted:    #9A9385;
  --ink-faint:    #5C5649;
  --line:         rgba(237,230,216,0.08);
  --line-strong:  rgba(237,230,216,0.14);
  --accent:       #3E7A5E;
  --accent-bright:#4E8D6F;
  --accent-faint: rgba(62,122,94,0.10);
  --accent-dim:   rgba(62,122,94,0.30);
  --brass:        #C89B6A;
  --brass-faint:  rgba(200,155,106,0.08);
  --brass-dim:    rgba(200,155,106,0.30);
  --clay:         #C47A63;
  --clay-dim:     rgba(196,122,99,0.30);
}
:root[data-theme="light"] {
  --bg:           #F6F1E8;
  --surface:      #EEE7DB;
  --surface-2:    rgba(26,24,20,0.03);
  --ink:          #1A1814;
  --ink-muted:    #6B6458;
  --ink-faint:    #928A7A;
  --line:         rgba(26,24,20,0.08);
  --line-strong:  rgba(26,24,20,0.14);
  --accent:       #3E7A5E;
  --accent-bright:#2F6349;
  --accent-faint: rgba(62,122,94,0.10);
  --accent-dim:   rgba(62,122,94,0.30);
  --brass:        #A67940;
  --brass-faint:  rgba(166,121,64,0.08);
  --brass-dim:    rgba(166,121,64,0.30);
  --clay:         #B55F45;
  --clay-dim:     rgba(181,95,69,0.30);
}

/* ─────────────────────────── PHASE 4 — People (Dunbar) ─────────────────────────── */
.dunbar-wrap {
  padding: 10px 0 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.dunbar-svg {
  width: 100%;
  max-width: 340px;
  height: auto;
  display: block;
  margin: 0 auto;
}
.dunbar-ring {
  fill: none;
  stroke: var(--line);
  stroke-width: 0.8;
}
.dunbar-ring.inner  { stroke: rgba(62,122,94,0.55); stroke-width: 1.2; }
.dunbar-ring.close  { stroke: rgba(200,155,106,0.45); stroke-width: 1; }
.dunbar-ring.tribe  { stroke: rgba(237,230,216,0.18); stroke-width: 1; }
.dunbar-ring.community { stroke-dasharray: 2 3; stroke: rgba(237,230,216,0.14); }
.dunbar-label {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 10.5px;
  fill: var(--ink-faint);
  letter-spacing: 0.04em;
}
.dunbar-dot {
  cursor: pointer;
}
.dunbar-dot circle {
  stroke: var(--bg);
  stroke-width: 1.2;
}
.dunbar-dot.inner circle  { fill: var(--accent-bright); }
.dunbar-dot.close circle  { fill: var(--brass); }
.dunbar-dot.tribe circle  { fill: var(--ink-muted); }
.dunbar-dot.community circle { fill: var(--ink-faint); }
.dunbar-dot.due circle {
  stroke: var(--clay);
  stroke-width: 1.5;
}
.dunbar-dot-init {
  font-size: 9px;
  fill: var(--bg);
  font-weight: 600;
  text-anchor: middle;
  dominant-baseline: middle;
  font-family: 'Inter', sans-serif;
  pointer-events: none;
}
.dunbar-center {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 13px;
  fill: var(--ink-muted);
  text-anchor: middle;
  dominant-baseline: middle;
}

.tier-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  padding: 3px;
  border-radius: 10px;
  margin: 4px 0 14px;
}
.tier-tab {
  flex: 1;
  padding: 8px 6px;
  text-align: center;
  background: transparent;
  border: none;
  color: var(--ink-muted);
  font-size: 10.5px;
  letter-spacing: 0.04em;
  border-radius: 7px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
}
.tier-tab.active {
  background: var(--surface);
  color: var(--ink);
  box-shadow: 0 1px 2px rgba(0,0,0,0.15);
}
.tier-tab .count {
  display: inline-block;
  margin-left: 4px;
  color: var(--ink-faint);
  font-family: ui-monospace, monospace;
  font-size: 9.5px;
}
.tier-tab.active .count { color: var(--brass); }

.person-row {
  padding: 12px 14px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 11px;
  cursor: pointer;
  text-align: left;
  width: 100%;
  color: inherit;
  font-family: inherit;
  transition: transform 0.15s ease;
}
.person-row:active { transform: scale(0.996); }
.person-row.due { border-left: 2.5px solid var(--clay); }
.person-row .avatar { width: 34px; height: 34px; font-size: 12px; margin-left: 0; }
.person-body { flex: 1; min-width: 0; }
.person-name {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 15px;
  color: var(--ink);
  letter-spacing: -0.005em;
  font-weight: 400;
  line-height: 1.2;
}
.person-meta {
  font-size: 10.5px;
  color: var(--ink-muted);
  margin-top: 3px;
  letter-spacing: 0.01em;
}
.person-meta.overdue { color: var(--clay); }
.person-chev {
  width: 14px; height: 14px;
  color: var(--ink-faint);
  flex-shrink: 0;
}

/* person detail overlay */
.detail-hero {
  text-align: center;
  padding: 16px 0 20px;
}
.detail-hero .avatar {
  width: 64px; height: 64px;
  font-size: 22px;
  margin: 0 auto 12px;
}
.detail-hero .nm {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 26px;
  color: var(--ink);
  letter-spacing: -0.01em;
  font-weight: 400;
}
.detail-hero .sub {
  font-size: 10.5px;
  letter-spacing: 0.14em;
  color: var(--ink-muted);
  text-transform: uppercase;
  margin-top: 6px;
  font-weight: 500;
}

.detail-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.detail-row {
  padding: 14px 16px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 12px;
  margin-bottom: 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  cursor: pointer;
  color: inherit;
  font-family: inherit;
  width: 100%;
  text-align: left;
}
.detail-row:active { transform: scale(0.996); }
.detail-row .lab { color: var(--ink); font-size: 13.5px; }
.detail-row .val { color: var(--ink-muted); font-size: 12.5px; font-family: ui-monospace, monospace; }
.detail-row .val.brass { color: var(--brass); }

.touch-item {
  padding: 10px 14px;
  background: var(--surface-2);
  border-left: 1.5px solid var(--line);
  border-radius: 0 10px 10px 0;
  margin-bottom: 6px;
}
.touch-date {
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-bottom: 3px;
  font-weight: 500;
}
.touch-note {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink);
  font-weight: 300;
  line-height: 1.5;
}
.touch-empty {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink-faint);
  text-align: center;
  padding: 18px 0;
}

.danger-row .lab { color: var(--clay); }

/* small inline-empty helper used by program editor */
.empty-line {
  color: var(--ink-faint);
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 13px;
  padding: 20px 0;
  text-align: center;
}

/* ─────────────────────────── PHASE 4 — The Pause ─────────────────────────── */
.pause-banner {
  padding: 16px 18px;
  background: linear-gradient(120deg, var(--brass-faint), transparent 70%);
  border: 0.5px solid var(--brass-dim);
  border-radius: 16px;
  margin-bottom: 14px;
  cursor: pointer;
  display: block;
  width: 100%;
  text-align: left;
  color: inherit;
  font-family: inherit;
  position: relative;
}
.pause-banner:active { transform: scale(0.994); }
.pause-banner .kicker {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--brass);
  text-transform: uppercase;
  margin-bottom: 4px;
  font-weight: 500;
}
.pause-banner .title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 19px;
  color: var(--ink);
  letter-spacing: -0.01em;
  margin-top: 4px;
  font-weight: 400;
}
.pause-banner .sub {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 12.5px;
  color: var(--ink-muted);
  margin-top: 8px;
  line-height: 1.5;
}
.pause-banner .arrow {
  position: absolute;
  top: 16px; right: 18px;
  color: var(--brass);
  font-size: 18px;
}

.pause-step {
  margin-bottom: 24px;
}
.pause-kicker {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-bottom: 14px;
  font-weight: 500;
}
.pause-headline {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 26px;
  color: var(--ink);
  letter-spacing: -0.01em;
  line-height: 1.25;
  margin-bottom: 18px;
  font-weight: 300;
}
.week-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin: 6px 0 18px;
}
.week-cell {
  aspect-ratio: 1;
  border-radius: 10px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  position: relative;
  overflow: hidden;
}
.week-cell.today {
  border-color: var(--accent-dim);
  background: var(--accent-faint);
}
.week-cell.future { opacity: 0.35; }
.week-cell .day {
  position: absolute;
  top: 4px; left: 5px;
  font-size: 9px;
  color: var(--ink-faint);
  font-weight: 500;
  letter-spacing: 0.05em;
}
.week-cell .dots {
  position: absolute;
  bottom: 5px; left: 5px; right: 5px;
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
}
.dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot.train { background: var(--accent-bright); }
.dot.examen { background: var(--brass); }
.dot.touch { background: var(--ink); opacity: 0.55; }

.week-stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.week-stat {
  padding: 12px 6px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 10px;
  text-align: center;
}
.week-stat-n {
  font-family: ui-monospace, monospace;
  font-size: 17px;
  color: var(--ink);
  line-height: 1;
  letter-spacing: -0.01em;
}
.week-stat-n.brass { color: var(--brass); }
.week-stat-n.accent { color: var(--accent-bright); }
.week-stat-l {
  font-size: 8.5px;
  color: var(--ink-faint);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 5px;
  font-weight: 500;
}

.intent-list { margin: 8px 0 12px; }
.intent-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 10px;
  margin-bottom: 6px;
}
.intent-item .x {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: transparent;
  color: var(--ink-faint);
  border: none;
  font-size: 16px;
  cursor: pointer;
  flex-shrink: 0;
}
.intent-item-text {
  flex: 1;
  font-family: 'Fraunces', Georgia, serif;
  font-size: 14px;
  color: var(--ink);
  font-weight: 400;
  letter-spacing: -0.005em;
}
.intent-add-row {
  display: flex;
  gap: 8px;
  margin-top: 6px;
}
.intent-add-input {
  flex: 1;
  padding: 11px 14px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 10px;
  color: var(--ink);
  font-family: 'Fraunces', Georgia, serif;
  font-size: 14px;
  font-weight: 400;
}
.intent-add-input:focus { outline: none; border-color: var(--accent-dim); }
.intent-add-btn {
  padding: 0 18px;
  background: var(--accent);
  color: #fff;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 500;
  border: none;
  cursor: pointer;
}
.intent-cap-note {
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 8px;
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
}

/* ─────────────────────────── PHASE 4 — Review ─────────────────────────── */
.review-segs {
  display: flex;
  gap: 4px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  padding: 3px;
  border-radius: 10px;
  margin-bottom: 18px;
}
.review-seg {
  flex: 1;
  padding: 8px;
  text-align: center;
  background: transparent;
  border: none;
  color: var(--ink-muted);
  font-size: 11px;
  letter-spacing: 0.04em;
  border-radius: 7px;
  cursor: pointer;
  font-family: inherit;
  font-weight: 500;
}
.review-seg.active {
  background: var(--surface);
  color: var(--ink);
  box-shadow: 0 1px 2px rgba(0,0,0,0.15);
}

.presence-strip {
  display: flex;
  gap: 2.5px;
  margin: 8px 0 4px;
  overflow-x: auto;
  padding-bottom: 2px;
  -webkit-overflow-scrolling: touch;
}
.presence-strip::-webkit-scrollbar { display: none; }
.presence-day {
  width: 9px; height: 32px;
  border-radius: 2px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  position: relative;
  flex-shrink: 0;
}
.presence-day.today {
  border-color: var(--accent-dim);
}
.presence-corner {
  position: absolute;
  width: 3px; height: 3px;
  border-radius: 50%;
}
.presence-corner.tl { top: 1.5px; left: 1.5px; background: var(--brass); }
.presence-corner.tr { top: 1.5px; right: 1.5px; background: var(--accent-bright); }
.presence-corner.bl { bottom: 1.5px; left: 1.5px; background: var(--ink); opacity: 0.55; }
.presence-legend {
  display: flex;
  gap: 14px;
  font-size: 10px;
  color: var(--ink-faint);
  margin-bottom: 18px;
  letter-spacing: 0.02em;
}
.presence-legend .ll { display: inline-flex; align-items: center; gap: 5px; }
.presence-legend .swatch { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
.presence-legend .swatch.brass { background: var(--brass); }
.presence-legend .swatch.accent { background: var(--accent-bright); }
.presence-legend .swatch.ink { background: var(--ink); opacity: 0.55; }

.observation {
  padding: 16px 18px;
  background: var(--surface-2);
  border-left: 2px solid var(--brass);
  border-radius: 0 12px 12px 0;
  margin-bottom: 18px;
}
.observation-fact {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 15px;
  color: var(--ink);
  line-height: 1.5;
  font-weight: 400;
  letter-spacing: -0.005em;
}
.observation-q {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink-muted);
  margin-top: 8px;
  line-height: 1.5;
  font-weight: 300;
}

.virtue-bars { margin: 10px 0 18px; }
.virtue-bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 0;
  cursor: pointer;
  background: none;
  border: none;
  width: 100%;
  text-align: left;
  color: inherit;
  font-family: inherit;
}
.virtue-bar-row.active .virtue-name { color: var(--brass); }
.virtue-name {
  width: 92px;
  font-size: 11px;
  color: var(--ink-muted);
  letter-spacing: 0.06em;
  font-weight: 500;
  flex-shrink: 0;
}
.virtue-bar {
  flex: 1;
  height: 7px;
  background: var(--surface-2);
  border-radius: 4px;
  overflow: hidden;
}
.virtue-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--brass-dim), var(--brass));
  border-radius: 4px;
}
.virtue-count {
  width: 24px;
  text-align: right;
  font-size: 11px;
  color: var(--ink-muted);
  font-family: ui-monospace, monospace;
}

.archive-item {
  padding: 14px 16px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 12px;
  margin-bottom: 8px;
  cursor: pointer;
  text-align: left;
  width: 100%;
  color: inherit;
  font-family: inherit;
}
.archive-item:active { transform: scale(0.996); }
.archive-date {
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-bottom: 6px;
  font-weight: 500;
}
.archive-quote {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 14px;
  color: var(--ink);
  line-height: 1.55;
  font-weight: 300;
}
.archive-virtues {
  font-size: 9.5px;
  letter-spacing: 0.14em;
  color: var(--brass);
  margin-top: 8px;
  text-transform: uppercase;
}
.archive-skipped {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink-faint);
}

.section-h {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin: 22px 0 10px;
  font-weight: 500;
}

/* ─────────────────────────── PHASE 4 — Life ─────────────────────────── */
.year-picker {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 4px;
}
.year-picker::-webkit-scrollbar { display: none; }
.year-pill {
  flex-shrink: 0;
  padding: 6px 14px;
  border-radius: 100px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  color: var(--ink-muted);
  font-size: 11px;
  letter-spacing: 0.04em;
  font-weight: 500;
  cursor: pointer;
  font-family: inherit;
}
.year-pill.active {
  background: var(--accent-faint);
  border-color: var(--accent-dim);
  color: var(--accent-bright);
}

.lifetime-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 4px;
  padding: 4px 0 14px;
}
.month-cell {
  aspect-ratio: 1;
  border-radius: 5px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  position: relative;
}
.month-cell .label {
  position: absolute;
  top: 2px; left: 3px;
  font-size: 7.5px;
  color: var(--ink-faint);
  letter-spacing: 0.04em;
  font-weight: 500;
}
.month-cell .density {
  position: absolute;
  inset: 0;
  background: var(--accent);
  border-radius: 4px;
  opacity: 0;
}

.chapter-card {
  padding: 14px 16px;
  background: var(--surface-2);
  border-left: 3px solid var(--brass);
  border-radius: 0 12px 12px 0;
  margin-bottom: 10px;
}
.chapter-card.current { border-left-color: var(--accent); }
.chapter-dates {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-bottom: 4px;
  font-weight: 500;
}
.chapter-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 16px;
  color: var(--ink);
  letter-spacing: -0.005em;
  font-weight: 400;
}
.chapter-note {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 12.5px;
  color: var(--ink-muted);
  margin-top: 6px;
  line-height: 1.5;
}

.on-this-day {
  padding: 14px 16px;
  background: var(--brass-faint);
  border: 0.5px solid var(--brass-dim);
  border-radius: 12px;
  margin-bottom: 14px;
}
.otd-kicker {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--brass);
  text-transform: uppercase;
  margin-bottom: 6px;
  font-weight: 500;
}
.otd-text {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 14px;
  color: var(--ink);
  line-height: 1.55;
  font-weight: 300;
}

/* ─────────────────────────── reset ─────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overscroll-behavior-y: none; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.3s ease;
}
button, input, textarea { font-family: inherit; color: inherit; background: none; border: none; outline: none; }
button { cursor: pointer; }
input, textarea { -webkit-appearance: none; appearance: none; }
::placeholder { color: var(--ink-faint); }

/* ─────────────────────────── app shell ─────────────────────────── */
#app {
  min-height: 100vh;
  max-width: 440px;
  margin: 0 auto;
  position: relative;
  padding-bottom: calc(82px + env(safe-area-inset-bottom));
}
.screen { display: none; padding: 0 22px; }
.screen.active { display: block; }

/* ─────────────────────────── nav (5 tab + orb) ─────────────────────────── */
.nav {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 440px;
  background: var(--bg);
  border-top: 0.5px solid var(--line);
  padding: 10px 20px calc(14px + env(safe-area-inset-bottom)) 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  z-index: 100;
}
.tab {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 4px 2px;
  flex: 1;
  max-width: 58px;
  background: transparent;
  border: none;
  cursor: pointer;
}
.tab:active { transform: scale(0.94); }
.tab-ic {
  width: 20px; height: 20px;
  color: var(--ink-faint);
  display: flex; align-items: center; justify-content: center;
  transition: color 0.2s ease;
}
.tab-ic svg { width: 18px; height: 18px; }
.tab.active .tab-ic { color: var(--ink); }
.tab-l {
  font-size: 9px;
  letter-spacing: 0.14em;
  color: var(--ink-faint);
  text-transform: uppercase;
  font-weight: 500;
  transition: color 0.2s ease;
}
.tab.active .tab-l { color: var(--ink); }

.orb {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, rgba(62,122,94,0.42), rgba(62,122,94,0.16));
  border: 0.5px solid rgba(62,122,94,0.55);
  display: flex; align-items: center; justify-content: center;
  margin: -16px 8px 0;
  position: relative;
  z-index: 2;
  box-shadow: 0 0 24px rgba(62,122,94,0.25);
  cursor: pointer;
  transition: transform 0.15s ease;
}
.orb:active { transform: scale(0.94); }
.orb-plus {
  width: 16px; height: 16px;
  position: relative;
}
.orb-plus::before, .orb-plus::after {
  content: '';
  position: absolute;
  background: var(--accent-bright);
  border-radius: 1.5px;
}
.orb-plus::before { width: 16px; height: 2px; top: 7px; left: 0; }
.orb-plus::after  { width: 2px; height: 16px; top: 0; left: 7px; }

/* ─────────────────────────── today screen ─────────────────────────── */
.today-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 22px 0 18px;
}
.today-header-l { min-width: 0; flex: 1; }
.today-date {
  font-size: 10.5px;
  letter-spacing: 0.18em;
  color: var(--ink-muted);
  text-transform: uppercase;
  margin-bottom: 4px;
  font-weight: 500;
}
.today-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 28px;
  color: var(--ink);
  letter-spacing: -0.02em;
  line-height: 1.05;
  font-weight: 300;
}
.today-title .adj {
  font-style: italic;
  color: var(--ink-muted);
  font-weight: 300;
}
.today-header-r { display: flex; gap: 8px; flex-shrink: 0; }
.icon-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-muted);
  cursor: pointer;
}
.icon-btn svg { width: 13px; height: 13px; }
.icon-btn:active { transform: scale(0.94); }

.rings-wrap { padding: 4px 0 20px; }
.rings-label {
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--ink-faint);
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 18px;
  font-weight: 500;
}
.rings-row {
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 0 4px;
}
.ring-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  background: none;
  border: none;
  cursor: pointer;
}
.ring-col:active { transform: scale(0.96); }
.ring-label {
  font-size: 10.5px;
  letter-spacing: 0.14em;
  color: var(--ink-muted);
  text-transform: uppercase;
  font-weight: 500;
}
.ambient-line {
  padding: 16px 4px 4px;
  font-size: 12px;
  color: var(--ink-muted);
  text-align: center;
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  line-height: 1.55;
}
.ambient-line .sep { color: var(--ink-faint); margin: 0 8px; }
.ambient-line .empty {
  opacity: 0.6;
}

.quote-card {
  padding: 18px 16px 18px 20px;
  border-left: 2px solid var(--brass);
  margin: 4px 0 16px;
}
.quote-body {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 15px;
  color: var(--ink);
  line-height: 1.5;
  font-weight: 300;
}
.quote-attr {
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-top: 10px;
}

.card {
  padding: 18px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 18px;
  margin-bottom: 12px;
  cursor: pointer;
  transition: transform 0.15s ease;
  display: block;
  width: 100%;
  text-align: left;
  color: inherit;
  font-family: inherit;
}
.card:active { transform: scale(0.994); }
.card-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 4px;
}
.card-kicker {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--ink-muted);
  text-transform: uppercase;
  font-weight: 500;
}
.card-kicker-r {
  font-size: 10px;
  color: var(--ink-muted);
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  letter-spacing: 0.02em;
  text-transform: none;
}
.card-kicker-r.due { color: var(--brass); }
.card-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 19px;
  color: var(--ink);
  letter-spacing: -0.01em;
  margin-top: 6px;
  line-height: 1.25;
  font-weight: 400;
}
.card-sub {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink-muted);
  line-height: 1.55;
  margin-top: 10px;
}
.card-row { display: flex; gap: 8px; margin-top: 14px; }
.btn-primary {
  flex: 1;
  padding: 13px;
  text-align: center;
  background: var(--accent);
  color: #fff;
  border-radius: 12px;
  font-size: 11.5px;
  letter-spacing: 0.04em;
  font-weight: 500;
  border: none;
  cursor: pointer;
}
.btn-primary:active { transform: scale(0.98); }
.btn-secondary {
  padding: 13px 20px;
  background: transparent;
  border: 0.5px solid var(--line-strong);
  color: var(--ink-muted);
  border-radius: 12px;
  font-size: 11.5px;
  letter-spacing: 0.04em;
  cursor: pointer;
}
.btn-secondary:active { transform: scale(0.98); }
.btn-full {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border-radius: 12px;
  font-size: 12px;
  letter-spacing: 0.04em;
  font-weight: 500;
  border: none;
  cursor: pointer;
  margin-top: 12px;
}
.btn-full:active { transform: scale(0.994); }

.ledger-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 20px;
  color: var(--ink);
  letter-spacing: -0.01em;
  line-height: 1.3;
  font-weight: 400;
  margin-top: 6px;
}
.ledger-title .n {
  color: var(--accent-bright);
  font-weight: 500;
}

.people-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-top: 12px;
}
.avatars { display: flex; align-items: center; }
.avatar {
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 500;
  border: 2px solid var(--bg);
  margin-left: -8px;
}
.avatar:first-child { margin-left: 0; }
.avatar.a1 { background: rgba(62,122,94,0.28); color: var(--accent-bright); }
.avatar.a2 { background: rgba(200,155,106,0.28); color: var(--brass); }
.avatar.a3 { background: rgba(196,122,99,0.28); color: var(--clay); }
.people-body {
  flex: 1; min-width: 0;
  font-family: 'Fraunces', Georgia, serif;
  font-size: 13.5px;
  color: var(--ink);
  line-height: 1.45;
}
.people-body .weeks {
  color: var(--brass);
  font-family: 'Inter', sans-serif;
  font-style: normal;
  font-weight: 500;
  font-size: 12.5px;
}
.people-empty {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink-faint);
  line-height: 1.55;
  margin-top: 8px;
}

.progress-card {
  padding: 16px 18px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 18px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  text-align: left;
  width: 100%;
  color: inherit;
  font-family: inherit;
  transition: transform 0.15s ease;
}
.progress-card:active { transform: scale(0.994); }
.progress-left { min-width: 0; flex: 1; }
.progress-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 17px;
  color: var(--ink);
  letter-spacing: -0.01em;
  margin-top: 4px;
  font-weight: 400;
}
.progress-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.progress-arrow {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-muted);
  font-size: 14px;
}
.progress-ago {
  font-size: 10px;
  color: var(--ink-muted);
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
}

/* ─────────────────────────── orb capture sheet ─────────────────────────── */
.sheet {
  position: fixed;
  inset: 0;
  background: rgba(14,15,13,0.82);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 400;
  display: none;
  flex-direction: column;
  justify-content: flex-end;
}
.sheet.active { display: flex; }
.sheet-panel {
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 18px 20px calc(28px + env(safe-area-inset-bottom));
  max-width: 440px;
  margin: 0 auto;
  width: 100%;
  box-shadow: 0 -8px 32px rgba(0,0,0,0.4);
  max-height: 92vh;
  overflow-y: auto;
  animation: sheetSlide 0.28s cubic-bezier(0.32,0.72,0.12,1);
}
@keyframes sheetSlide {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.sheet-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 4px;
}
.sheet-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 22px;
  color: var(--ink);
  letter-spacing: -0.01em;
  font-weight: 400;
}
.sheet-close {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-muted);
  font-size: 16px;
  cursor: pointer;
}
.sheet-kicker {
  font-size: 11px;
  color: var(--ink-muted);
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  margin-bottom: 14px;
}

.planned-banner {
  padding: 14px 16px;
  background: var(--accent-faint);
  border: 0.5px solid var(--accent-dim);
  border-radius: 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  cursor: pointer;
}
.planned-banner:active { transform: scale(0.99); }
.planned-left { min-width: 0; }
.planned-kicker {
  font-size: 9.5px;
  letter-spacing: 0.14em;
  color: var(--accent-bright);
  text-transform: uppercase;
  margin-bottom: 3px;
  font-weight: 500;
}
.planned-name {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 15px;
  color: var(--ink);
  letter-spacing: -0.005em;
  font-weight: 400;
}
.planned-meta {
  font-size: 10px;
  color: var(--ink-muted);
  margin-top: 2px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}
.planned-go {
  padding: 9px 16px;
  background: var(--accent);
  color: #fff;
  border-radius: 10px;
  font-size: 11px;
  letter-spacing: 0.04em;
  font-weight: 500;
  white-space: nowrap;
  border: none;
  cursor: pointer;
}

.sheet-section-label {
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 500;
}
.primary-tiles {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
.tile-primary {
  padding: 18px 16px;
  background: var(--accent-faint);
  border: 0.5px solid var(--accent-dim);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  cursor: pointer;
  text-align: left;
  color: inherit;
  font-family: inherit;
}
.tile-primary:active { transform: scale(0.98); }
.tile-primary .ic {
  width: 20px; height: 20px;
  color: var(--accent-bright);
}
.tile-name {
  font-size: 13.5px;
  color: var(--ink);
  letter-spacing: -0.005em;
  font-weight: 500;
}
.tile-sub {
  font-size: 10.5px;
  color: var(--ink-muted);
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  line-height: 1.35;
}

.secondary-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 4px;
}
.tile-secondary {
  padding: 14px 8px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 11px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  text-align: center;
  cursor: pointer;
  color: inherit;
  font-family: inherit;
}
.tile-secondary:active { transform: scale(0.97); }
.tile-secondary .ic {
  width: 16px; height: 16px;
  color: var(--ink-muted);
}
.tile-secondary-name {
  font-size: 11px;
  color: var(--ink);
  letter-spacing: 0.02em;
}

/* ─────────────────────────── full-bleed overlay ─────────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 300;
  display: none;
  overflow-y: auto;
  animation: overlayFade 0.24s ease-out;
}
.overlay.active { display: block; }
@keyframes overlayFade {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.overlay-inner {
  max-width: 440px;
  margin: 0 auto;
  padding: 40px 22px calc(100px + env(safe-area-inset-bottom));
}
.overlay-close {
  position: fixed;
  top: calc(16px + env(safe-area-inset-top));
  right: 16px;
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-muted);
  font-size: 20px;
  cursor: pointer;
  z-index: 10;
}

/* ─────────────────────────── examen ─────────────────────────── */
.ex-progress {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 30px;
}
.ex-progress span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--line-strong);
}
.ex-progress span.active { background: var(--brass); }
.ex-progress span.done { background: var(--brass-dim); }

.ex-kicker {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-bottom: 14px;
  font-weight: 500;
}
.ex-prompt {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-weight: 300;
  font-size: 26px;
  line-height: 1.25;
  color: var(--ink);
  letter-spacing: -0.01em;
  margin-bottom: 20px;
}
.ex-prompt.dim { opacity: 0.78; }

.ex-field-wrap { position: relative; margin-bottom: 16px; }
.ex-field {
  width: 100%;
  padding: 14px 44px 14px 14px;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  color: var(--ink);
  font-family: 'Fraunces', Georgia, serif;
  font-size: 16px;
  font-style: italic;
  line-height: 1.5;
  resize: none;
  min-height: 110px;
  font-weight: 300;
}
.ex-field:focus { border-bottom-color: var(--brass); }
.ex-field.small { min-height: 80px; }

.ex-mic-btn {
  position: absolute;
  right: 6px;
  top: 12px;
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-muted);
  cursor: pointer;
}
.ex-mic-btn.listening {
  background: var(--brass-faint);
  border-color: var(--brass-dim);
  color: var(--brass);
  animation: micPulse 1.4s ease-in-out infinite;
}
@keyframes micPulse {
  0%, 100% { box-shadow: 0 0 0 0 var(--brass-dim); }
  50%      { box-shadow: 0 0 0 6px transparent; }
}
.ex-mic-btn svg { width: 14px; height: 14px; }

.ex-virtue-row {
  display: flex; flex-wrap: wrap;
  gap: 6px;
  margin: 10px 0 6px;
}
.ex-virtue-chip {
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 11px;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--ink-muted);
  letter-spacing: 0.02em;
  cursor: pointer;
  display: flex;
  align-items: baseline;
  gap: 5px;
}
.ex-virtue-chip.selected {
  background: var(--brass-faint);
  border-color: var(--brass-dim);
  color: var(--brass);
}
.ex-virtue-greek {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 10px;
  opacity: 0.65;
}

.ex-paraphrase {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink-faint);
  line-height: 1.55;
  padding: 10px 0;
  margin-bottom: 4px;
}
.ex-paraphrase .attr {
  display: block;
  margin-top: 4px;
  font-size: 9.5px;
  letter-spacing: 0.14em;
  font-style: normal;
  font-family: 'Inter', sans-serif;
  color: var(--ink-faint);
  text-transform: uppercase;
}

.ex-toggle-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0 2px;
  font-size: 12px;
  color: var(--ink-muted);
}
.ex-toggle {
  position: relative;
  width: 36px; height: 20px;
  flex-shrink: 0;
}
.ex-toggle input { opacity: 0; width: 0; height: 0; }
.ex-toggle-slider {
  position: absolute;
  cursor: pointer;
  inset: 0;
  background: var(--line-strong);
  border-radius: 20px;
  transition: 0.2s;
}
.ex-toggle-slider::before {
  position: absolute;
  content: '';
  height: 14px; width: 14px;
  left: 3px; top: 3px;
  background: var(--ink-muted);
  border-radius: 50%;
  transition: 0.2s;
}
.ex-toggle input:checked + .ex-toggle-slider { background: var(--brass-dim); }
.ex-toggle input:checked + .ex-toggle-slider::before {
  transform: translateX(16px);
  background: var(--brass);
}

.ex-close-headline {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-weight: 300;
  font-size: 26px;
  line-height: 1.3;
  color: var(--ink);
  letter-spacing: -0.01em;
  text-align: center;
  padding: 20px 6px 14px;
}
.ex-close-echo {
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-weight: 300;
  font-size: 17px;
  line-height: 1.5;
  color: var(--ink-muted);
  text-align: center;
  padding: 0 8px 22px;
  max-width: 320px;
  margin: 0 auto;
}
.ex-close-virtue {
  text-align: center;
  font-size: 10.5px;
  letter-spacing: 0.18em;
  color: var(--brass);
  text-transform: uppercase;
  margin-bottom: 6px;
}
.ex-moon {
  display: block;
  margin: 0 auto 16px;
  width: 22px; height: 22px;
  color: var(--brass);
  opacity: 0.7;
}

.btn-brass {
  margin-top: 20px;
  padding: 14px 20px;
  background: transparent;
  border: 1px solid var(--brass-dim);
  color: var(--brass);
  border-radius: 10px;
  font-size: 12px;
  letter-spacing: 0.06em;
  font-weight: 500;
  width: 100%;
  cursor: pointer;
}
.btn-skip {
  margin-top: 10px;
  padding: 12px 20px;
  background: transparent;
  border: none;
  color: var(--ink-faint);
  font-size: 11px;
  letter-spacing: 0.06em;
  width: 100%;
  cursor: pointer;
}

/* ─────────────────────────── people tab ─────────────────────────── */
.people-tab-item {
  padding: 14px 16px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 14px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.people-tab-item .avatar { width: 36px; height: 36px; font-size: 13px; margin-left: 0; }
.people-tab-name {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 16px;
  color: var(--ink);
  letter-spacing: -0.005em;
  font-weight: 400;
}
.people-tab-meta {
  font-size: 10.5px;
  color: var(--ink-muted);
  margin-top: 2px;
  letter-spacing: 0.01em;
}

/* ─────────────────────────── me tab ─────────────────────────── */
.section-title {
  font-size: 10.5px;
  letter-spacing: 0.18em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin: 28px 0 10px;
  font-weight: 500;
}
.setting-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 12px;
  margin-bottom: 6px;
  cursor: pointer;
  color: inherit;
  font-family: inherit;
  width: 100%;
  text-align: left;
}
.setting-row:active { transform: scale(0.996); }
.setting-row .label { color: var(--ink); font-size: 13.5px; }
.setting-row .value { color: var(--ink-muted); font-size: 12.5px; font-family: ui-monospace, monospace; }
.setting-row .label.danger { color: var(--clay); }

/* ─────────────────────────── review tab (phase 3 placeholder) ─────────────────────────── */
.review-placeholder {
  text-align: center;
  padding: 80px 20px;
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  color: var(--ink-faint);
  line-height: 1.6;
  font-size: 14px;
}

/* ─────────────────────────── training — lift in session ─────────────────────────── */
.workout-header {
  padding: 16px 0 12px;
  border-bottom: 0.5px solid var(--line);
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 10px;
}
.workout-meta-l {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--ink-muted);
  text-transform: uppercase;
  font-weight: 500;
}
.workout-meta-t {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 22px;
  color: var(--ink);
  margin-top: 3px;
  letter-spacing: -0.01em;
  font-weight: 400;
}
.workout-progress {
  font-family: ui-monospace, monospace;
  font-size: 11px;
  color: var(--ink-muted);
  margin-top: 4px;
  letter-spacing: -0.005em;
}
.rest-timer {
  padding: 5px 11px;
  background: var(--brass-faint);
  border: 0.5px solid var(--brass-dim);
  border-radius: 100px;
  font-size: 11px;
  color: var(--brass);
  font-family: ui-monospace, monospace;
  font-weight: 500;
  letter-spacing: -0.005em;
  white-space: nowrap;
}

.ex-card {
  padding: 14px 14px 12px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 14px;
  margin-bottom: 10px;
  transition: background 0.2s ease;
}
.ex-card.current {
  background: var(--accent-faint);
  border-color: var(--accent-dim);
}
.ex-card.done { opacity: 0.55; }
.ex-card.p2-dragging {
  opacity: 0.85;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  transition: none;
  pointer-events: none;
}
.ex-card.p2-drag-target {
  outline: 1.5px dashed var(--accent-bright);
  outline-offset: -2px;
}

.ex-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.drag-handle {
  width: 24px; height: 28px;
  color: var(--ink-faint);
  cursor: grab;
  display: flex; align-items: center; justify-content: center;
  touch-action: none;
  background: none;
  border: none;
  padding: 0;
  flex-shrink: 0;
}
.drag-handle:active { cursor: grabbing; color: var(--accent-bright); }
.drag-handle svg { width: 12px; height: 16px; }

.ex-letter {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  color: var(--ink);
  font-weight: 500;
  letter-spacing: 0.02em;
}
.ex-name {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 15px;
  color: var(--ink);
  letter-spacing: -0.005em;
  flex: 1;
  font-weight: 400;
}
.ex-prescription {
  font-size: 10.5px;
  color: var(--ink-muted);
  margin: 0 0 10px 30px;
  font-family: ui-monospace, monospace;
  letter-spacing: -0.005em;
}

.set-row {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 10px 12px;
  background: rgba(20,17,14,0.4);
  border-radius: 9px;
  margin-bottom: 4px;
  cursor: pointer;
  transition: background 0.15s ease;
}
.set-row.logged { background: var(--accent-faint); }
.set-row.expanded {
  flex-direction: column;
  align-items: stretch;
  padding: 10px 11px 11px;
  background: var(--accent-faint);
  border: 0.5px solid var(--accent-dim);
  cursor: default;
}
.set-num {
  width: 18px; height: 18px;
  border-radius: 50%;
  background: var(--surface-2);
  display: flex; align-items: center; justify-content: center;
  font-size: 9.5px;
  color: var(--ink-muted);
  font-weight: 500;
  flex-shrink: 0;
}
.set-range {
  padding: 2px 7px;
  background: var(--surface-2);
  border-radius: 100px;
  font-size: 10px;
  color: var(--ink-muted);
  font-family: ui-monospace, monospace;
  letter-spacing: -0.005em;
}
.set-hint {
  flex: 1;
  font-size: 10.5px;
  color: var(--ink-faint);
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
}
.set-logged-vals {
  flex: 1;
  display: flex;
  align-items: baseline;
  gap: 6px;
  color: var(--ink);
  font-size: 12.5px;
  font-family: ui-monospace, monospace;
}
.set-logged-sep { color: var(--ink-faint); font-size: 10px; }
.set-chev { width: 12px; height: 12px; color: var(--ink-faint); flex-shrink: 0; }
.set-chev.check { color: var(--accent-bright); }

.prep-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  padding: 2px 0 8px;
}
.prep-chip {
  padding: 4px 9px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 100px;
  font-size: 10.5px;
  color: var(--ink-muted);
  font-family: ui-monospace, monospace;
  letter-spacing: -0.005em;
  cursor: pointer;
}
.prep-chip.suggest {
  background: var(--accent-faint);
  border-color: var(--accent-dim);
  color: var(--accent-bright);
}

.set-expand-meta {
  display: flex;
  align-items: center;
  gap: 9px;
  width: 100%;
  margin-bottom: 6px;
}
.set-expand-label {
  flex: 1;
  font-size: 10.5px;
  color: var(--ink-muted);
  letter-spacing: 0.04em;
}

.set-input-row {
  display: flex;
  align-items: center;
  gap: 7px;
}
.set-input {
  flex: 1;
  padding: 9px 11px;
  background: rgba(20,17,14,0.5);
  border: 0.5px solid var(--line-strong);
  border-radius: 8px;
  font-size: 13px;
  color: var(--ink);
  font-family: ui-monospace, monospace;
  -webkit-appearance: none;
  appearance: none;
}
.set-input.reps {
  max-width: 65px;
  text-align: center;
}
.set-input:focus {
  outline: none;
  border-color: var(--accent-dim);
}
.set-input-x {
  color: var(--ink-faint);
  font-size: 14px;
}
.set-save-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  border: none;
  cursor: pointer;
}
.set-save-btn svg { width: 14px; height: 14px; }
.set-del-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: transparent;
  border: 0.5px solid var(--clay-dim);
  color: var(--clay);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 16px;
  cursor: pointer;
}

.workout-cta {
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 440px;
  padding: 10px 22px calc(14px + env(safe-area-inset-bottom));
  background: var(--bg);
  border-top: 0.5px solid var(--line);
  display: flex;
  gap: 7px;
  z-index: 50;
}
.workout-cta .btn-primary { flex: 1; }

/* ─────────────────────────── training — stoic close ─────────────────────────── */
.pr-badge {
  display: inline-block;
  padding: 5px 12px;
  background: var(--brass-faint);
  border: 0.5px solid var(--brass-dim);
  border-radius: 100px;
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--brass);
  text-transform: uppercase;
  font-weight: 500;
  margin-bottom: 14px;
}
.close-headline {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 30px;
  color: var(--ink);
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin: 8px 0 22px;
  text-align: center;
  font-weight: 400;
}
.close-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 7px;
  margin-bottom: 16px;
}
.close-stats.three-col { grid-template-columns: repeat(3, 1fr); }
.close-stat {
  padding: 12px 4px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 10px;
  text-align: center;
}
.close-stat-n {
  font-family: ui-monospace, monospace;
  font-size: 15px;
  color: var(--ink);
  line-height: 1;
  letter-spacing: -0.005em;
}
.close-stat-n.brass { color: var(--brass); }
.close-stat input {
  width: 100%;
  background: transparent;
  border: none;
  text-align: center;
  font-family: ui-monospace, monospace;
  font-size: 15px;
  color: var(--ink);
  padding: 0;
}
.close-stat input:focus { color: var(--accent-bright); }
.close-stat .brass input { color: var(--brass); }
.close-stat-l {
  font-size: 8px;
  color: var(--ink-faint);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-top: 5px;
  font-weight: 500;
}

.close-note-h {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin: 4px 0 6px;
  font-weight: 500;
}
.craft-tick {
  font-size: 10px;
  color: var(--accent-bright);
  display: flex;
  align-items: center;
  gap: 4px;
  text-transform: none;
  letter-spacing: 0.02em;
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-weight: 400;
}
.craft-tick svg { width: 11px; height: 11px; }
.craft-tick.inactive { color: var(--ink-faint); }
.close-note {
  padding: 14px 14px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 12px;
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink);
  line-height: 1.6;
  min-height: 86px;
  outline: none;
  width: 100%;
  resize: none;
  font-weight: 300;
}
.close-note.has-craft { border-color: var(--accent-dim); }
.close-note:focus { border-color: var(--accent-bright); }
.close-hint {
  font-size: 10px;
  color: var(--ink-faint);
  letter-spacing: 0.04em;
  margin-top: 6px;
  font-style: normal;
}

/* ─────────────────────────── training — run ─────────────────────────── */
.session-chip {
  display: inline-block;
  padding: 5px 12px;
  background: var(--accent-faint);
  border: 0.5px solid var(--accent-dim);
  border-radius: 100px;
  font-size: 10px;
  color: var(--accent-bright);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin: 4px 0 16px;
  font-weight: 500;
}
.intent-card {
  padding: 16px 18px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 14px;
  margin-bottom: 16px;
}
.intent-h {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin-bottom: 12px;
  font-weight: 500;
}
.intent-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.intent-label {
  font-size: 9px;
  letter-spacing: 0.12em;
  color: var(--ink-muted);
  text-transform: uppercase;
  margin-bottom: 6px;
  font-weight: 500;
}
.intent-val, .intent-input {
  font-family: ui-monospace, monospace;
  font-size: 22px;
  color: var(--ink);
  letter-spacing: -0.01em;
  line-height: 1;
  background: transparent;
  border: none;
  padding: 0;
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
}
.intent-input:focus { outline: none; color: var(--accent-bright); }
.intent-val .unit, .intent-unit {
  color: var(--ink-muted);
  font-size: 12px;
  margin-left: 3px;
  font-weight: 400;
}

.type-label {
  font-size: 10px;
  letter-spacing: 0.18em;
  color: var(--ink-faint);
  text-transform: uppercase;
  margin: 10px 0 8px;
  font-weight: 500;
}
.type-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.type-chip, .effort-chip {
  padding: 7px 12px;
  background: var(--surface-2);
  border: 0.5px solid var(--line-strong);
  border-radius: 100px;
  font-size: 10.5px;
  color: var(--ink-muted);
  letter-spacing: 0.02em;
  cursor: pointer;
  font-family: inherit;
}
.type-chip.selected, .effort-chip.selected {
  background: var(--accent-faint);
  border-color: var(--accent-dim);
  color: var(--accent-bright);
  font-weight: 500;
}
.effort-row {
  display: flex;
  gap: 6px;
  margin: 4px 0 16px;
}
.effort-chip {
  flex: 1;
  text-align: center;
  padding: 11px 0;
  font-size: 10.5px;
  letter-spacing: 0.04em;
  font-weight: 500;
}

.last-ref {
  padding: 12px 14px;
  background: var(--accent-faint);
  border-left: 2px solid var(--accent-dim);
  border-radius: 8px;
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink);
  line-height: 1.55;
  margin-bottom: 14px;
}
.last-ref-label {
  font-size: 9.5px;
  letter-spacing: 0.14em;
  color: var(--accent-bright);
  text-transform: uppercase;
  margin-bottom: 4px;
  font-style: normal;
  font-family: 'Inter', sans-serif;
  font-weight: 500;
}
.run-note-line {
  padding: 14px 0 6px;
  font-family: 'Fraunces', Georgia, serif;
  font-style: italic;
  font-size: 12.5px;
  color: var(--ink-faint);
  line-height: 1.55;
}

/* ─────────────────────────── training — session picker ─────────────────────────── */
.picker-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 10px;
}
.picker-card {
  padding: 18px 16px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 14px;
  text-align: left;
  cursor: pointer;
  color: inherit;
  font-family: inherit;
}
.picker-card:active { transform: scale(0.98); }
.picker-card-h {
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--accent-bright);
  text-transform: uppercase;
  margin-bottom: 4px;
  font-weight: 500;
}
.picker-card-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 16px;
  color: var(--ink);
  letter-spacing: -0.005em;
  font-weight: 400;
}
.picker-card-meta {
  font-size: 10.5px;
  color: var(--ink-muted);
  margin-top: 4px;
  font-family: ui-monospace, monospace;
}

/* ─────────────────────────── toast ─────────────────────────── */
.toast {
  position: fixed;
  bottom: calc(96px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 18px;
  background: var(--surface);
  border: 0.5px solid var(--line-strong);
  border-radius: 100px;
  font-size: 12px;
  color: var(--ink);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  z-index: 500;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}
.toast.show { opacity: 1; }

/* ─────────────────────────── modal (simple inline captures) ─────────────────────────── */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(14,15,13,0.72);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  z-index: 450;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.modal.active { display: flex; }
.modal-panel {
  background: var(--surface);
  border: 0.5px solid var(--line);
  border-radius: 20px;
  padding: 22px 22px 18px;
  max-width: 360px;
  width: 100%;
}
.modal-title {
  font-family: 'Fraunces', Georgia, serif;
  font-size: 20px;
  color: var(--ink);
  letter-spacing: -0.01em;
  line-height: 1.3;
  margin-bottom: 16px;
  font-weight: 400;
}
.modal-input {
  width: 100%;
  padding: 12px 14px;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  border-radius: 10px;
  font-size: 14px;
  color: var(--ink);
  font-family: 'Inter', sans-serif;
  margin-bottom: 14px;
}
.modal-input:focus {
  outline: none;
  border-color: var(--accent-dim);
}
.modal-row { display: flex; gap: 8px; }

/* mood faces */
.mood-row { display: flex; justify-content: space-around; padding: 16px 4px 8px; }
.mood-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--surface-2);
  border: 0.5px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--ink-muted);
}
.mood-btn:active { transform: scale(0.92); }
.mood-btn.selected {
  background: var(--brass-faint);
  border-color: var(--brass-dim);

// ═════ Week math (Mon-Sun, locked to local time) ═════
function startOfWeek(d) {
  const x = new Date(d);
  x.setHours(0, 0, 0, 0);
  const dow = x.getDay();           // 0 = Sun, 1 = Mon ... 6 = Sat
  const diff = dow === 0 ? -6 : 1 - dow;  // shift to most recent Monday
  x.setDate(x.getDate() + diff);
  return x;
}
function endOfWeek(d) {
  const s = startOfWeek(d);
  s.setDate(s.getDate() + 6);
  s.setHours(23, 59, 59, 999);
  return s;
}
function weekISO(d) {
  return startOfWeek(d).toISOString().slice(0, 10);
}
function isSaturday(d = new Date()) { return d.getDay() === 6; }
function isSunday(d = new Date())   { return d.getDay() === 0; }

// Pause window: opens Saturday after sunset, fallback Sunday all day, closed Monday
function pauseWindowOpen() {
  const now = new Date();
  if (isSaturday(now) && isAfterSunset()) return true;

let toastTimer = null;
function toast(msg, ms = 1800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}

// ═══════════════════════════════════════════════════════════════════════
// RING CONTRIBUTIONS (4 pillars: Train, Sleep, Mind, Body)
// ═══════════════════════════════════════════════════════════════════════
function ringValue(pillar) {
  const td = todayISO();
  if (pillar === 'train') {
    return state.workouts.some(w => isSameDay(w.ts, td)) ? 1 : 0;
  }
  if (pillar === 'sleep') {
    const s = state.sleep.find(x => x.date === td);
    if (!s) return 0;
    return Math.min(s.duration_h / 7.5, 1);
  }
  if (pillar === 'mind') {
    const ex = state.examens.find(e => e.date_iso === td && e.completed_at);
    if (ex) return 1;
    // in-progress or draft
    const hasIntention = state.intentions.some(i => i.for_date === td && i.text && i.text.trim());
    if (hasIntention) return 0.33;
    return 0;
  }
  if (pillar === 'body') {
    return state.weights.some(w => isSameDay(w.ts, td)) ? 1 : 0;
  }
  return 0;
}

// ═══════════════════════════════════════════════════════════════════════
// TODAY SCREEN
// ═══════════════════════════════════════════════════════════════════════
function todayAdjective() {
  const td = todayISO();
  const yestISO = (() => { const d = new Date(); d.setDate(d.getDate()-1); return d.toISOString().slice(0,10); })();
  const yestSleep = state.sleep.find(s => s.date === yestISO);
  const yestMood = [...state.moods].reverse().find(m => isSameDay(m.ts, yestISO));
  if ((yestSleep && yestSleep.duration_h < 6) || (yestMood && yestMood.score <= 2)) return 'softly';
  const plannedToday = state.weekPlans.find(p => p.date === td);
  const hasIntention = state.intentions.some(i => i.for_date === td && i.text && i.text.trim());
  if (plannedToday && hasIntention) return 'clearly';
  return 'quietly';
}

function runwayMonths() {
  if (!state.ledger || !state.ledger.length) return null;
  const latest = [...state.ledger].sort((a,b) => (b.date || '').localeCompare(a.date || ''))[0];
  if (!latest || !latest.liquid || !latest.monthly_burn) return null;
  return latest.liquid / latest.monthly_burn;
}

function recentPersonMention() {
  if (!state.examens || !state.examens.length) return null;
  const recent = state.examens.slice(-3).reverse();
  for (const ex of recent) {
    const text = [(ex.went_well || ''), (ex.went_poorly || ''), (ex.remains || '')].join(' ');
    for (const p of state.people) {
      if (p.name && new RegExp(`\\b${p.name}\\b`, 'i').test(text)) {
        const daysAgo = Math.floor((Date.now() - new Date(ex.created_at).getTime()) / 86400000);
        return { name: p.name, daysAgo };
      }
    }
  }
  return null;
}

function dueMostPerson() {
  if (!state.people || !state.people.length) return null;
  let worst = null;
  for (const p of state.people) {
    if (!p.cadence || !CADENCE_DAYS[p.cadence]) continue;
    const lastTs = p.last_touch_ts ? new Date(p.last_touch_ts).getTime() : 0;
    const daysSince = lastTs ? Math.floor((Date.now() - lastTs) / 86400000) : 999;
    const overdue = daysSince - CADENCE_DAYS[p.cadence];
    if (overdue > 0) {
      if (!worst || overdue > worst.overdue) worst = { person: p, daysSince, overdue };
    }
  }
  return worst;
}

function peopleAvatars() {
  if (!state.people || !state.people.length) return [];
  const inner = state.people.filter(p => p.tier === 'inner' || p.tier === 'close');
  const pool = inner.length ? inner : state.people;
  return [...pool]
    .sort((a,b) => {
      const ta = a.last_touch_ts ? new Date(a.last_touch_ts).getTime() : 0;
      const tb = b.last_touch_ts ? new Date(b.last_touch_ts).getTime() : 0;
      return tb - ta;
    })
    .slice(0, 3);
}

function daysAgoShort(ts) {
  if (!ts) return '';
  const d = Math.floor((Date.now() - new Date(ts).getTime()) / 86400000);
  if (d === 0) return 'today';
  if (d === 1) return '1d ago';
  if (d < 30) return `${d}d ago`;
  const w = Math.floor(d / 7);
  if (w < 5) return `${w}w ago`;
  return `${Math.floor(d / 30)}mo ago`;
}

function isAfterSunset() {
  const [h, m] = (state.config.sunset_time || '19:30').split(':').map(Number);
  const now = new Date();
  const cutoff = new Date(now);
  cutoff.setHours(h || 19, m || 30, 0, 0);
  return now >= cutoff;
}

  const td = todayISO();
  return state.examens.find(e => e.date_iso === td) || null;

  const active = (state.todos || []).filter(t => !t.completed);

  return [...active].sort((a,b) => (b.ts || 0) - (a.ts || 0))[0];
}

function ringSVG(pct, colorVar) {
  const r = 19;
  const circumference = 2 * Math.PI * r;
  const offset = circumference * (1 - Math.min(Math.max(pct, 0), 1));
  return `<svg width="46" height="46" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="${r}" fill="none" stroke="rgba(237,230,216,0.10)" stroke-width="3.5"/>
    <circle cx="24" cy="24" r="${r}" fill="none" stroke="${colorVar}" stroke-width="3.5" stroke-linecap="round"
            stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" transform="rotate(-90 24 24)"/>
  </svg>`;
}

  const now = new Date();
  const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][now.getDay()];
  const monthName = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()];
  const dateLine = `${dayName} · ${now.getDate()} ${monthName}`;

  // Ambient line
  let ambientParts = [];
  // Weekly intent (highest priority — shows what you said this week's work was)
  const wkIso = weekISO(new Date());
  const openIntents = state.weekly_intents.filter(i => i.week_iso === wkIso && !i.completed);
  if (openIntents.length) {
    const first = openIntents[0];
    const more = openIntents.length > 1 ? ` +${openIntents.length - 1}` : '';
    ambientParts.push(`This week: ${escapeHtml(first.text)}${more}`);
  }
  if (runway != null) ambientParts.push(`Runway: ${runway.toFixed(1)} months`);
  if (recentMention) {
    const when = recentMention.daysAgo === 0 ? 'today' : recentMention.daysAgo === 1 ? 'yesterday' : `${recentMention.daysAgo} days ago`;
    ambientParts.push(`You wrote about ${recentMention.name} ${when}`);
  }
  const ambient = ambientParts.length
    ? ambientParts.join(' <span class="sep">·</span> ')
    : `<span class="empty">The day is yours.</span>`;

  // Examen card
  let examenCard;
  if (examen) {
    examenCard = `
      <button class="card" onclick="openExamenSummary()">
        <div class="card-head">
          <span class="card-kicker">Evening examen</span>
          <span class="card-kicker-r">sealed</span>
        </div>
        <div class="card-title">${examen.skipped_entirely ? 'Rested tonight' : 'The day is sealed'}</div>
        <div class="card-sub">Tap to review</div>
      </button>`;
  } else if (isAfterSunset()) {
    examenCard = `
      <div class="card">
        <div class="card-head">
          <span class="card-kicker">Before sleep</span>
          <span class="card-kicker-r">~3 min</span>
        </div>
        <div class="card-title">The evening examen</div>
        <div class="card-sub">What did I do well · poorly · leave undone</div>
        <div class="card-row">
          <button class="btn-primary" onclick="openExamen()">Begin</button>
          <button class="btn-secondary" onclick="examenSkipTonight()">Not tonight</button>
        </div>
      </div>`;
  } else {
    examenCard = `
      <button class="card" onclick="openExamen()">
        <div class="card-head">
          <span class="card-kicker">Evening examen</span>
          <span class="card-kicker-r">after dusk</span>
        </div>
        <div class="card-title">Close the day</div>
        <div class="card-sub">Three questions, when the light is gone</div>
      </button>`;
  }

  // Ledger card
  let ledgerCard;
  if (runway != null) {
    ledgerCard = `
      <button class="card" onclick="openLedgerSnapshot()">
        <div class="card-head">
          <span class="card-kicker">Ledger</span>
          <span class="card-kicker-r${ledgerDue() ? ' due' : ''}">${ledgerDue() ? 'Sun check-in due' : 'up to date'}</span>
        </div>
        <div class="ledger-title">You have enough for <span class="n">${runway.toFixed(1)} months</span>.</div>
      </button>`;
  } else {
    ledgerCard = `
      <button class="card" onclick="openLedgerSnapshot()">
        <div class="card-head">
          <span class="card-kicker">Ledger</span>
          <span class="card-kicker-r">not yet</span>
        </div>
        <div class="ledger-title">Take a snapshot to begin.</div>
      </button>`;
  }

  // People card
  let peopleCard;
  if (avatars.length && dueMost) {
    const wks = Math.floor(dueMost.daysSince / 7);
    const weeksStr = wks >= 1 ? `${wks} weeks` : `${dueMost.daysSince} days`;
    const avatarHTML = avatars.map((p, i) =>
      `<div class="avatar a${(i % 3) + 1}">${escapeHtml((p.name || '?')[0].toUpperCase())}</div>`
    ).join('');
    const innerCount = state.people.filter(p => p.tier === 'inner').length;
    peopleCard = `
      <button class="card" onclick="switchTab('people')">
        <div class="card-head">
          <span class="card-kicker">People</span>
          ${innerCount ? `<span class="card-kicker-r">Inner ${innerCount}</span>` : ''}
        </div>
        <div class="people-row">
          <div class="avatars">${avatarHTML}</div>
          <div class="people-body">${escapeHtml(dueMost.person.name)} &mdash; ${dueMost.person.cadence} cadence, <span class="weeks">${weeksStr}</span></div>
        </div>
      </button>`;
  } else if (state.people.length) {
    const avatarHTML = avatars.map((p, i) =>
      `<div class="avatar a${(i % 3) + 1}">${escapeHtml((p.name || '?')[0].toUpperCase())}</div>`
    ).join('');
    peopleCard = `
      <button class="card" onclick="switchTab('people')">
        <div class="card-head">
          <span class="card-kicker">People</span>
          <span class="card-kicker-r">${state.people.length} total</span>
        </div>
        <div class="people-row">
          <div class="avatars">${avatarHTML}</div>
          <div class="people-body">Everyone's on time.</div>
        </div>
      </button>`;
  } else {
    peopleCard = `
      <button class="card" onclick="openTouchModal()">
        <div class="card-head">
          <span class="card-kicker">People</span>
        </div>
        <div class="people-empty">No one logged yet. Tap to log a touch with someone.</div>
      </button>`;
  }

  // In progress card
  let progressCard = '';
  if (inProg) {
    progressCard = `
      <button class="progress-card" onclick="switchTab('me')">
        <div class="progress-left">
          <div class="card-kicker">In progress</div>
          <div class="progress-title">${escapeHtml(inProg.text || '')}</div>
        </div>
        <div class="progress-right">
          <div class="progress-arrow">↓</div>
          <div class="progress-ago">${daysAgoShort(inProg.ts)}</div>
        </div>
      </button>`;
  }

  // Phase 4 — Pause banner (Saturday-evening / Sunday window)
  let pauseBanner = '';
  if (pauseWindowOpen() && !thisWeekPause()) {
    const isSat = isSaturday();
    pauseBanner = `
      <button class="pause-banner" onclick="openPause()">
        <div class="kicker">${isSat ? 'Saturday · the week ends' : 'Sunday · before the new week'}</div>
        <div class="title">The Pause</div>
        <div class="sub">Look back. Look forward. About 4 minutes.</div>
        <div class="arrow">›</div>
      </button>`;
  }

  const html = `
    <div class="today-header">
      <div class="today-header-l">
        <div class="today-date">${dateLine}</div>
        <div class="today-title">Today<span class="adj">, ${adj}.</span></div>
      </div>
      <div class="today-header-r">
        <button class="icon-btn" onclick="toggleTheme()" aria-label="Theme">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="6.34" y2="6.34"/><line x1="17.66" y1="17.66" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/></svg>
        </button>
      </div>
    </div>

    <div class="rings-wrap">
      <div class="rings-label">The Four, Today</div>
      <div class="rings-row">
        <button class="ring-col" onclick="openTrainPicker()">
          ${ringSVG(ringValue('train'), 'var(--accent-bright)')}
          <div class="ring-label">Train</div>
        </button>
        <button class="ring-col" onclick="openSleepModal()">
          ${ringSVG(ringValue('sleep'), 'var(--brass)')}
          <div class="ring-label">Sleep</div>
        </button>
        <button class="ring-col" onclick="openExamen()">
          ${ringSVG(ringValue('mind'), 'var(--brass)')}
          <div class="ring-label">Mind</div>
        </button>
        <button class="ring-col" onclick="openWeightModal()">
          ${ringSVG(ringValue('body'), 'var(--accent-bright)')}
          <div class="ring-label">Body</div>
        </button>
      </div>
      <div class="ambient-line">${ambient}</div>
    </div>

    <div class="quote-card">
      <div class="quote-body">${escapeHtml(quote.text)}</div>
      <div class="quote-attr">${escapeHtml(quote.attr)}</div>
    </div>

    ${pauseBanner}
    ${examenCard}
    ${ledgerCard}
    ${peopleCard}
    ${progressCard}
  `;
  document.getElementById('screen-today').innerHTML = html;
}

function ledgerDue() {
  if (!state.ledger || !state.ledger.length) return true;
  const latest = [...state.ledger].sort((a,b) => (b.date || '').localeCompare(a.date || ''))[0];
  if (!latest) return true;
  return Math.floor((Date.now() - new Date(latest.date).getTime()) / 86400000) >= 7;
}

const ORB_ICONS = {
  weight: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 6h16l-1 14H5L4 6zM9 10l3 3 3-3"/></svg>`,
  run: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 4.5a2 2 0 11-4 0 2 2 0 014 0zM6 21l3-7 4 3 1 5M14 11l4-2-1-3M8 14L4 11"/></svg>`,
  mood: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><circle cx="9" cy="10" r="0.5" fill="currentColor"/><circle cx="15" cy="10" r="0.5" fill="currentColor"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/></svg>`,
  touch: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="3.5"/><path d="M5 21c0-4 3-6 7-6s7 2 7 6"/></svg>`,
  sleep: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`,
  lift: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 7v10M18 7v10M3 10v4M21 10v4M6 12h12"/></svg>`,
};
function openOrbSheet() {
  const sheet = document.getElementById('sheet-orb');
  sheet.innerHTML = renderOrbSheet();
  sheet.classList.add('active');
}
function closeOrbSheet() {
  document.getElementById('sheet-orb').classList.remove('active');
}
function renderOrbSheet() {
  const hour = new Date().getHours();
  const isMorning = hour < 17;
  const td = todayISO();
  const planned = state.weekPlans.find(p => p.date === td);
  const plannedSession = planned && state.program && state.program.sessions[planned.session_id];
  const now = new Date();
  const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][now.getDay()];

  const plannedBanner = plannedSession ? `
    <button class="planned-banner" onclick="closeOrbSheet();startLiftSession('${plannedSession.id}')">
      <div class="planned-left">
        <div class="planned-kicker">Today's planned</div>
        <div class="planned-name">${escapeHtml(plannedSession.name)}</div>
        <div class="planned-meta">${(plannedSession.exercises || []).length} exercises</div>
      </div>
      <div class="planned-go">Begin</div>
    </button>` : '';

  let primary, secondary, sectionLabel;
  if (isMorning) {
    sectionLabel = 'Or something else';
    primary = `
      <button class="tile-primary" onclick="closeOrbSheet();openTrainPicker()">
        <div class="ic">${ORB_ICONS.lift}</div>
        <div class="tile-name">Start a lift</div>
        <div class="tile-sub">Pick a session</div>
      </button>
      <button class="tile-primary" onclick="closeOrbSheet();startRun()">
        <div class="ic">${ORB_ICONS.run}</div>
        <div class="tile-name">Log a run</div>
        <div class="tile-sub">Manual entry</div>
      </button>`;
    secondary = `
      <button class="tile-secondary" onclick="closeOrbSheet();openWeightModal()">
        <div class="ic">${ORB_ICONS.weight}</div>
        <div class="tile-secondary-name">Weight</div>
      </button>
      <button class="tile-secondary" onclick="closeOrbSheet();openMoodModal()">
        <div class="ic">${ORB_ICONS.mood}</div>
        <div class="tile-secondary-name">Mood</div>
      </button>
      <button class="tile-secondary" onclick="closeOrbSheet();openTouchModal()">
        <div class="ic">${ORB_ICONS.touch}</div>
        <div class="tile-secondary-name">Touch</div>
      </button>`;
  } else {
    sectionLabel = 'Close the day';
    primary = `
      <button class="tile-primary" onclick="closeOrbSheet();openMoodModal()">
        <div class="ic">${ORB_ICONS.mood}</div>
        <div class="tile-name">Mood</div>
        <div class="tile-sub">One tap</div>
      </button>
      <button class="tile-primary" onclick="closeOrbSheet();openTouchModal()">
        <div class="ic">${ORB_ICONS.touch}</div>
        <div class="tile-name">Touch someone</div>
        <div class="tile-sub">Log a conversation</div>
      </button>`;
    secondary = `
      <button class="tile-secondary" onclick="closeOrbSheet();openSleepModal()">
        <div class="ic">${ORB_ICONS.sleep}</div>
        <div class="tile-secondary-name">Sleep</div>
      </button>
      <button class="tile-secondary" onclick="closeOrbSheet();openWeightModal()">
        <div class="ic">${ORB_ICONS.weight}</div>
        <div class="tile-secondary-name">Weight</div>
      </button>
      <button class="tile-secondary" onclick="closeOrbSheet();startRun()">
        <div class="ic">${ORB_ICONS.run}</div>
        <div class="tile-secondary-name">Run</div>
      </button>`;
  }

  return `
    <div class="sheet-panel">
      <div class="sheet-header">
        <div class="sheet-title">Capture</div>
        <button class="sheet-close" onclick="closeOrbSheet()">×</button>
      </div>
      <div class="sheet-kicker">${isMorning ? 'Morning' : 'Evening'} · ${dayName}</div>
      ${plannedBanner}
      <div class="sheet-section-label">${sectionLabel}</div>
      <div class="primary-tiles">${primary}</div>
      <div class="secondary-row">${secondary}</div>
    </div>
  `;
}

// ─── Weight modal
function openWeightModal() {
  const latest = state.weights.slice(-1)[0];
  openModal(`
    <div class="modal-title">Morning weight</div>
    <input type="number" inputmode="decimal" step="0.1" class="modal-input" id="weight-input"
           placeholder="${latest ? `Last: ${latest.weight_kg} kg` : 'kg'}">

      <button class="btn-primary" style="flex:1" onclick="saveWeight()">Save</button>

  setTimeout(() => document.getElementById('weight-input').focus(), 80);
}
function saveWeight() {
  const v = parseFloat(document.getElementById('weight-input').value);
  if (!v || isNaN(v)) { closeModal(); return; }
  state.weights.push({ id: uid(), ts: new Date().toISOString(), weight_kg: v });
  saveState();
  closeModal();
  render();
  toast(`${v} kg logged`);
}

// ─── Sleep modal
function openSleepModal() {
  const td = todayISO();
  const existing = state.sleep.find(s => s.date === td);
  openModal(`
    <div class="modal-title">How did you sleep?</div>
    <input type="number" inputmode="decimal" step="0.1" class="modal-input" id="sleep-input"
           placeholder="Hours (e.g. 7.5)" value="${existing ? existing.duration_h : ''}">
    <div class="modal-row">
      <button class="btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" style="flex:1" onclick="saveSleep()">Save</button>
    </div>
  `);
  setTimeout(() => document.getElementById('sleep-input').focus(), 80);
}
function saveSleep() {
  const v = parseFloat(document.getElementById('sleep-input').value);
  if (!v || isNaN(v)) { closeModal(); return; }
  const td = todayISO();
  const existing = state.sleep.find(s => s.date === td);
  if (existing) existing.duration_h = v;
  else state.sleep.push({ id: uid(), date: td, duration_h: v });
  saveState();
  closeModal();
  render();
  toast(`${v}h logged`);
}

// ─── Touch modal
function openTouchModal(personId) {
  const preset = personId ? state.people.find(p => p.id === personId) : null;
  const nameField = preset
    ? `<div style="padding:12px 14px;background:var(--accent-faint);border:0.5px solid var(--accent-dim);border-radius:10px;margin-bottom:14px;font-family:'Fraunces',serif;font-size:14px;color:var(--ink);">${escapeHtml(preset.name)}</div>`
    : `<input type="text" class="modal-input" id="touch-input" placeholder="Name">`;
  openModal(`
    <div class="modal-title">Who did you see or speak with?</div>
    ${nameField}
    <input type="text" class="modal-input" id="touch-note" placeholder="Note (optional) — what came up?">
    <div class="modal-row">
      <button class="btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" style="flex:1" onclick="saveTouch('${preset ? preset.id : ''}')">Log</button>
    </div>
  `);
  setTimeout(() => {
    const focusEl = document.getElementById(preset ? 'touch-note' : 'touch-input');
    if (focusEl) focusEl.focus();
  }, 80);
}
function saveTouch(personId) {
  const note = (document.getElementById('touch-note')?.value || '').trim();
  let person;
  if (personId) {
    person = state.people.find(p => p.id === personId);
  } else {
    const name = document.getElementById('touch-input').value.trim();
    if (!name) { closeModal(); return; }
    person = state.people.find(p => p.name && p.name.toLowerCase() === name.toLowerCase());
    if (!person) {
      person = { id: uid(), name, tier: 'tribe', cadence: 'monthly', last_touch_ts: null, touches: [] };
      state.people.push(person);
    }
  }
  if (!person) { closeModal(); return; }
  person.last_touch_ts = new Date().toISOString();
  person.touches = person.touches || [];
  person.touches.push({ id: uid(), ts: new Date().toISOString(), note });
  saveState();
  closeModal();
  render();
  toast(`Logged touch with ${person.name}`);
}

    <input type="number" inputmode="decimal" class="modal-input" id="ledger-burn" placeholder="Monthly burn (USD)" value="${latest ? latest.monthly_burn : ''}">
