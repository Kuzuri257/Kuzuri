// PHASE 4 — PEOPLE TAB (Dunbar surface)
// Tiers: inner (≤5) · close (≤15) · tribe (≤50) · community (≤150)
// Concentric SVG, tier tabs below for list filter, tap person → detail
// ═══════════════════════════════════════════════════════════════════════
let peopleTierFilter = 'all';   // 'all' | 'inner' | 'close' | 'tribe' | 'community'

const TIERS = [
  { id: 'inner',     label: 'Inner',     radius: 48,  cap: 5,   color: 'var(--accent-bright)' },
  { id: 'close',     label: 'Close',     radius: 80,  cap: 15,  color: 'var(--brass)' },
  { id: 'tribe',     label: 'Tribe',     radius: 115, cap: 50,  color: 'var(--ink-muted)' },
  { id: 'community', label: 'Community', radius: 148, cap: 150, color: 'var(--ink-faint)' },
];
const CADENCE_DAYS = { daily: 1, weekly: 7, biweekly: 14, monthly: 30 };

function personIsDue(p) {
  const days = CADENCE_DAYS[p.cadence];
  if (!days) return false;
  if (!p.last_touch_ts) return true;
  const daysSince = Math.floor((Date.now() - new Date(p.last_touch_ts).getTime()) / 86400000);
  return daysSince > days;
}
function daysOverdue(p) {
  const days = CADENCE_DAYS[p.cadence];
  if (!days) return 0;
  if (!p.last_touch_ts) return 999;
  const daysSince = Math.floor((Date.now() - new Date(p.last_touch_ts).getTime()) / 86400000);
  return Math.max(0, daysSince - days);
}
function peopleInTier(tierId) {
  return state.people.filter(p => (p.tier || 'tribe') === tierId);
}

// Return a Fraunces-italic-ready phrase like "Usually you talk on Sundays."
// Only returns a line when ≥3 touches exist AND one day clearly dominates (≥40% share).
// Otherwise returns null (no line shown).
function usualDayOfWeek(touches) {
  if (!touches || touches.length < 3) return null;
  const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
  const counts = [0, 0, 0, 0, 0, 0, 0];
  for (const t of touches) {
    if (!t.ts) continue;
    counts[new Date(t.ts).getDay()]++;
  }
  const total = counts.reduce((a, b) => a + b, 0);
  if (!total) return null;
  let maxIdx = 0, maxVal = 0;
  for (let i = 0; i < 7; i++) {
    if (counts[i] > maxVal) { maxVal = counts[i]; maxIdx = i; }
  }
  // Need a clear modal day — at least 40% of touches AND at least 3 absolute
  if (maxVal < 3) return null;
  if (maxVal / total < 0.4) return null;
  return `Usually on ${dayNames[maxIdx]}s.`;
}

// @mention parser — inside-out accretion.
// Parses @name patterns from any text. For each match:
//   - If the name matches an existing person: auto-log a touch of type 'reflection_mention'.
//   - If no match: collect into `unmatched` and surface a toast asking to add them.
// Match is case-insensitive and matches on first-name-only or exact full name.
// Returns array of matched people (so caller can store their IDs on the source record).
function scanForMentions(text, meta) {
  if (!text || typeof text !== 'string') return [];
  const rx = /@([A-Za-z][A-Za-z'\-]{1,30})/g;
  const matches = [...text.matchAll(rx)];
  if (!matches.length) return [];

  // Helper: extract a clean sentence containing the @mention
  function sentenceAround(text, matchIdx, matchLen) {
    // Find sentence boundaries — period, exclamation, question, or newline
    let start = matchIdx;
    while (start > 0 && !/[.!?\n]/.test(text[start - 1])) start--;
    let end = matchIdx + matchLen;
    while (end < text.length && !/[.!?\n]/.test(text[end])) end++;
    if (end < text.length) end++; // include the punctuation
    let excerpt = text.slice(start, end).trim();
    // Trim leading punctuation/whitespace
    excerpt = excerpt.replace(/^[\s.,;:]+/, '');
    return excerpt;
  }

  const matched = [];
  const unmatched = [];
  const seenIds = new Set();

  for (const m of matches) {
    const raw = m[1];
    const matchIdx = m.index;
    const matchLen = m[0].length;
    const excerpt = sentenceAround(text, matchIdx, matchLen);

    const lower = raw.toLowerCase();
    const person = state.people.find(p => {
      if (!p.name) return false;
      const full = p.name.toLowerCase();
      const first = full.split(/\s+/)[0];
      return full === lower || first === lower;
    });
    if (person) {
      if (seenIds.has(person.id)) continue;
      seenIds.add(person.id);
      person.last_touch_ts = meta.ts;
      person.touches = person.touches || [];
      person.touches.push({
        id: uid(),
        ts: meta.ts,
        note: excerpt || '',
        source: meta.source || 'mention',
        source_id: meta.source_id || null,
        type: 'reflection_mention',
      });
      matched.push(person);
    } else {
      if (!unmatched.includes(raw)) unmatched.push(raw);
    }
  }

  if (unmatched.length) {
    // Store pending mentions — user can resolve them later from a small toast or People tab banner.
    state._pendingMentions = state._pendingMentions || [];
    for (const name of unmatched) {
      state._pendingMentions.push({
        id: uid(),
        name,
        source: meta.source || 'mention',
        source_id: meta.source_id || null,
        ts: meta.ts,
      });
    }
    // Surface to user after save commits. A little delay so toast doesn't collide with examen close.
    setTimeout(() => {
      const nm = unmatched[0];
      const more = unmatched.length > 1 ? ` +${unmatched.length - 1} more` : '';
      toast(`@${nm}${more} — tap People to add`);
    }, 1200);
  }

  return matched;
}

function dunbarSVG() {
  const cx = 170, cy = 170;
  const rings = TIERS.map(t => `
    <circle class="dunbar-ring ${t.id}" cx="${cx}" cy="${cy}" r="${t.radius}"/>
  `).join('');

  // v2.9.3: Build set of person IDs mentioned in examens within last 7 days
  const recentMentionIds = new Set();
  const sevenDaysAgo = Date.now() - 7 * 86400000;
  for (const ex of (state.examens || [])) {
    const exTs = new Date(ex.date_iso).getTime();
    if (exTs < sevenDaysAgo) continue;
    const text = [(ex.went_well || ''), (ex.went_poorly || ''), (ex.remains || '')].join(' ');
    for (const p of (state.people || [])) {
      if (p.name && new RegExp(`\\b${p.name.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&')}\\b`, 'i').test(text)) {
        recentMentionIds.add(p.id);
      }
    }
  }

  // Arrange dots around each ring — spread evenly by position in tier
  const dotEls = [];
  TIERS.forEach(t => {
    const people = peopleInTier(t.id);
    if (!people.length) return;
    const count = people.length;
    const startAngle = { inner: -90, close: -90 + 20, tribe: -90 + 10, community: -90 - 15 }[t.id];
    people.forEach((p, i) => {
      const step = count === 1 ? 0 : (360 / count);
      const angle = (startAngle + i * step) * Math.PI / 180;
      const dotR = t.id === 'inner' ? 13 : t.id === 'close' ? 11 : t.id === 'tribe' ? 9 : 7;
      const px = cx + t.radius * Math.cos(angle);
      const py = cy + t.radius * Math.sin(angle);
      const isDue = personIsDue(p);
      const initial = (p.name || '?')[0].toUpperCase();

      // v2.9.3: Saturation by recency
      // Recent (≤7 days) → 1.0 · Quiet (≤30 days) → 0.8 · Ghost (>30 days or never) → 0.6
      let opacity = 0.6;
      if (p.last_touch_ts) {
        const daysSince = Math.floor((Date.now() - new Date(p.last_touch_ts).getTime()) / 86400000);
        if (daysSince <= 7) opacity = 1.0;
        else if (daysSince <= 30) opacity = 0.8;
      }

      // v2.9.3: Brass dot if mentioned in examen in last 7 days
      const hasRecentMention = recentMentionIds.has(p.id);
      const dotPx = px + dotR * 0.6;
      const dotPy = py - dotR * 0.6;
      const mentionDot = hasRecentMention
        ? `<circle class="dunbar-mention-dot" cx="${dotPx}" cy="${dotPy}" r="${Math.max(2.5, dotR * 0.28)}"/>`
        : '';

      dotEls.push(`
        <g class="dunbar-dot ${t.id} ${isDue ? 'due' : ''}" style="opacity:${opacity};" onclick="openPersonDetail('${p.id}')">
          <circle cx="${px}" cy="${py}" r="${dotR}"/>
          <text class="dunbar-dot-init" x="${px}" y="${py}">${escapeHtml(initial)}</text>
          ${mentionDot}
        </g>
      `);
    });
  });
  // tier labels
  const labels = TIERS.map(t => `
    <text class="dunbar-label" x="${cx}" y="${cy - t.radius + 14}" text-anchor="middle">${t.label}</text>
  `).join('');
  return `
    <svg class="dunbar-svg" viewBox="0 0 340 340">
      ${rings}
      ${labels}
      <text class="dunbar-center" x="${cx}" y="${cy - 6}">you</text>
      <text class="dunbar-center" x="${cx}" y="${cy + 10}" style="font-size:9px;letter-spacing:0.14em;text-transform:uppercase;font-style:normal;fill:var(--ink-faint);">here</text>
      ${dotEls.join('')}
    </svg>
  `;
}

function renderPeople() {
  const allCount = state.people.length;
  const counts = {
    inner: peopleInTier('inner').length,
    close: peopleInTier('close').length,
    tribe: peopleInTier('tribe').length,
    community: peopleInTier('community').length,
  };
  const dueCount = state.people.filter(personIsDue).length;

  // v2.8.1: Sort mode persists in config
  state.config = state.config || {};
  const sortMode = state.config.people_sort || 'tier';  // 'tier' | 'alpha'

  let listPeople = peopleTierFilter === 'all'
    ? [...state.people]
    : peopleInTier(peopleTierFilter);

  if (sortMode === 'alpha') {
    listPeople.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
  } else {
    // Sort: due first (by overdueness), then most-recent-touch first
    listPeople.sort((a, b) => {
      const aDue = personIsDue(a), bDue = personIsDue(b);
      if (aDue !== bDue) return aDue ? -1 : 1;
      if (aDue && bDue) return daysOverdue(b) - daysOverdue(a);
      const ta = a.last_touch_ts ? new Date(a.last_touch_ts).getTime() : 0;
      const tb = b.last_touch_ts ? new Date(b.last_touch_ts).getTime() : 0;
      return tb - ta;
    });
  }

  const chevSVG = `<svg class="person-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 6l6 6-6 6"/></svg>`;

  const listHTML = listPeople.length ? listPeople.map((p, i) => {
    const due = personIsDue(p);
    const lastStr = p.last_touch_ts ? daysAgoShort(p.last_touch_ts) : 'never';
    // Build meta parts — tier, cadence (if set), recency
    const parts = [p.tier];
    if (p.cadence) parts.push(p.cadence);
    parts.push(`last ${lastStr}`);
    let metaLine = parts.join(' · ');
    // Gentle elapsed line — only when cadence is set AND elapsed
    const elapsedNote = (due && p.cadence)
      ? `<div class="person-meta overdue">It&rsquo;s been a while.</div>`
      : '';
    const avatarClass = p.tier === 'inner' ? 'a1' : p.tier === 'close' ? 'a2' : 'a3';
    return `
      <button class="person-row ${(due && p.cadence) ? 'due' : ''}" onclick="openPersonDetail('${p.id}')">
        <div class="avatar ${avatarClass}">${escapeHtml((p.name || '?')[0].toUpperCase())}</div>
        <div class="person-body">
          <div class="person-name">${escapeHtml(p.name || '?')}</div>
          <div class="person-meta">${metaLine}</div>
          ${elapsedNote}
        </div>
        ${chevSVG}
      </button>
    `;
  }).join('') : `
    <div class="touch-empty">
      ${allCount === 0 ? 'No one yet. Tap + to add the first person.' : 'No one in this tier yet.'}
    </div>
  `;

  const tierTabs = `
    <div class="tier-tabs">
      <button class="tier-tab ${peopleTierFilter === 'all' ? 'active' : ''}" onclick="setPeopleTier('all')">All<span class="count">${allCount}</span></button>
      <button class="tier-tab ${peopleTierFilter === 'inner' ? 'active' : ''}" onclick="setPeopleTier('inner')">Inner<span class="count">${counts.inner}</span></button>
      <button class="tier-tab ${peopleTierFilter === 'close' ? 'active' : ''}" onclick="setPeopleTier('close')">Close<span class="count">${counts.close}</span></button>
      <button class="tier-tab ${peopleTierFilter === 'tribe' ? 'active' : ''}" onclick="setPeopleTier('tribe')">Tribe<span class="count">${counts.tribe}</span></button>
      <button class="tier-tab ${peopleTierFilter === 'community' ? 'active' : ''}" onclick="setPeopleTier('community')">Comm.<span class="count">${counts.community}</span></button>
    </div>
  `;

  // v2.8.1: Sort toggle — By tier / A→Z
  const sortToggle = allCount > 1 ? `
    <div class="people-sort-row">
      <button class="people-sort-btn ${sortMode === 'tier' ? 'active' : ''}" onclick="setPeopleSort('tier')">By tier</button>
      <button class="people-sort-btn ${sortMode === 'alpha' ? 'active' : ''}" onclick="setPeopleSort('alpha')">A → Z</button>
    </div>
  ` : '';

  const ambient = dueCount
    ? `<span style="font-family:'Fraunces',serif;font-style:italic;color:var(--ink-muted);">It&rsquo;s been a while with ${dueCount} ${dueCount === 1 ? 'person' : 'people'}.</span>`
    : '';

  // Pending @mentions banner — names written in examens that don't match anyone in circle yet.
  const pending = state._pendingMentions || [];
  const pendingBanner = pending.length ? `
    <div style="padding:12px 14px;background:var(--accent-faint);border:0.5px solid var(--accent-dim);border-radius:12px;margin-bottom:14px;">
      <div style="font-size:10px;letter-spacing:0.14em;color:var(--ink-muted);text-transform:uppercase;margin-bottom:6px;">Mentioned, not yet in circle</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;">
        ${pending.slice(0, 8).map(m => `
          <button onclick="adoptPendingMention('${m.id}')" style="padding:6px 12px;background:var(--surface-2);border:0.5px solid var(--line);border-radius:100px;font-size:12px;color:var(--ink);font-family:inherit;cursor:pointer;">
            @${escapeHtml(m.name)} <span style="color:var(--accent-bright);">+</span>
          </button>
        `).join('')}
      </div>
    </div>
  ` : '';

  document.getElementById('screen-people').innerHTML = `
    <div class="today-header">
      <div class="today-header-l">
        <div class="today-date">People</div>
        <div class="today-title">Your circle</div>
      </div>
      <div class="today-header-r">
        <button class="icon-btn" onclick="openAddPersonModal()" aria-label="Add a person">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </div>
    ${allCount ? `<div class="dunbar-wrap">${dunbarSVG()}</div>` : ''}
    ${pendingBanner}
    ${ambient ? `<div class="ambient-line" style="margin-bottom:18px;padding-top:0;">${ambient}</div>` : ''}
    ${tierTabs}
    ${sortToggle}
    ${listHTML}
    ${allCount === 0 ? `
      <button class="btn-full" onclick="openAddPersonModal()" style="margin-top:16px;">Add your first person</button>
    ` : ''}
  `;
}
function setPeopleTier(t) {
  peopleTierFilter = t;
  renderPeople();
}

function setPeopleSort(mode) {
  state.config = state.config || {};
  state.config.people_sort = mode;
  saveState();
  renderPeople();
}

// Adopt a pending @mention into the circle: creates the person with the original
// mention logged as their first touch (preserving the inside-out accretion history).
function adoptPendingMention(pendingId) {
  const pending = (state._pendingMentions || []).find(m => m.id === pendingId);
  if (!pending) return;
  // Check if another pending entry or a real person with this name already exists (race)
  const existing = state.people.find(p => p.name && p.name.toLowerCase() === pending.name.toLowerCase());
  let person;
  if (existing) {
    person = existing;
    person.last_touch_ts = pending.ts;
    person.touches = person.touches || [];
    person.touches.push({
      id: uid(), ts: pending.ts, note: '',
      source: pending.source, source_id: pending.source_id,
      type: 'reflection_mention',
    });
  } else {
    person = {
      id: uid(),
      name: pending.name,
      tier: 'tribe',
      cadence: 'monthly',
      last_touch_ts: pending.ts,
      touches: [{
        id: uid(), ts: pending.ts, note: '',
        source: pending.source, source_id: pending.source_id,
        type: 'reflection_mention',
      }],
    };
    state.people.push(person);
  }
  // Remove the pending entry
  state._pendingMentions = (state._pendingMentions || []).filter(m => m.id !== pendingId);
  saveState();
  render();
  toast(`${person.name} added to Tribe`);
}

// ─── Person detail overlay
function openPersonDetail(personId) {
  const p = state.people.find(x => x.id === personId);
  if (!p) return;
  const tier = TIERS.find(t => t.id === (p.tier || 'tribe'));
  const tierLabel = tier ? tier.label : 'Tribe';
  const due = personIsDue(p);
  const overdue = daysOverdue(p);
  const touches = [...(p.touches || [])].sort((a, b) => new Date(b.ts) - new Date(a.ts));
  const lastStr = p.last_touch_ts ? daysAgoShort(p.last_touch_ts) : 'never';
  const avatarClass = p.tier === 'inner' ? 'a1' : p.tier === 'close' ? 'a2' : 'a3';

  const touchList = touches.length ? touches.slice(0, 30).map(t => {
    const d = new Date(t.ts);
    const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    const monthName = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
    const dateStr = `${dayName} · ${d.getDate()} ${monthName} ${d.getFullYear()}`;
    let typeLabel = '';
    if (t.type === 'call') {
      typeLabel = t.duration_min ? `Call · ${t.duration_min} min` : 'Call';
    } else if (t.type === 'message') typeLabel = 'Message';
    else if (t.type === 'meal') typeLabel = 'Meal';
    else if (t.type === 'visit') typeLabel = 'Visit';
    else if (t.type === 'reflection_mention') typeLabel = 'Mention · examen';
    const isClickable = t.source_id && t.source === 'examen';

    // v2.9.2: Distinct visual treatment for memories
    const isMemory = t.mode === 'memory' || (t.photo && (t.photo.data || t.photo.faded));
    const memoryClass = isMemory ? ' touch-memory' : '';

    const noteBlock = t.note
      ? `<div class="touch-note">${isMemory ? escapeHtml(t.note) : '&ldquo;' + escapeHtml(t.note) + '&rdquo;'}</div>`
      : (typeLabel ? '' : '<div class="touch-note" style="color:var(--ink-faint);">— no note —</div>');

    // Photo block — image, faded marker, or nothing
    let photoBlock = '';
    if (t.photo) {
      if (t.photo.data) {
        const fadedDate = (() => {
          if (!t.photo.captured_at) return '';
          const cd = new Date(t.photo.captured_at);
          return `${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][cd.getDay()]} ${cd.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][cd.getMonth()]}`;
        })();
        const keepClass = t.photo.keep ? ' kept' : '';
        const keepLabel = t.photo.keep ? '✓ Kept' : 'Keep this photo';
        photoBlock = `
          <div class="touch-history-photo"><img src="${t.photo.data}" alt=""></div>
          <button class="touch-keep-toggle${keepClass}" onclick="toggleTouchPhotoKeep('${p.id}', '${t.id}')" type="button">${keepLabel}</button>
        `;
      } else if (t.photo.faded) {
        const cd = new Date(t.photo.captured_at);
        const fadedDate = `${['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][cd.getDay()]} ${cd.getDate()} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][cd.getMonth()]}`;
        photoBlock = `<div class="touch-photo-faded">photo faded · ${fadedDate}</div>`;
      }
    }

    if (isClickable) {
      return `
        <button class="touch-item touch-item-clickable${memoryClass}" onclick="openExamenById('${t.source_id}')" type="button">
          <div class="touch-date">${dateStr}${typeLabel ? ' · <span style="color:var(--brass);">' + typeLabel + '</span>' : ''} <span style="color:var(--ink-faint);font-size:9px;letter-spacing:0.04em;text-transform:uppercase;font-weight:500;float:right;">tap to open ›</span></div>
          ${noteBlock}
          ${photoBlock}
        </button>
      `;
    }
    return `
      <div class="touch-item${memoryClass}">
        <div class="touch-date">${dateStr}${typeLabel ? ' · <span style="color:var(--brass);">' + typeLabel + '</span>' : ''}</div>
        ${noteBlock}
        ${photoBlock}
      </div>
    `;
  }).join('') : `<div class="touch-empty">No touches logged yet.</div>`;

  // "Usually on Sundays" — derive modal day-of-week from ≥3 past touches
  const usualDayLine = usualDayOfWeek(touches);

  // Cadence elapsed line — soft, italic, only if cadence set AND elapsed
  let elapsedLine = '';
  if (p.cadence && due) {
    elapsedLine = `<div style="font-family:'Fraunces',serif;font-style:italic;font-size:13px;color:var(--ink-muted);margin-top:10px;line-height:1.4;">It's been a while.</div>`;
  }

  // Cadence value display — "not set" when null
  const cadenceDisplay = p.cadence
    ? p.cadence
    : '<span style="color:var(--ink-faint);">not set</span>';

  // Subhero shows tier only (cadence has its own section now)
  const subText = tierLabel;

  openOverlay(`
    <div class="detail-hero">
      <div class="avatar ${avatarClass}">${escapeHtml((p.name || '?')[0].toUpperCase())}</div>
      <div class="nm">${escapeHtml(p.name)}</div>
      <div class="sub">${subText}</div>
      ${elapsedLine}
      ${usualDayLine ? `<div style="font-family:'Fraunces',serif;font-style:italic;font-size:12.5px;color:var(--ink-muted);margin-top:8px;line-height:1.4;">${usualDayLine}</div>` : ''}
    </div>

    <button class="btn-full" onclick="closeOverlay();openTouchModal('${p.id}')">Log a touch</button>

    <div class="section-h">Remember</div>
    <button class="detail-row" onclick="editRememberField('${p.id}', 'birthday', 'Birthday')">
      <div class="lab">Birthday</div>
      <div class="val">${p.remember?.birthday ? escapeHtml(p.remember.birthday) : '<span style="color:var(--ink-faint);">add</span>'}</div>
    </button>
    <button class="detail-row" onclick="editRememberField('${p.id}', 'how_met', 'How you met')">
      <div class="lab">How met</div>
      <div class="val">${p.remember?.how_met ? escapeHtml(p.remember.how_met) : '<span style="color:var(--ink-faint);">add</span>'}</div>
    </button>
    <button class="detail-row" onclick="editRememberField('${p.id}', 'loves', 'Loves')">
      <div class="lab">Loves</div>
      <div class="val">${p.remember?.loves ? escapeHtml(p.remember.loves) : '<span style="color:var(--ink-faint);">add</span>'}</div>
    </button>
    <button class="detail-row" onclick="editRememberField('${p.id}', 'avoid', 'Avoid')">
      <div class="lab">Avoid</div>
      <div class="val">${p.remember?.avoid ? escapeHtml(p.remember.avoid) : '<span style="color:var(--ink-faint);">add</span>'}</div>
    </button>
    <button class="detail-row" onclick="editRememberField('${p.id}', 'gift_ideas', 'Gift ideas')">
      <div class="lab">Gift ideas</div>
      <div class="val">${p.remember?.gift_ideas ? escapeHtml(p.remember.gift_ideas) : '<span style="color:var(--ink-faint);">add</span>'}</div>
    </button>

    <div class="section-h">Settings <span style="color:var(--ink-faint);font-size:9px;text-transform:none;letter-spacing:0.02em;font-style:italic;font-family:'Fraunces',serif;">optional</span></div>
    <button class="detail-row" onclick="editPersonName('${p.id}')">
      <div class="lab">Name</div>
      <div class="val">${escapeHtml(p.name)}</div>
    </button>
    <button class="detail-row" onclick="cyclePersonTier('${p.id}')">
      <div class="lab">Tier</div>
      <div class="val">${tierLabel}</div>
    </button>
    <button class="detail-row" onclick="cyclePersonCadence('${p.id}')">
      <div class="lab">Cadence</div>
      <div class="val">${cadenceDisplay}</div>
    </button>

    <div class="section-h">History <span style="color:var(--ink-faint);font-size:9px;text-transform:none;letter-spacing:0.02em;font-style:italic;font-family:'Fraunces',serif;">${touches.length} ${touches.length === 1 ? 'touch' : 'touches'}</span></div>
    ${touchList}

    <button class="detail-row danger-row" onclick="deletePerson('${p.id}')" style="margin-top:18px;">
      <div class="lab">Remove from circle</div>
      <div class="val">×</div>
    </button>
  `);
}
function editPersonName(personId) {
  const p = state.people.find(x => x.id === personId);
  if (!p) return;
  openModal(`
    <div class="modal-title">Name</div>
    <input type="text" class="modal-input" id="person-name-input" value="${escapeHtml(p.name || '')}" placeholder="Their name" style="margin-bottom:14px;">
    <div class="modal-row">
      <button class="btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" style="flex:1" onclick="savePersonName('${p.id}')">Save</button>
    </div>

// v2.8.1: Birthday with month + day dropdowns + optional free-text year
function editBirthdayField(personId) {
  const p = state.people.find(x => x.id === personId);
  if (!p) return;
  p.remember = p.remember || {};
  const current = p.remember.birthday || '';

  // Try to parse existing value: "Mar 15", "Mar 15 · turns 41", "Mar 15 1985", etc.
  let curMonth = '', curDay = '', curYearOrNote = '';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (current) {
    const monthMatch = months.find(m => new RegExp(`\\b${m}\\b`, 'i').test(current));
    if (monthMatch) {
      curMonth = monthMatch;
      const dayMatch = current.match(/\b(\d{1,2})\b/);
      if (dayMatch) curDay = dayMatch[1];
      // Year/note = whatever's left after month and day
      curYearOrNote = current.replace(new RegExp(`\\b${monthMatch}\\b`, 'i'), '').replace(/\b\d{1,2}\b/, '').replace(/^[\s·,-]+|[\s·,-]+$/g, '').trim();
    } else {
      curYearOrNote = current;
    }
  }

  const monthOptions = ['<option value="">—</option>', ...months.map(m => `<option value="${m}"${m === curMonth ? ' selected' : ''}>${m}</option>`)].join('');
  const dayOptions = ['<option value="">—</option>', ...Array.from({length:31}, (_, i) => i+1).map(d => `<option value="${d}"${String(d) === curDay ? ' selected' : ''}>${d}</option>`)].join('');

  openModal(`
    <div class="modal-title">Birthday</div>
    <div style="font-family:'Fraunces',serif;font-style:italic;font-size:12.5px;color:var(--ink-muted);margin-bottom:14px;line-height:1.5;">
      Just the date is enough. Year is optional.
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <select class="modal-input" id="birthday-month" style="flex:1.4;">${monthOptions}</select>
      <select class="modal-input" id="birthday-day" style="flex:1;">${dayOptions}</select>
    </div>
    <input type="text" class="modal-input" id="birthday-year" value="${escapeHtml(curYearOrNote)}" placeholder="Year or note (optional) — e.g. 1985, or turns 41" style="margin-bottom:14px;">
    <div class="modal-row">
      ${current ? `<button class="btn-skip" onclick="clearRememberField('${personId}','birthday')" style="flex:0.5;color:var(--clay);">Clear</button>` : ''}
      <button class="btn-secondary" style="flex:1" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" style="flex:1" onclick="saveBirthdayField('${personId}')">Save</button>
    </div>
  `);
}

const TIER_CAPS = { inner: 5, close: 15, tribe: 50, community: 150 };
const TIER_WORDS = {
  inner:     { word: 'five',    label: 'Inner' },
  close:     { word: 'fifteen', label: 'Close' },
  tribe:     { word: 'fifty',   label: 'Tribe' },
  community: { word: 'a hundred and fifty', label: 'Community' },
};

function cyclePersonTier(personId) {
  const p = state.people.find(x => x.id === personId);
  if (!p) return;
  const order = ['inner', 'close', 'tribe', 'community'];
  const i = order.indexOf(p.tier || 'tribe');
  const nextTier = order[(i + 1) % order.length];
  // Soft cap check: count only *other* people already in the target tier
  const cap = TIER_CAPS[nextTier];
  const existingCount = state.people.filter(x => x.id !== p.id && (x.tier || 'tribe') === nextTier).length;
  if (existingCount >= cap) {
    const w = TIER_WORDS[nextTier];
    if (!confirm(`${w.label} usually holds ${w.word}. You already have ${existingCount}. Move ${p.name} anyway?`)) {
      return;
    }
  }
  p.tier = nextTier;
  saveState();
  openPersonDetail(personId);
}
function cyclePersonCadence(personId) {
  const p = state.people.find(x => x.id === personId);
  if (!p) return;
  // Cadence is now optional — null is part of the cycle
  const order = [null, 'daily', 'weekly', 'biweekly', 'monthly'];
  const current = p.cadence || null;
  const i = order.indexOf(current);
  p.cadence = order[(i + 1) % order.length];
  saveState();
  openPersonDetail(personId);
}
function deletePerson(personId) {
  const p = state.people.find(x => x.id === personId);
  if (!p) return;
  if (!confirm(`Remove ${p.name} from your circle? Touch history will be lost.`)) return;
  state.people = state.people.filter(x => x.id !== personId);
  saveState();
  closeOverlay();
  render();
  toast(`Removed ${p.name}`);
}

let reviewSegment = 'month';
let memoriesFilter = '30';  // '30' | '90' | 'year' | 'all'

let reviewThemeFilter = null;   // v2.8.2 — when a theme is tapped, archive filters

function reviewRangeDays() {
  if (reviewSegment === 'week') return 7;
  if (reviewSegment === 'month') return 30;
  if (reviewSegment === 'year') return 365;
  return null; // all
}
function reviewRangeStart() {
  const days = reviewRangeDays();
  if (days == null) return new Date(state.startDate || '2020-01-01').getTime();
  const d = new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - days + 1);
  return d.getTime();
}

// Build a 30-day strip (always 30 even on Week segment — gives shape)
function presenceStripHTML() {
  const days = 30;
  const todayStr = todayISO();
  const cells = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const iso = d.toISOString().slice(0,10);
    const isToday = iso === todayStr;
    const dayWorkouts = state.workouts.some(w => isSameDay(w.ts || w.started_at, iso));
    const dayExamen = state.examens.some(e => e.date_iso === iso && !e.skipped_entirely);
    const dayTouch = state.people.some(p => (p.touches || []).some(t => isSameDay(t.ts, iso)));
    const corners = [];
    if (dayExamen)   corners.push('<div class="presence-corner tl"></div>');
    if (dayWorkouts) corners.push('<div class="presence-corner tr"></div>');
    if (dayTouch)    corners.push('<div class="presence-corner bl"></div>');
    cells.push(`<div class="presence-day ${isToday ? 'today' : ''}">${corners.join('')}</div>`);
  }
  return `
    <div class="presence-strip">${cells.join('')}</div>
    <div class="presence-legend">
      <span class="ll"><span class="swatch brass"></span>examen</span>
      <span class="ll"><span class="swatch accent"></span>workout</span>
      <span class="ll"><span class="swatch ink"></span>touch</span>
    </div>
  `;
}

function observationFor() {
  // Pick the most striking pattern in the current range
  const start = reviewRangeStart();
  const inRange = ts => {
    if (!ts) return false;
    return new Date(ts).getTime() >= start;
  };
  const workouts = state.workouts.filter(w => inRange(w.ts || w.started_at));
  const examens = state.examens.filter(e => {
    const t = new Date(e.date_iso).getTime();
    return t >= start;
  });
  const realExamens = examens.filter(e => !e.skipped_entirely);
  const skippedExamens = examens.filter(e => e.skipped_entirely);
  const sleeps = state.sleep.filter(s => new Date(s.date).getTime() >= start);
  const moods = state.moods.filter(m => inRange(m.ts));

  // Choose strongest signal
  const observations = [];

  // Pattern: many workouts, low examens
  if (workouts.length >= 8 && realExamens.length < workouts.length / 2) {
    observations.push({
      fact: `${workouts.length} workouts, ${realExamens.length} examens.`,
      q: 'You showed up for the body more than the day. Was that the right balance?',
    });
  }
  // Pattern: low sleep
  if (sleeps.length >= 5) {
    const avg = sleeps.reduce((a,s)=>a+s.duration_h,0) / sleeps.length;
    if (avg < 6.5) {
      observations.push({
        fact: `Sleep averaged ${avg.toFixed(1)}h.`,
        q: "What's keeping you up — and is it worth it?",
      });
    } else if (avg >= 7.5) {
      observations.push({
        fact: `Sleep averaged ${avg.toFixed(1)}h. Good.`,
        q: 'What changed to make this possible?',
      });
    }
  }
  // Pattern: skipped examens
  if (skippedExamens.length >= 3) {
    observations.push({
      fact: `You said "not tonight" ${skippedExamens.length} times.`,
      q: 'Was something heavy, or just full?',
    });
  }
  // Pattern: low mood spell
  const lowMoods = moods.filter(m => m.score <= 2).length;
  if (lowMoods >= 3) {
    observations.push({
      fact: `${lowMoods} difficult days logged.`,
      q: 'Anything you can name about the pattern?',
    });
  }
  // Pattern: high consistency
  const distinctTrainDays = new Set(workouts.map(w => (w.ts || new Date(w.started_at).toISOString()).slice(0,10))).size;
  const totalDays = Math.min(reviewRangeDays() || 30, 30);
  if (distinctTrainDays >= totalDays * 0.5) {
    observations.push({
      fact: `Trained ${distinctTrainDays} of the last ${totalDays} days.`,
      q: 'Consistency is the rarer skill. What made it stick?',
    });
  }
  // Default
  if (!observations.length) {
    if (workouts.length === 0 && realExamens.length === 0) {
      observations.push({
        fact: 'A quiet stretch.',
        q: 'Resting, drifting, or waiting for the right thing?',
      });
    } else {
      observations.push({
        fact: `${workouts.length} workouts. ${realExamens.length} examens. ${sleeps.length} sleep records.`,
        q: 'What does the shape of this stretch tell you?',
      });
    }
  }
  // Return the first (highest priority) match
  return observations[0];
}

// v2.8.2: Theme tally — counts theme occurrences across examens in date range
function themeTallies() {
  const start = reviewRangeStart();
  const tally = {};
  state.examens.forEach(e => {
    if (new Date(e.date_iso).getTime() < start) return;
    // Read from new themes field; fall back to extracting from text if no themes field present
    let themes = e.themes;
    if (!themes) {
      const txt = [(e.went_well || ''), (e.went_poorly || ''), (e.remains || '')].join(' ');
      themes = extractThemes(txt);
    }
    (themes || []).forEach(t => {
      tally[t] = (tally[t] || 0) + 1;
    });
  });
  return tally;
}

function themeBarsHTML() {
  const tally = themeTallies();
  const entries = Object.entries(tally).sort((a, b) => b[1] - a[1]).slice(0, 12);
  if (!entries.length) {
    return `<div class="theme-empty">No themes yet. Use <span class="theme-pill" style="display:inline-block;margin:0 2px;">#word</span> in your examens — they'll gather here as themes.</div>`;
  }
  const max = Math.max(1, ...entries.map(e => e[1]));
  return `
    <div class="theme-bars">
      ${entries.map(([theme, count]) => {
        const pct = (count / max) * 100;
        const isActive = reviewThemeFilter === theme;
        return `
          <button class="theme-bar-row ${isActive ? 'active' : ''}" onclick="toggleThemeFilter('${theme}')">
            <div class="theme-bar-name">${escapeHtml(theme)}</div>
            <div class="theme-bar"><div class="theme-fill" style="width:${pct}%"></div></div>
            <div class="theme-bar-count">${count}</div>
          </button>
        `;
      }).join('')}
    </div>
  `;
}

function toggleThemeFilter(t) {
  reviewThemeFilter = reviewThemeFilter === t ? null : t;
  renderReview();
}

// v2.8.2: Quarterly themes rollup — top themes per quarter for the last 12 months
function quarterlyThemesHTML() {
  // Build buckets: {quarterLabel: {theme: count}}
  const buckets = {};
  const now = new Date();
  const cutoff = new Date(now.getFullYear() - 1, now.getMonth(), now.getDate()).getTime();

  state.examens.forEach(e => {
    const ts = new Date(e.date_iso).getTime();
    if (ts < cutoff) return;
    const themes = e.themes || extractThemes([(e.went_well || ''), (e.went_poorly || ''), (e.remains || '')].join(' '));
    if (!themes.length) return;
    const d = new Date(e.date_iso);
    const q = Math.floor(d.getMonth() / 3) + 1;
    const label = `Q${q} ${d.getFullYear()}`;
    if (!buckets[label]) buckets[label] = { _ts: new Date(d.getFullYear(), (q-1)*3, 1).getTime(), themes: {} };
    themes.forEach(t => {
      buckets[label].themes[t] = (buckets[label].themes[t] || 0) + 1;
    });
  });

  const sortedQuarters = Object.entries(buckets).sort((a, b) => b[1]._ts - a[1]._ts);
  if (!sortedQuarters.length) {
    return `<div class="empty-line">Themes will gather here as you write.</div>`;
  }

  return `
    <div class="quarterly-themes">
      ${sortedQuarters.map(([label, data]) => {
        const top = Object.entries(data.themes).sort((a, b) => b[1] - a[1]).slice(0, 5);
        return `
          <div class="quarter-row">
            <div class="quarter-label">${label}</div>
            <div class="quarter-themes">
              ${top.map(([t, c]) => `<button class="theme-pill quarter-pill" onclick="toggleThemeFilter('${t}')">${escapeHtml(t)} <span class="quarter-count">${c}</span></button>`).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

// v2.8.2: Inline-highlight #themes within examen text
function highlightThemesInText(text) {
  if (!text) return '';
  // Escape first, then add highlight spans
  let safe = escapeHtml(text);
  safe = safe.replace(/#([a-zA-Z][a-zA-Z0-9_-]*)/g, '<span class="theme-inline">$1</span>');
  return safe;
}

function memoriesViewHTML() {
  // Pull all touches across all people that have a real photo (not faded) OR a memory-mode note
  // Filter by date range based on memoriesFilter
  const now = Date.now();
  let cutoff;
  if (memoriesFilter === '30') cutoff = now - 30 * 86400000;
  else if (memoriesFilter === '90') cutoff = now - 90 * 86400000;
  else if (memoriesFilter === 'year') cutoff = new Date(new Date().getFullYear(), 0, 1).getTime();
  else cutoff = 0;

  // Collect all memories — touches with photo data (not faded) OR mode === 'memory'
  const memories = [];
  for (const p of (state.people || [])) {
    for (const t of (p.touches || [])) {
      const isPhoto = t.photo && t.photo.data && !t.photo.faded;
      const isMemory = t.mode === 'memory';
      if (!isPhoto && !isMemory) continue;
      const ts = new Date(t.ts).getTime();
      if (ts < cutoff) continue;
      memories.push({ touch: t, person: p, ts });
    }
  }
  memories.sort((a, b) => b.ts - a.ts);

  // Filter pills
  const pillsHTML = `
    <div class="mem-filter-row">
      ${[
        { id: '30', label: '30 days' },

        { id: 'year', label: 'This year' },
        { id: 'all', label: 'All time' },
      ].map(f => `
        <button class="mem-filter-pill ${f.id === memoriesFilter ? 'active' : ''}" onclick="setMemoriesFilter('${f.id}')">${f.label}</button>
      `).join('')}
    </div>
  `;

  if (!memories.length) {
    return `
      ${pillsHTML}
      <div class="mem-empty">
        <div class="mem-empty-quote">Memories will appear here once you log touches with photos.</div>
        <div class="mem-empty-sub">Open someone in your circle and log a touch in Memory mode.</div>
      </div>
    `;
  }

  // Render memory cards
  const cardsHTML = memories.map(({ touch: t, person: p, ts }) => {
    const d = new Date(ts);
    const dayName = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    const monthName = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
    const dateStr = `${dayName} · ${d.getDate()} ${monthName} ${d.getFullYear()}`;

    const avatarClass = p.tier === 'inner' ? 'a1' : p.tier === 'close' ? 'a2' : 'a3';
    let typeLabel = '';
    if (t.type === 'call') typeLabel = t.duration_min ? `Call · ${t.duration_min} min` : 'Call';
    else if (t.type === 'message') typeLabel = 'Message';
    else if (t.type === 'meal') typeLabel = 'Meal';
    else if (t.type === 'visit') typeLabel = 'Visit';

    const photoHTML = (t.photo && t.photo.data)
      ? `<div class="mem-card-photo"><img src="${t.photo.data}" alt=""></div>`
      : '';

    const noteHTML = t.note
      ? `<div class="mem-card-note">${escapeHtml(t.note)}</div>`
      : '';

    return `
      <button class="mem-card" onclick="openPersonDetail('${p.id}')" type="button">
        ${photoHTML}
        <div class="mem-card-body">
          <div class="mem-card-head">
            <div class="avatar ${avatarClass}" style="width:24px;height:24px;font-size:10px;margin-left:0;">${escapeHtml((p.name || '?')[0].toUpperCase())}</div>

            <div class="mem-card-date">${dateStr}${typeLabel ? ' · ' + typeLabel : ''}</div>

        </div>
      </button>

  }).join('');

  return `
    ${pillsHTML}
    <div class="mem-grid">${cardsHTML}</div>
  `;
}

// Build last-N day buckets for any signal type. Returns array of N day-aggregates,
// oldest-first. Each bucket has the count or value for that day.
function dayBucketsForRange(days, getter) {
  const today = new Date(todayISO() + 'T12:00:00');
  const buckets = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const iso = d.toISOString().slice(0, 10);
    buckets.push({ iso, value: getter(iso) });
  }
  return buckets;
}

// Sparkline tiles — for the Week segment.
// Each tile keeps the existing rectangle shape but adds a small visual underneath
// the number, sized to its metric's grammar (bars for daily counts, line for
// average, dots for events).
function weekSparklineTilesHTML() {
  const days = 7;
  const start = reviewRangeStart();
  const inRange = ts => {
    if (!ts) return false;
    return new Date(ts).getTime() >= start;
  };

  // Aggregate counts
  const workouts = state.workouts.filter(w => inRange(w.ts || w.started_at)).length;
  const examens = state.examens.filter(e => new Date(e.date_iso).getTime() >= start && !e.skipped_entirely).length;
  const sleepEntries = state.sleep.filter(s => new Date(s.date).getTime() >= start);
  const sleepCount = sleepEntries.length;
  const sleepAvg = sleepCount >= 3
    ? (sleepEntries.reduce((a, s) => a + (s.duration_h || 0), 0) / sleepCount)
    : null;
  const touchEvents = state.people.reduce((a, p) => a.concat((p.touches || []).filter(t => inRange(t.ts)).map(t => ({ ts: t.ts }))), []);
  const touches = touchEvents.length;

  // Per-day buckets
  const examenBuckets = dayBucketsForRange(days, (iso) => {
    return state.examens.filter(e => e.date_iso === iso && !e.skipped_entirely).length;
  });
  const workoutBuckets = dayBucketsForRange(days, (iso) => {
    return state.workouts.filter(w => {
      const wIso = (w.ts || w.started_at || '').slice(0, 10);
      return wIso === iso;
    }).length;
  });
  const sleepBuckets = dayBucketsForRange(days, (iso) => {
    const s = state.sleep.find(x => x.date === iso);
    return s ? s.duration_h : null;
  });
  const touchBuckets = dayBucketsForRange(days, (iso) => {
    return state.people.reduce((a, p) => a + (p.touches || []).filter(t => (t.ts || '').slice(0, 10) === iso).length, 0);
  });

  // Sparkline SVGs
  const tileW = 80;
  const sparkW = tileW - 22;  // inner padding
  const sparkH = 14;

  // Workouts bars — shows daily presence
  const workoutSpark = (() => {
    const max = Math.max(1, ...workoutBuckets.map(b => b.value));
    const barW = (sparkW - 6 * 2) / 7;
    const barGap = 2;
    let bars = '';
    workoutBuckets.forEach((b, i) => {
      const h = b.value > 0 ? sparkH * Math.min(1, b.value / max) : 1.5;
      const opacity = b.value > 0 ? 1 : 0.25;
      const y = sparkH - h;
      bars += `<rect x="${i * (barW + barGap)}" y="${y}" width="${barW}" height="${h}" rx="0.6" fill="var(--accent-bright)" opacity="${opacity}"/>`;
    });
    return `<svg width="${sparkW}" height="${sparkH}" viewBox="0 0 ${sparkW} ${sparkH}" style="display:block;">${bars}</svg>`;
  })();

  // Examens bars
  const examenSpark = (() => {
    const barW = (sparkW - 6 * 2) / 7;
    const barGap = 2;
    let bars = '';
    examenBuckets.forEach((b, i) => {
      const h = b.value > 0 ? sparkH : 1.5;
      const opacity = b.value > 0 ? 1 : 0.25;
      const y = sparkH - h;
      bars += `<rect x="${i * (barW + barGap)}" y="${y}" width="${barW}" height="${h}" rx="0.6" fill="var(--brass)" opacity="${opacity}"/>`;
    });
    return `<svg width="${sparkW}" height="${sparkH}" viewBox="0 0 ${sparkW} ${sparkH}" style="display:block;">${bars}</svg>`;
  })();

  // Sleep line — interpolates across nights with data; gaps show as breaks
  const sleepSpark = (() => {
    const validBuckets = sleepBuckets.map((b, i) => b.value !== null ? { x: i, y: b.value } : null);
    const allValid = validBuckets.every(v => v !== null);
    if (sleepBuckets.every(b => b.value === null)) {
      // No data — show a subtle baseline
      return `<svg width="${sparkW}" height="${sparkH}" viewBox="0 0 ${sparkW} ${sparkH}" style="display:block;"><line x1="0" y1="${sparkH/2}" x2="${sparkW}" y2="${sparkH/2}" stroke="var(--ink-faint)" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.3"/></svg>`;
    }
    const min = 4, max = 10;  // sleep range in hours
    const norm = (h) => sparkH - ((Math.max(min, Math.min(max, h)) - min) / (max - min)) * sparkH;
    let path = '';
    validBuckets.forEach((v, i) => {
      if (v === null) return;
      const x = (v.x / 6) * sparkW;
      const y = norm(v.y);
      path += (path === '' ? `M ${x} ${y}` : ` L ${x} ${y}`);
    });
    // Plot any missing nights as faint dots
    let dots = '';
    sleepBuckets.forEach((b, i) => {
      if (b.value === null) {
        const x = (i / 6) * sparkW;
        dots += `<circle cx="${x}" cy="${sparkH/2}" r="0.8" fill="var(--ink-faint)" opacity="0.4"/>`;
      }
    });
    return `<svg width="${sparkW}" height="${sparkH}" viewBox="0 0 ${sparkW} ${sparkH}" style="display:block;"><path d="${path}" fill="none" stroke="var(--ink)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>${dots}</svg>`;
  })();

  // Touches dots — events on a timeline
  const touchSpark = (() => {
    let dots = '';
    touchBuckets.forEach((b, i) => {
      if (b.value > 0) {
        const x = (i / 6) * sparkW;
        const r = Math.min(2.5, 1.5 + (b.value - 1) * 0.5);
        dots += `<circle cx="${x}" cy="${sparkH/2}" r="${r}" fill="var(--accent-bright)"/>`;
      } else {
        const x = (i / 6) * sparkW;
        dots += `<circle cx="${x}" cy="${sparkH/2}" r="0.6" fill="var(--ink-faint)" opacity="0.3"/>`;
      }
    });
    return `<svg width="${sparkW}" height="${sparkH}" viewBox="0 0 ${sparkW} ${sparkH}" style="display:block;">${dots}</svg>`;
  })();

  // Top number for each tile
  const sleepDisplay = sleepAvg !== null
    ? `<span style="font-size:22px;">${sleepAvg.toFixed(1)}</span><span style="font-size:11px;color:var(--ink-muted);">h</span>`
    : `<span style="font-size:22px;">${sleepCount}</span>`;

  return `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;">
      <div style="border:0.5px solid var(--line);border-radius:10px;padding:10px 10px 12px;">
        <div style="font-family:'Fraunces',serif;font-size:22px;color:var(--accent-bright);line-height:1.05;">${workouts}</div>
        <div style="margin:8px 0 6px;">${workoutSpark}</div>
        <div style="font-size:8.5px;color:var(--ink-muted);letter-spacing:0.1em;font-family:'Inter',sans-serif;font-weight:500;">WORKOUTS</div>
      </div>
      <div style="border:0.5px solid var(--line);border-radius:10px;padding:10px 10px 12px;">
        <div style="font-family:'Fraunces',serif;font-size:22px;color:var(--brass);line-height:1.05;">${examens}</div>
        <div style="margin:8px 0 6px;">${examenSpark}</div>
        <div style="font-size:8.5px;color:var(--ink-muted);letter-spacing:0.1em;font-family:'Inter',sans-serif;font-weight:500;">EXAMENS</div>
      </div>
      <div style="border:0.5px solid var(--line);border-radius:10px;padding:10px 10px 12px;">
        <div style="font-family:'Fraunces',serif;color:var(--ink);line-height:1.05;">${sleepDisplay}</div>
        <div style="margin:8px 0 6px;">${sleepSpark}</div>
        <div style="font-size:8.5px;color:var(--ink-muted);letter-spacing:0.1em;font-family:'Inter',sans-serif;font-weight:500;">${sleepAvg !== null ? 'SLEEP AVG' : 'SLEEP'}</div>
      </div>
      <div style="border:0.5px solid var(--line);border-radius:10px;padding:10px 10px 12px;">
        <div style="font-family:'Fraunces',serif;font-size:22px;color:var(--accent-bright);line-height:1.05;">${touches}</div>
        <div style="margin:8px 0 6px;">${touchSpark}</div>
        <div style="font-size:8.5px;color:var(--ink-muted);letter-spacing:0.1em;font-family:'Inter',sans-serif;font-weight:500;">TOUCHES</div>
      </div>

  `;
}

// Composed calendar — for the Month segment.
// Single grid: each row is a signal, each column is a day.
// Density-shaded for activity intensity per day per signal.
function monthComposedCalendarHTML() {
  const days = 30;
  const today = new Date(todayISO() + 'T12:00:00');
  const dates = [];
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    dates.push(d.toISOString().slice(0, 10));
  }

  // Compute density for each signal per day (0-4 scale or null for "no data")
  const examenDensity = dates.map(iso => {
    const e = state.examens.find(x => x.date_iso === iso && !x.skipped_entirely);
    if (!e) return 0;
    // Slight intensity by content length
    const text = [(e.went_well || ''), (e.went_poorly || ''), (e.remains || '')].join(' ');
    if (text.length > 200) return 4;
    if (text.length > 80) return 3;
    if (text.length > 0) return 2;
    return 1;
  });

  const workoutDensity = dates.map(iso => {
    const count = state.workouts.filter(w => {
      const wIso = (w.ts || w.started_at || '').slice(0, 10);
      return wIso === iso;
    }).length;
    if (count === 0) return 0;
    if (count >= 2) return 4;
    return 3;
  });

  const sleepDensity = dates.map(iso => {
    const s = state.sleep.find(x => x.date === iso);
    if (!s) return null;  // no data — different from "0 sleep"
    const h = s.duration_h || 0;
    if (h >= 8) return 4;
    if (h >= 7) return 3;
    if (h >= 6) return 2;
    return 1;
  });

  const captureDensity = dates.map(iso => {
    const count = (state.captures || []).filter(c => {
      const cIso = (c.ts || '').slice(0, 10);
      return cIso === iso;
    }).length;
    if (count === 0) return 0;
    if (count >= 3) return 4;
    if (count >= 2) return 3;
    return 2;
  });

  const touchDensity = dates.map(iso => {
    const count = state.people.reduce((a, p) => {
      return a + (p.touches || []).filter(t => (t.ts || '').slice(0, 10) === iso).length;
    }, 0);
    if (count === 0) return 0;
    if (count >= 3) return 4;
    if (count >= 2) return 3;
    return 2;
  });

  // Color by metric color + density level (0-4)
  const cellColor = (color, level) => {
    if (level === null) return 'transparent';  // no data
    if (level === 0) return 'var(--surface-2)';
    const opacity = 0.25 + (level - 1) * 0.25;  // 0.25, 0.5, 0.75, 1.0
    if (color === 'brass')   return `rgba(200,155,106,${opacity})`;
    if (color === 'accent')  return `rgba(62,122,94,${opacity})`;
    if (color === 'sleep')   return `rgba(156,144,128,${opacity})`;
    if (color === 'capture') return `rgba(122,94,61,${opacity})`;
    return 'var(--ink-muted)';
  };

  // Layout: 30 columns, 5 rows. Container should fit horizontally on mobile.
  // Cell width = (totalW - gaps - labelW) / 30
  const cellGap = 1.4;
  const cellH = 12;
  const labelW = 26;
  const totalCols = 30;
  // Total width should be ~330px (mobile-safe), so cellW ≈ (330 - 26 - 29*1.4) / 30 ≈ 8.7
  const cellW = 8.7;
  const totalW = labelW + totalCols * cellW + (totalCols - 1) * cellGap;

  // Day-of-month markers below the grid (every 7 days)
  const startDate = new Date(dates[0] + 'T12:00:00');
  const endDate = new Date(dates[dates.length - 1] + 'T12:00:00');

  const buildRow = (label, color, density) => {
    let cells = '';
    density.forEach((level, i) => {
      const x = labelW + i * (cellW + cellGap);
      const isToday = dates[i] === todayISO();
      cells += `<rect x="${x}" y="0" width="${cellW}" height="${cellH}" rx="1.6" fill="${cellColor(color, level)}"${isToday ? ' stroke="var(--brass)" stroke-width="0.4"' : ''}/>`;
    });
    return `<text x="0" y="9" font-family="Inter, sans-serif" font-size="7.5" fill="var(--ink-faint)" letter-spacing="0.6">${label}</text>${cells}`;
  };

  const rowH = cellH + 6;
  const totalH = 5 * rowH + 16;  // 5 rows + small label row at bottom

  const dayMarkers = (() => {
    let marks = '';
    [0, 7, 14, 21, 29].forEach(i => {
      const d = new Date(dates[i] + 'T12:00:00');
      const x = labelW + i * (cellW + cellGap);
      // Anchor the rightmost label at end so it doesn't clip
      const anchor = i === 29 ? ' text-anchor="end"' : '';
      const xPos = i === 29 ? x + cellW : x;
      marks += `<text x="${xPos}" y="0"${anchor} font-family="Inter, sans-serif" font-size="7" fill="var(--ink-faint)" letter-spacing="0.4">${d.toLocaleDateString('en', { month: 'short', day: 'numeric' })}</text>`;
    });
    return marks;
  })();

  const legend = `
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;">
      <div style="display:flex;align-items:center;gap:5px;"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--brass);"></span><span style="font-family:'Inter',sans-serif;font-size:9.5px;color:var(--ink-muted);letter-spacing:0.04em;">examen</span></div>
      <div style="display:flex;align-items:center;gap:5px;"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--accent-bright);"></span><span style="font-family:'Inter',sans-serif;font-size:9.5px;color:var(--ink-muted);letter-spacing:0.04em;">workout</span></div>
      <div style="display:flex;align-items:center;gap:5px;"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:rgba(156,144,128,0.7);"></span><span style="font-family:'Inter',sans-serif;font-size:9.5px;color:var(--ink-muted);letter-spacing:0.04em;">sleep</span></div>
      <div style="display:flex;align-items:center;gap:5px;"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:rgba(122,94,61,0.7);"></span><span style="font-family:'Inter',sans-serif;font-size:9.5px;color:var(--ink-muted);letter-spacing:0.04em;">capture</span></div>
      <div style="display:flex;align-items:center;gap:5px;"><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--accent-bright);opacity:0.6;"></span><span style="font-family:'Inter',sans-serif;font-size:9.5px;color:var(--ink-muted);letter-spacing:0.04em;">touch</span></div>
    </div>
  `;

  return `
    <div style="border:0.5px solid var(--line);border-radius:12px;padding:16px 14px 14px;margin-bottom:14px;overflow-x:auto;">
      <svg width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}" style="display:block;">
        <g transform="translate(0, 0)">${buildRow('EX', 'brass', examenDensity)}</g>
        <g transform="translate(0, ${rowH})">${buildRow('WO', 'accent', workoutDensity)}</g>
        <g transform="translate(0, ${rowH * 2})">${buildRow('SL', 'sleep', sleepDensity)}</g>
        <g transform="translate(0, ${rowH * 3})">${buildRow('CP', 'capture', captureDensity)}</g>
        <g transform="translate(0, ${rowH * 4})">${buildRow('TC', 'accent', touchDensity)}</g>
        <g transform="translate(0, ${rowH * 5 + 8})">${dayMarkers}</g>
      </svg>
      ${legend}
    </div>
  `;
}

// ─── Life view (All segment) ───
function onThisDayItems() {
  const today = new Date();
  const m = today.getMonth();
  const d = today.getDate();
  const y = today.getFullYear();
  const items = [];
  // ±3 day fuzzy match across past examens and workouts (different year)
  const dateMatch = (date) => {
    const dd = new Date(date);
    if (dd.getFullYear() === y) return false;
    if (dd.getMonth() !== m) return false;
    return Math.abs(dd.getDate() - d) <= 3;
  };
  state.examens.forEach(e => {
    if (e.skipped_entirely) return;
    if (!dateMatch(e.date_iso)) return;
    const yr = new Date(e.date_iso).getFullYear();
    const text = (e.went_well || e.remains || '').trim();
    if (text) items.push({
      year: yr,
      kind: 'examen',
      text: text,
    });
  });
  state.workouts.forEach(w => {
    const ts = w.ts || (w.started_at && new Date(w.started_at).toISOString());
    if (!ts) return;
    if (!dateMatch(ts)) return;
    const yr = new Date(ts).getFullYear();
    if (w.type === 'lift' && w.close_note) {
      items.push({ year: yr, kind: 'lift', text: w.close_note });
    } else if (w.type === 'run' && w.close_note) {
      items.push({ year: yr, kind: 'run', text: w.close_note });
    } else if (w.type === 'activity' && w.close_note) {
      items.push({ year: yr, kind: 'activity', text: w.close_note });
    }
  });
  return items.sort((a, b) => b.year - a.year);
}

  const items = onThisDayItems();

  return `

}
function chaptersHTML() {
  const todayStr = todayISO();
  const items = [...state.chapters].sort((a, b) => (b.start_date || '').localeCompare(a.start_date || ''));
  if (!items.length) {
    return `
      <div class="empty-line">
        No chapters yet.<br>Mark the eras of your life as you live them.
      </div>
    `;
  }
  return items.map(c => {
    const isCurrent = !c.end_date || c.end_date >= todayStr;
    const start = c.start_date ? new Date(c.start_date) : null;
    const end = c.end_date ? new Date(c.end_date) : null;
    const fmt = d => d ? `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]} ${d.getFullYear()}` : '';
    const dates = `${fmt(start)} — ${end ? fmt(end) : 'now'}`;
    return `
      <button class="chapter-card ${isCurrent ? 'current' : ''}" onclick="viewChapter('${c.id}')" style="background:var(--surface-2);border:0.5px solid var(--line);border-left:3px solid ${isCurrent ? 'var(--accent)' : 'var(--brass)'};border-radius:0 12px 12px 0;text-align:left;width:100%;color:inherit;font-family:inherit;cursor:pointer;">
        <div class="chapter-dates">${dates}</div>
        <div class="chapter-title">${escapeHtml(c.title)}</div>
        ${c.note ? `<div class="chapter-note">${escapeHtml(c.note)}</div>` : ''}
      </button>
    `;
  }).join('');
}
function lifetimeGridHTML() {
  // 12-month grid for the selected year, shading by activity density
  const year = lifeYearFilter || new Date().getFullYear();
  const monthCounts = Array.from({ length: 12 }, () => 0);
  // Count any activity (workout, examen, touch) per month in that year
  state.workouts.forEach(w => {
    const ts = w.ts || (w.started_at && new Date(w.started_at).toISOString());
    if (!ts) return;
    const d = new Date(ts);
    if (d.getFullYear() === year) monthCounts[d.getMonth()]++;
  });
  state.examens.forEach(e => {
    if (e.skipped_entirely) return;
    const d = new Date(e.date_iso);
    if (d.getFullYear() === year) monthCounts[d.getMonth()]++;
  });
  state.people.forEach(p => {
    (p.touches || []).forEach(t => {
      const d = new Date(t.ts);
      if (d.getFullYear() === year) monthCounts[d.getMonth()]++;
    });
  });
  const max = Math.max(1, ...monthCounts);
  const today = new Date();
  const cells = monthCounts.map((n, i) => {
    const opacity = n === 0 ? 0 : 0.15 + (n / max) * 0.65;
    const isFuture = year === today.getFullYear() && i > today.getMonth();
    return `
      <div class="month-cell" style="${isFuture ? 'opacity:0.3;' : ''}">
        <div class="label">${['J','F','M','A','M','J','J','A','S','O','N','D'][i]}</div>
        <div class="density" style="opacity:${opacity}"></div>
      </div>
    `;
  }).join('');
  return `<div class="lifetime-grid">${cells}</div>`;
}
function yearPickerHTML() {
  // Pull years from data, plus current year
  const years = new Set([new Date().getFullYear()]);
  state.workouts.forEach(w => {
    const ts = w.ts || (w.started_at && new Date(w.started_at).toISOString());
    if (ts) years.add(new Date(ts).getFullYear());
  });
  state.examens.forEach(e => years.add(new Date(e.date_iso).getFullYear()));
  if (state.startDate) years.add(new Date(state.startDate).getFullYear());
  const sorted = [...years].sort((a, b) => b - a);
  const active = lifeYearFilter || new Date().getFullYear();
  return `
    <div class="year-picker">
      ${sorted.map(y => `
        <button class="year-pill ${y === active ? 'active' : ''}" onclick="setLifeYear(${y})">${y}</button>
      `).join('')}
    </div>
  `;
}
function setLifeYear(y) {
  lifeYearFilter = y;
  renderReview();
}

// Track which pinned items are expanded inline (per chapter view session)
let chapterExpandedPins = new Set();
// Active filter on the breath cloud (one theme at a time, null = no filter)
let chapterCloudFilter = null;

function viewChapter(chapterId) {

// v2.11.3 — Habits ribbon for chapter detail view.
// Each habit shows a thin density-shaded ribbon stretching across the chapter's
// date range. Sits between the breath cloud (themes) and the reflection.
function chapterHabitsRibbonHTML(chapter, isActive) {
  const allHabits = state.habits || [];
  if (!allHabits.length) return '';

  // Compute the chapter's date range
  const startISO = chapter.start_date;
  if (!startISO) return '';
  const startDate = new Date(startISO + 'T12:00:00');
  const endDate = chapter.end_date
    ? new Date(chapter.end_date + 'T12:00:00')
    : new Date(todayISO() + 'T12:00:00');
  const totalDays = Math.max(1, Math.floor((endDate.getTime() - startDate.getTime()) / 86400000) + 1);

  // Filter to habits that overlapped with the chapter (created before chapter ended,
  // and either still active or retired after chapter started)
  const habits = allHabits.filter(h => {
    const created = new Date(h.created_at);
    if (created > endDate) return false;
    if (h.retired_at) {
      const retired = new Date(h.retired_at);
      if (retired < startDate) return false;
    }
    return true;
  });
  if (!habits.length) return '';

  // Build array of ISO dates for every day in the chapter
  const chapterDates = [];
  for (let i = 0; i < totalDays; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);
    chapterDates.push(d.toISOString().slice(0, 10));
  }

  const ribbonRowHTML = (h) => {
    // Compute count + density per day in chapter range
    const need = h.count_per_day || 1;
    const habitCreated = new Date(h.created_at);
    const habitRetired = h.retired_at ? new Date(h.retired_at) : null;

    // Counts for label: total parts logged within chapter range
    const logsInChapter = (state.habitLogs || []).filter(l =>
      l.habit_id === h.id &&
      chapterDates.includes(l.date_iso)
    );
    const totalParts = logsInChapter.reduce((s, l) => s + (l.count || 1), 0);
    const distinctDays = new Set(logsInChapter.map(l => l.date_iso)).size;

    let countLabel;
    if (h.cadence === 'weekly') {
      // Weeks-in-chapter: count distinct logged weeks
      const weeks = new Set();
      for (const l of logsInChapter) {
        const dt = new Date(l.date_iso + 'T12:00:00');
        const ws = new Date(dt); ws.setDate(dt.getDate() - dt.getDay());
        weeks.add(ws.toISOString().slice(0, 10));
      }
      const possibleWeeks = Math.max(1, Math.ceil(totalDays / 7));
      countLabel = `${weeks.size} of ${possibleWeeks} weeks`;
    } else if (need > 1) {
      const possibleParts = (h.cadence === 'weekdays' ? Math.round(totalDays * 5/7) : totalDays) * need;
      countLabel = `${totalParts} of ${possibleParts} parts`;
    } else {
      const possibleDays = h.cadence === 'weekdays' ? Math.round(totalDays * 5/7) : totalDays;
      countLabel = `${distinctDays} of ${possibleDays} days`;
    }

    // Build the ribbon — thin cells, sized to fit the available width.
    // We have ~300px of width (modal padding minus margins) for the strip.
    const targetWidth = 300;
    const cellGap = 1;
    // Compute cell width that fits totalDays cells in targetWidth (clamped to reasonable size)
    const rawCellW = (targetWidth - (totalDays - 1) * cellGap) / totalDays;
    const cellW = Math.max(1.2, Math.min(8, rawCellW));
    const cellH = 8;
    const actualW = totalDays * cellW + (totalDays - 1) * cellGap;

    let cells = '';
    for (let i = 0; i < totalDays; i++) {
      const iso = chapterDates[i];
      const dateObj = new Date(iso + 'T12:00:00');

      // Don't render if before habit created or after habit retired
      if (dateObj < habitCreated || (habitRetired && dateObj > habitRetired)) {
        // Show as faintly-outlined "outside the practice's life" cell
        cells += `<rect x="${i * (cellW + cellGap)}" y="0" width="${cellW}" height="${cellH}" rx="${Math.min(1.5, cellW / 3)}" fill="transparent" stroke="var(--line)" stroke-width="0.3"/>`;
        continue;
      }

      const dow = dateObj.getDay();
      const isWeekendForWeekdays = h.cadence === 'weekdays' && (dow === 0 || dow === 6);
      const density = habitCellDensity(h, iso);
      const fill = isWeekendForWeekdays ? 'transparent' : (density === 0 ? 'var(--surface-2)' : densityColor(density));
      cells += `<rect x="${i * (cellW + cellGap)}" y="0" width="${cellW}" height="${cellH}" rx="${Math.min(1.5, cellW / 3)}" fill="${fill}"/>`;
    }

    const isHabitRetired = !!h.retired_at;

    return `
      <div style="padding:14px 0;${isHabitRetired ? 'opacity:0.55;' : ''}">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <div style="font-size:16px;line-height:1;flex-shrink:0;">${h.emoji || '✨'}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-family:'Fraunces',serif;font-size:14px;color:var(--ink);font-weight:400;line-height:1.2;">${escapeHtml(h.title)}</div>
          </div>
          <div style="font-family:ui-monospace,monospace;font-size:11px;color:var(--ink-muted);text-align:right;flex-shrink:0;letter-spacing:-0.01em;">${countLabel}</div>
        </div>
        <svg width="${actualW}" height="${cellH}" viewBox="0 0 ${actualW} ${cellH}" style="display:block;">${cells}</svg>
      </div>
    `;
  };

  const ribbonRows = habits.map(ribbonRowHTML).join('<div style="height:0.5px;background:var(--line);margin:0;"></div>');

  // Header includes day-range markers
  const startLabel = startDate.toLocaleDateString('en', { month: 'short', day: 'numeric' });
  const endLabel = isActive ? 'today' : endDate.toLocaleDateString('en', { month: 'short', day: 'numeric' });

  return `
    <div style="font-size:9.5px;letter-spacing:0.16em;color:var(--ink-muted);font-weight:500;margin:24px 0 12px;">PRACTICES THROUGH THIS CHAPTER</div>
    ${ribbonRows}
    <div style="display:flex;justify-content:space-between;font-family:'Inter',sans-serif;font-size:9px;color:var(--ink-faint);letter-spacing:0.06em;margin-top:8px;">
      <span>${startLabel}</span>
      <span>${endLabel}</span>
    </div>
    <div style="height:0.5px;background:var(--line);margin:24px 0 4px;"></div>
  `;
}

function chapterDayCount(c) {
  if (!c.start_date) return 0;
  const start = new Date(c.start_date);
  const end = c.end_date ? new Date(c.end_date) : new Date();
  const ms = end.getTime() - start.getTime();
  return Math.max(1, Math.floor(ms / 86400000) + 1);
}

function formatDateShort(d) {
  const day = d.getDate();
  const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return `${day} ${mon}`;
}

// Compute themes across all pinned items in a chapter, weighted by frequency
function chapterThemeTally(c) {
  const tally = {};
  // Pinned examens
  (c.pinned_examen_ids || []).forEach(eid => {
    const e = state.examens.find(x => x.id === eid);
    if (!e) return;
    let themes = e.themes;
    if (!themes) {
      themes = extractThemes([(e.went_well || ''), (e.went_poorly || ''), (e.remains || '')].join(' '));
    }
    (themes || []).forEach(t => { tally[t] = (tally[t] || 0) + 1; });
  });
  // Pinned captures
  (c.pinned_capture_ids || []).forEach(cid => {
    const cap = (state.captures || []).find(x => x.id === cid);
    if (!cap) return;
    extractThemes(cap.text || '').forEach(t => { tally[t] = (tally[t] || 0) + 1; });
  });
  // Pinned touches
  (c.pinned_touch_ids || []).forEach(tid => {
    let touch = null;
    for (const p of (state.people || [])) {
      const found = (p.touches || []).find(x => x.id === tid);
      if (found) { touch = found; break; }
    }
    if (!touch) return;
    extractThemes(touch.note || '').forEach(t => { tally[t] = (tally[t] || 0) + 1; });
  });
  return tally;
}

function chapterBreathCloudHTML(c, isActive) {
  const tally = chapterThemeTally(c);
  const entries = Object.entries(tally).sort((a, b) => b[1] - a[1]).slice(0, 12);
  const headerLabel = isActive ? "WHAT'S RUNNING THROUGH" : 'WHAT RAN THROUGH';

  if (!entries.length) {
    return `
      <div style="font-size:9.5px;letter-spacing:0.16em;color:var(--ink-muted);font-weight:500;margin:24px 0 12px;">${headerLabel}</div>
      <div style="font-family:'Fraunces',serif;font-style:italic;font-size:13px;color:var(--ink-faint);padding:24px 8px;text-align:center;line-height:1.55;">
        ${isActive ? 'Themes will gather as you pin reflections.' : 'No themes were pinned in this chapter.'}
      </div>
    `;
  }

  // Map frequency to font size — largest theme = ~32px, smallest = ~14px
  const max = entries[0][1];
  const min = entries[entries.length - 1][1];
  const range = Math.max(1, max - min);
  const sizeFor = (count) => {
    const t = (count - min) / range;          // 0 to 1
    return Math.round(14 + t * 20);            // 14 to 34
  };
  // Color stepped down by rank — bolder at top, fading toward the tail
  const colors = ['var(--ink)', 'var(--ink)', 'var(--ink-muted)', 'var(--ink-muted)', 'var(--ink-faint)', 'var(--ink-faint)'];
  const colorFor = (i) => colors[Math.min(i, colors.length - 1)] || 'var(--ink-faint)';

  const cloudWords = entries.map(([theme, count], i) => {
    const isFiltered = chapterCloudFilter === theme;
    const fs = sizeFor(count);
    const color = isFiltered ? 'var(--brass)' : colorFor(i);
    return `<button onclick="toggleChapterCloudFilter('${theme}', '${c.id}')" style="background:none;border:none;padding:6px 10px 6px 0;margin:0;font-family:'Fraunces',serif;font-weight:400;font-size:${fs}px;color:${color};cursor:pointer;line-height:1.05;letter-spacing:-0.01em;${isFiltered ? 'text-decoration:underline;text-decoration-thickness:0.5px;text-underline-offset:4px;' : ''}">${escapeHtml(theme)}</button>`;
  }).join('');

  return `
    <div style="font-size:9.5px;letter-spacing:0.16em;color:var(--ink-muted);font-weight:500;margin:24px 0 12px;">${headerLabel}</div>
    <div style="display:flex;flex-wrap:wrap;align-items:baseline;padding:8px 0 14px;">${cloudWords}</div>
    ${chapterCloudFilter ? `<div style="font-size:10.5px;color:var(--brass);font-family:'Fraunces',serif;font-style:italic;margin:-4px 0 8px;">filtered to <button onclick="toggleChapterCloudFilter('${chapterCloudFilter}', '${c.id}')" style="background:none;border:none;color:var(--brass);font-family:inherit;font-style:italic;font-size:10.5px;text-decoration:underline;cursor:pointer;padding:0;">${escapeHtml(chapterCloudFilter)} ×</button></div>` : ''}
  `;
}

function toggleChapterCloudFilter(theme, chapterId) {
  chapterCloudFilter = chapterCloudFilter === theme ? null : theme;
  renderChapterDetail(chapterId);
}

// Gather all pinned items (examens, captures, touches) sorted chronologically descending
function chapterPinnedItems(c) {
  const items = [];

  (c.pinned_examen_ids || []).forEach(eid => {
    const e = state.examens.find(x => x.id === eid);
    if (!e) return;
    const ts = e.completed_at || e.created_at || (e.date_iso + 'T21:30:00');
    const headline = (e.went_well || '').trim() || (e.went_poorly || '').trim() || (e.remains || '').trim() || '—';
    let themes = e.themes;
    if (!themes) themes = extractThemes([(e.went_well || ''), (e.went_poorly || ''), (e.remains || '')].join(' '));
    items.push({
      id: e.id, kind: 'examen', ts,
      date_iso: e.date_iso || ts.slice(0, 10),
      headline, source: e, themes: themes || [],
    });
  });

  (c.pinned_capture_ids || []).forEach(cid => {
    const cap = (state.captures || []).find(x => x.id === cid);
    if (!cap) return;
    const ts = cap.ts;
    const headline = (cap.text || '').split(/[.!?]\s/)[0].trim() || '(captured moment)';
    items.push({
      id: cap.id, kind: 'capture', ts,
      date_iso: ts.slice(0, 10),
      headline, source: cap, themes: extractThemes(cap.text || ''),
    });
  });

  (c.pinned_touch_ids || []).forEach(tid => {
    let touch = null, person = null;
    for (const p of (state.people || [])) {
      const found = (p.touches || []).find(x => x.id === tid);
      if (found) { touch = found; person = p; break; }
    }
    if (!touch) return;
    const ts = touch.ts;
    const headline = (touch.note || '').trim() || `${touch.type || 'touch'} with ${person.name}`;
    items.push({
      id: touch.id, kind: 'touch', ts,
      date_iso: ts.slice(0, 10),
      headline, source: touch, person, themes: extractThemes(touch.note || ''),
    });
  });

  items.sort((a, b) => (b.ts || '').localeCompare(a.ts || ''));

  // Apply cloud filter if set
  if (chapterCloudFilter) {
    return items.filter(it => (it.themes || []).includes(chapterCloudFilter));
  }
  return items;
}

function chapterPinnedListHTML(c, isActive) {
  const items = chapterPinnedItems(c);
  const totalPinned = (c.pinned_examen_ids || []).length + (c.pinned_capture_ids || []).length + (c.pinned_touch_ids || []).length;
  const headerLabel = totalPinned > 0 ? `PINNED · ${totalPinned}` : 'PINNED';

  if (!items.length) {
    if (totalPinned > 0 && chapterCloudFilter) {
      return `
        <div style="font-size:9.5px;letter-spacing:0.16em;color:var(--ink-muted);font-weight:500;margin:24px 0 12px;">${headerLabel}</div>
        <div style="font-family:'Fraunces',serif;font-style:italic;font-size:13px;color:var(--ink-faint);padding:18px 8px;text-align:center;">
          No pinned items contain ${escapeHtml(chapterCloudFilter)}.
        </div>
      `;
    }
    return `
      <div style="font-size:9.5px;letter-spacing:0.16em;color:var(--ink-muted);font-weight:500;margin:24px 0 12px;">${headerLabel}</div>
      <div style="font-family:'Fraunces',serif;font-style:italic;font-size:13px;color:var(--ink-faint);padding:18px 8px;text-align:center;line-height:1.55;">
        ${isActive ? "You haven't pinned anything yet. After tonight's examen, you can mark it as part of this chapter." : 'Nothing was pinned in this chapter.'}
      </div>
    `;
  }

  const cards = items.map(it => {
    const isExpanded = chapterExpandedPins.has(it.kind + ':' + it.id);
    const dateLabel = formatPinDate(it.date_iso);
    const kindLabel = it.kind === 'examen' ? '' : it.kind === 'capture' ? ' · CAPTURE' : ` · ${(it.person?.name || 'TOUCH').toUpperCase()}`;

    let body = '';
    if (isExpanded) {
      if (it.kind === 'examen') {
        const e = it.source;
        const block = (label, text, dim) => text ? `
          <div style="margin-top:10px;${dim ? 'opacity:0.78;' : ''}">
            <div style="font-size:9px;letter-spacing:0.14em;color:var(--ink-muted);margin-bottom:4px;font-weight:500;">${label}</div>
            <div style="font-family:'Fraunces',serif;font-style:italic;font-size:13.5px;color:var(--ink);line-height:1.55;">${highlightThemesInText(text)}</div>
          </div>` : '';
        body = block('DID WELL', e.went_well) + block('DID POORLY', e.went_poorly, true) + block('REMAINS', e.remains);
      } else if (it.kind === 'capture') {
        body = `<div style="font-family:'Fraunces',serif;font-style:italic;font-size:13.5px;color:var(--ink);line-height:1.55;margin-top:8px;">${highlightThemesInText(it.source.text || '')}</div>`;
      } else if (it.kind === 'touch') {
        body = `<div style="font-family:'Fraunces',serif;font-style:italic;font-size:13.5px;color:var(--ink);line-height:1.55;margin-top:8px;">${highlightThemesInText(it.source.note || '')}</div>`;
      }
    } else {
      body = `<div style="font-family:'Fraunces',serif;font-style:italic;font-size:14px;color:var(--ink);line-height:1.5;margin-top:6px;">${escapeHtml(it.headline)}</div>`;
    }

    return `
      <button onclick="toggleChapterPinExpand('${it.kind}:${it.id}', '${c.id}')" style="display:block;width:100%;text-align:left;padding:14px 16px;background:var(--surface-2);border:0.5px solid var(--line);border-radius:12px;margin-bottom:8px;color:inherit;font-family:inherit;cursor:pointer;">
        <div style="font-size:9.5px;letter-spacing:0.12em;color:var(--ink-muted);font-weight:500;">${dateLabel}${kindLabel}</div>
        ${body}
      </button>
    `;
  }).join('');

  return `
    <div style="font-size:9.5px;letter-spacing:0.16em;color:var(--ink-muted);font-weight:500;margin:24px 0 12px;">${headerLabel}</div>
    ${cards}
  `;
}

function toggleChapterPinExpand(key, chapterId) {
  if (chapterExpandedPins.has(key)) chapterExpandedPins.delete(key);
  else chapterExpandedPins.add(key);
  renderChapterDetail(chapterId);
}

function formatPinDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const dayName = ['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()];
  const day = d.getDate();
  const mon = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][d.getMonth()];
  return `${dayName} · ${day} ${mon}`;
}

      <button class="btn-primary" style="flex:1" onclick="finalizeCloseChapter('${chapterId}', true)">Close & save</button>
    </div>
  `);
  setTimeout(() => {
    const el = document.getElementById('chapter-reflection-text');
    if (el) el.focus();
  }, 80);
}

function finalizeCloseChapter(chapterId, withReflection) {
  const c = state.chapters.find(x => x.id === chapterId);
  if (!c) return;
  const now = new Date().toISOString();
  c.end_date = todayISO();
  if (withReflection) {
    const txt = (document.getElementById('chapter-reflection-text')?.value || '').trim();
    if (txt) {
      c.reflection_text = txt;
      c.reflection_completed_at = now;
    }
  }
  saveState();
  renderChapterDetail(chapterId);
  toast(withReflection && c.reflection_text ? 'Chapter sealed' : 'Chapter closed');
}
